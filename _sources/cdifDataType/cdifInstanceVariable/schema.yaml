---
$schema: https://json-schema.org/draft/2020-12/schema
title: CDIF Instance Variable
type: object
properties:
  '@type':
    type: array
    description: Must include both schema:PropertyValue and cdi:InstanceVariable.
      Additional types may be included.
    items:
      type: string
    contains:
      const: cdi:InstanceVariable
  'cdif:physicalDataType':
    anyOf:
    - type: string
    - $ref: '#/$defs/cdifConceptOrTerm'
    description: identifier or name for the data type concept.
  'cdif:role':
    type: string
    enum:
      - UnitIdentifier
      - Measure
      - Attribute
      - Dimension
      - Descriptor
      - ReferenceVariable
    description: Specifies the role this variable plays in a data structure. UnitIdentifier names the unit a row describes; Measure holds observed/derived values; Attribute qualifies an observation; Dimension addresses a cell in a multi-dimensional cube; Descriptor names the variable that a Reference column records values for (long format); ReferenceVariable holds those recorded values.
  'cdif:simpleUnitOfMeasure':
    description: The unit in which the data values are measured (kg, pound, euro), expressed as a simple
      string, in cases where no additional information is available (in the legacy system)
      or needed (as in the case of broad agreement within the community of use [i.e., ISO
      country codes, currencies, etc. in SDMX])
    type: string
  'cdif:uses':
    type: array
    items:
      anyOf:
      - type: string
      - $ref: '#/$defs/cdifConceptOrTerm'
    description: Essentially the same as schema:propertyID. References to concepts that this
      variable measures or represents. When the dataset's distribution carries cdi:isStructuredBy
      (CDIF Data Structure profile), cdif:uses references the RepresentedVariable that supplies
      the represented-variable-level properties below, which are then NOT duplicated on the
      InstanceVariable.
  'cdi:function':
    type: array
    items:
      anyOf:
      - type: string
      - $ref: '#/$defs/cdifConceptOrTerm'
    description: >-
      Immutable characteristic of the variable such as geographic designator, weight,
      temporal designation, etc. (InstanceVariable.function).
  'cdi:platformType':
    anyOf:
    - type: string
    - $ref: '#/$defs/cdifConceptOrTerm'
    description: >-
      The application or technical system context in which the variable has been realized -
      typically a statistical processing package or processing environment
      (InstanceVariable.platformType).
  'cdi:source':
    anyOf:
    - type: string
    - type: object
      properties:
        '@id':
          type: string
    description: >-
      Reference capturing provenance information for this InstanceVariable
      (InstanceVariable.source).
  'cdif:isDescribedBy_StatisticsCollection':
    description: >-
      The StatisticsCollection holding summary / category statistics for this
      InstanceVariable (InstanceVariable.isDescribedBy). cdif: namespaced and
      target-suffixed because the DDI-CDI isDescribedBy association is polymorphic.
    anyOf:
    - $ref: '../../cdifDataType/cdifStatistics/schema.yaml#/$defs/StatisticsCollection'
    - type: object
      properties:
        '@id':
          type: string
      required: ['@id']
  'cdi:describedUnitOfMeasure':
    $ref: '#/$defs/cdifConceptOrTerm'
    description: >-
      The unit in which the data values are measured, expressed as a controlled-vocabulary
      entry (RepresentedVariable.describedUnitOfMeasure). For a plain-string unit, use
      cdif:simpleUnitOfMeasure instead.
  'cdi:qualifies':
    type: object
    properties:
       '@id':
        type: string
    description: reference to an instance variable defined for this dataset
allOf:
- required:
  - '@type'
- $ref: ../../schemaorgProperties/variableMeasured/schema.yaml
$defs:
  cdifConceptOrTerm:
    $ref: ../cdifConceptOrTerm/schema.yaml

