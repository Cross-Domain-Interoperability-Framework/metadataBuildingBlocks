$schema: https://json-schema.org/draft/2020-12/schema
description: >-
  A SKOS concept identified by URI, a schema:DefinedTerm, or an inline
  cdif:Concept. Shared shape used wherever a CDIF property carries either a
  controlled-vocabulary reference or an inline concept definition.
anyOf:
  - type: object
    properties:
      '@id':
        type: string
        description: reference to a skos concept for the data type
  - $ref: ../../schemaorgProperties/definedTerm/schema.yaml
  - $ref: ../../profiles/cdifProfile/cdifConceptScheme/schema.yaml#/$defs/cdifConcept
