'$schema': 'https://json-schema.org/draft/2020-12/schema'
title: DDI-CDI Code List
description: List of codes and associated categories.
type: object
properties:
  '@type':
    type: array
    items:
      type: string
    contains:
      const: 'cdi:CodeList'
    minItems: 1
  '@id':
    type: string
    description: Identifier for this CodeList node
  'cdi:allowsDuplicates':
    type: boolean
    description: >-
      If value is False, the members are unique within the collection - if True, there may
      be duplicates. (Note that a mathematical “bag” permits duplicates and is unordered -
      a “set” does not have duplicates and may be ordered.)
  'cdi:has':
    type: array
    items:
      '$ref': '../ddicdiDataTypes/schema.yaml#/$defs/id-reference'
    minItems: 1
  'cdi:identifier':
    '$ref': '../ddicdiDataTypes/schema.yaml#/$defs/Identifier'
    description: >-
      Identifier for objects requiring short- or long-lasting referencing and management.
  'cdi:name':
    type: array
    items:
      '$ref': '../ddicdiDataTypes/schema.yaml#/$defs/ObjectName'
    minItems: 1
    description: >-
      Human understandable name (liguistic signifier, word, phrase, or mnemonic). May follow
      ISO/IEC 11179-5 naming principles, and have context provided to specify usage.
  'cdi:uses':
    '$ref': '../ddicdiDataTypes/schema.yaml#/$defs/id-reference'
  'cdi:references':
    '$ref': '../ddicdiDataTypes/schema.yaml#/$defs/id-reference'
  'cdi:isDefinedBy':
    type: array
    items:
      '$ref': '../ddicdiDataTypes/schema.yaml#/$defs/id-reference'
    minItems: 1
  'cdi:purpose':
    '$ref': '../ddicdiDataTypes/schema.yaml#/$defs/InternationalString'
    description: Intent or reason for the object/the description of the object.
required:
- '@type'
