'$schema': 'https://json-schema.org/draft/2020-12/schema'
title: DDI-CDI Data Structure
description: Data organization based on reusable data structure components.
anyOf:
- '$ref': '#/$defs/DataStructure'
- '$ref': '#/$defs/DimensionalDataStructure'
- '$ref': '#/$defs/KeyValueStructure'
- '$ref': '#/$defs/LongDataStructure'
- '$ref': '#/$defs/WideDataStructure'
'$defs':
  DataStructure:
    type: object
    description: Data organization based on reusable data structure components.
    properties:
      '@type':
        type: array
        items:
          type: string
        contains:
          const: 'cdi:DataStructure'
        minItems: 1
      '@id':
        type: string
        description: Identifier for this DataStructure node
      'cdi:has':
        type: array
        items:
          anyOf:
          - '$ref': '#/$defs/ForeignKey'
          - '$ref': '../ddicdiDataTypes/schema.yaml#/$defs/id-reference'
        minItems: 1
      'cdi:identifier':
        '$ref': '../ddicdiDataTypes/schema.yaml#/$defs/Identifier'
        description: >-
          Identifier for objects requiring short- or long-lasting referencing and management.
      'cdi:isDefinedBy':
        '$ref': '../ddicdiDataTypes/schema.yaml#/$defs/id-reference'
      'cdi:semantic':
        type: array
        items:
          '$ref': '../ddicdiDataTypes/schema.yaml#/$defs/PairedControlledVocabularyEntry'
        minItems: 1
        description: >-
          Qualifies the purpose or use expressed as a paired external controlled vocabulary.
      'cdi:specialization':
        '$ref': '#/$defs/SpecializationRole'
        description: >-
          The role played by the component for the data set for purposes of harmonization
          and integration, typically regarding geography, time, etc.
    required:
    - '@type'
  DimensionalDataStructure:
    type: object
    description: >-
      Structure of a dimensional data set (organized collection of multidimensional data).
      It is described by dimension, measure and attribute components.
    properties:
      '@type':
        type: array
        items:
          type: string
        contains:
          const: 'cdi:DimensionalDataStructure'
        minItems: 1
      '@id':
        type: string
        description: Identifier for this DimensionalDataStructure node
      'cdi:uses':
        type: array
        items:
          '$ref': '#/$defs/DimensionGroup'
        minItems: 1
      'cdi:has':
        type: array
        items:
          anyOf:
          - '$ref': '#/$defs/ForeignKey'
          - '$ref': '../ddicdiDataTypes/schema.yaml#/$defs/id-reference'
        minItems: 1
      'cdi:identifier':
        '$ref': '../ddicdiDataTypes/schema.yaml#/$defs/Identifier'
        description: >-
          Identifier for objects requiring short- or long-lasting referencing and management.
      'cdi:isDefinedBy':
        '$ref': '../ddicdiDataTypes/schema.yaml#/$defs/id-reference'
      'cdi:semantic':
        type: array
        items:
          '$ref': '../ddicdiDataTypes/schema.yaml#/$defs/PairedControlledVocabularyEntry'
        minItems: 1
        description: >-
          Qualifies the purpose or use expressed as a paired external controlled vocabulary.
      'cdi:specialization':
        '$ref': '#/$defs/SpecializationRole'
        description: >-
          The role played by the component for the data set for purposes of harmonization
          and integration, typically regarding geography, time, etc.
    required:
    - '@type'
  KeyValueStructure:
    type: object
    description: >-
      Structure of a key-value datastore (organized collection of key-value data). It is described
      by identifier, contextual, synthetic id, dimension, variable descriptor and variable
      value components.
    properties:
      '@type':
        type: array
        items:
          type: string
        contains:
          const: 'cdi:KeyValueStructure'
        minItems: 1
      '@id':
        type: string
        description: Identifier for this KeyValueStructure node
      'cdi:has':
        type: array
        items:
          anyOf:
          - '$ref': '#/$defs/ForeignKey'
          - '$ref': '../ddicdiDataTypes/schema.yaml#/$defs/id-reference'
        minItems: 1
      'cdi:identifier':
        '$ref': '../ddicdiDataTypes/schema.yaml#/$defs/Identifier'
        description: >-
          Identifier for objects requiring short- or long-lasting referencing and management.
      'cdi:isDefinedBy':
        '$ref': '../ddicdiDataTypes/schema.yaml#/$defs/id-reference'
      'cdi:semantic':
        type: array
        items:
          '$ref': '../ddicdiDataTypes/schema.yaml#/$defs/PairedControlledVocabularyEntry'
        minItems: 1
        description: >-
          Qualifies the purpose or use expressed as a paired external controlled vocabulary.
      'cdi:specialization':
        '$ref': '#/$defs/SpecializationRole'
        description: >-
          The role played by the component for the data set for purposes of harmonization
          and integration, typically regarding geography, time, etc.
    required:
    - '@type'
  LongDataStructure:
    type: object
    description: >-
      Structure of a long dataset (organized collection of long data). It is described by
      identifier, measure, attribute, variable descriptor and variable value components.
    properties:
      '@type':
        type: array
        items:
          type: string
        contains:
          const: 'cdi:LongDataStructure'
        minItems: 1
      '@id':
        type: string
        description: Identifier for this LongDataStructure node
      'cdi:has':
        type: array
        items:
          anyOf:
          - '$ref': '#/$defs/ForeignKey'
          - '$ref': '../ddicdiDataTypes/schema.yaml#/$defs/id-reference'
        minItems: 1
      'cdi:identifier':
        '$ref': '../ddicdiDataTypes/schema.yaml#/$defs/Identifier'
        description: >-
          Identifier for objects requiring short- or long-lasting referencing and management.
      'cdi:isDefinedBy':
        '$ref': '../ddicdiDataTypes/schema.yaml#/$defs/id-reference'
      'cdi:semantic':
        type: array
        items:
          '$ref': '../ddicdiDataTypes/schema.yaml#/$defs/PairedControlledVocabularyEntry'
        minItems: 1
        description: >-
          Qualifies the purpose or use expressed as a paired external controlled vocabulary.
      'cdi:specialization':
        '$ref': '#/$defs/SpecializationRole'
        description: >-
          The role played by the component for the data set for purposes of harmonization
          and integration, typically regarding geography, time, etc.
    required:
    - '@type'
  WideDataStructure:
    type: object
    description: >-
      Structure of a wide dataset (organized collection of wide data). It is described by
      identifier, measure and attribute components.
    properties:
      '@type':
        type: array
        items:
          type: string
        contains:
          const: 'cdi:WideDataStructure'
        minItems: 1
      '@id':
        type: string
        description: Identifier for this WideDataStructure node
      'cdi:has':
        type: array
        items:
          anyOf:
          - '$ref': '#/$defs/ForeignKey'
          - '$ref': '../ddicdiDataTypes/schema.yaml#/$defs/id-reference'
        minItems: 1
      'cdi:identifier':
        '$ref': '../ddicdiDataTypes/schema.yaml#/$defs/Identifier'
        description: >-
          Identifier for objects requiring short- or long-lasting referencing and management.
      'cdi:isDefinedBy':
        '$ref': '../ddicdiDataTypes/schema.yaml#/$defs/id-reference'
      'cdi:semantic':
        type: array
        items:
          '$ref': '../ddicdiDataTypes/schema.yaml#/$defs/PairedControlledVocabularyEntry'
        minItems: 1
        description: >-
          Qualifies the purpose or use expressed as a paired external controlled vocabulary.
      'cdi:specialization':
        '$ref': '#/$defs/SpecializationRole'
        description: >-
          The role played by the component for the data set for purposes of harmonization
          and integration, typically regarding geography, time, etc.
    required:
    - '@type'
  DimensionGroup:
    type: object
    description: >-
      Collection of dimensions that can be reused across multiple dimensional structures.
    properties:
      '@type':
        type: array
        items:
          type: string
        contains:
          const: 'cdi:DimensionGroup'
        minItems: 1
      '@id':
        type: string
        description: Identifier for this DimensionGroup node
      'cdi:identifier':
        '$ref': '../ddicdiDataTypes/schema.yaml#/$defs/Identifier'
        description: >-
          Identifier for objects requiring short- or long-lasting referencing and management.
      'cdi:name':
        type: array
        items:
          '$ref': '../ddicdiDataTypes/schema.yaml#/$defs/ObjectName'
        minItems: 1
        description: >-
          Human understandable name (liguistic signifier, word, phrase, or mnemonic). May
          follow ISO/IEC 11179-5 naming principles, and have context provided to specify usage.
      'cdi:has':
        type: array
        items:
          '$ref': '../ddicdiDataTypes/schema.yaml#/$defs/id-reference'
        minItems: 1
    required:
    - '@type'
  ForeignKey:
    type: object
    description: Role of a set of data structure components for content referencing purposes
    properties:
      '@type':
        type: array
        items:
          type: string
        contains:
          const: 'cdi:ForeignKey'
        minItems: 1
      '@id':
        type: string
        description: Identifier for this ForeignKey node
      'cdi:identifier':
        '$ref': '../ddicdiDataTypes/schema.yaml#/$defs/Identifier'
        description: >-
          Identifier for objects requiring short- or long-lasting referencing and management.
      'cdi:isComposedOf':
        type: array
        items:
          '$ref': '../ddicdiDataTypes/schema.yaml#/$defs/id-reference'
        minItems: 1
    required:
    - '@type'
  SpecializationRole:
    type: object
    description: >-
      Specific roles played by represented variables in terms of time, geography, and other
      concepts which are important for the harmonization and integration of data.
    properties:
      '@type':
        type: array
        items:
          type: string
        contains:
          const: 'cdi:SpecializationRole'
        minItems: 1
