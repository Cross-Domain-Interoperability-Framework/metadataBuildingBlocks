    variable, with cdi:hasWeight referencing the weighting variable by @id.
  prefixes:
    cdi: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/
  snippets:
    - language: json
      ref: exampleDdicdiStatistics.json
