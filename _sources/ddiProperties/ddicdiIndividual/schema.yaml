$schema: https://json-schema.org/draft/2020-12/schema
title: DDI-CDI Individual
description: >-
  DDI-CDI Individual agent (cls-Individual, extends Agent).
  Represents a person with name, contact information, and identification.

type: object
properties:
  "@type":
    type: array
    items:
      type: string
    contains:
      const: "cdi:Individual"
    minItems: 1
  "@id":
    type: string
    description: Identifier for this individual node
  "cdi:individualName":
    description: Name(s) of this individual
    anyOf:
      - $ref: "../ddicdiDataTypes/schema.yaml#/$defs/IndividualName"
      - type: array
        items:
          $ref: "../ddicdiDataTypes/schema.yaml#/$defs/IndividualName"
  "cdi:contactInformation":
    description: Contact details for this individual
    anyOf:
      - $ref: "../ddicdiDataTypes/schema.yaml#/$defs/ContactInformation"
      - type: array
        items:
          $ref: "../ddicdiDataTypes/schema.yaml#/$defs/ContactInformation"
  "cdi:catalogDetails":
    description: Catalog metadata for this agent
    $ref: "../ddicdiDataTypes/schema.yaml#/$defs/CatalogDetails"
  "cdi:identifier":
    description: Formal identifier for this agent
    $ref: "../ddicdiDataTypes/schema.yaml#/$defs/Identifier"
  "cdi:image":
    description: Image associated with this agent
    $ref: "../ddicdiDataTypes/schema.yaml#/$defs/PrivateImage"
  "cdi:purpose":
    description: Purpose or role of this agent
    $ref: "../ddicdiDataTypes/schema.yaml#/$defs/InternationalString"
required: ["@type"]
