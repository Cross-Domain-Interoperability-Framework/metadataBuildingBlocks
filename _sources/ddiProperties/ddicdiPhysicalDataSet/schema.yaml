      a simple string needs to support a type definition to clarify its content.
    properties:
      '@type':
        type: array
        items:
          type: string
        contains:
          const: 'cdi:TypedString'
        minItems: 1
      'cdi:content':
        type: string
        description: Content of the property expressed as a simple string.
      'cdi:typeOfContent':
        '$ref': '../ddicdiDataTypes/schema.yaml#/$defs/ControlledVocabularyEntry'
        description: >-
          Optional use of a controlled vocabulary to specifically type the associated content.
  Unit:
    type: object
    description: >-
