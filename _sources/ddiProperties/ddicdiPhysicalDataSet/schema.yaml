      'cdi:fileSize':
        type: number
        description: File size expressed as a real number.
      'cdi:fileSizeUofM':
        type: string
        description: Unit of measure of the fileSize as a simple string, e.g. KB, megabyte,
          GB, etc.
      'cdi:fingerprint':
        '$ref': '#/$defs/DataFingerprint'
        description: >-
          Universal Numerical Fingerprint or similar format-independent, canonical hash value
          of the physical representation of data in the physical data set.
      'cdi:identifier':
        '$ref': '../ddicdiDataTypes/schema.yaml#/$defs/Identifier'
        description: >-
          Identifier for objects requiring short- or long-lasting referencing and management.
      'cdi:name':
        '$ref': '../ddicdiDataTypes/schema.yaml#/$defs/ObjectName'
        description: >-
          Human understandable name (linguistic signifier, word, phrase, or mnemonic). May
          follow ISO/IEC 11179-5 naming principles, and have context provided to specify usage.
      'cdi:overview':
        '$ref': '../ddicdiDataTypes/schema.yaml#/$defs/InternationalString'
        description: >-
          Short natural language account of the information obtained from the combination
          of properties and relationships associated with an object.
      'cdi:physicalFileURL':
        type: string
        description: URL for the physical data set.
      'cdi:purpose':
        '$ref': '../ddicdiDataTypes/schema.yaml#/$defs/InternationalString'
        description: Intent or reason for the object/the description of the object.
      'cdi:recordCount':
        type: integer
        description: Number of records in the physical data set.
      'cdi:standard':
        type: array
        items:
          '$ref': '#/$defs/conformsTo'
        description: An established standard to which the described resource conforms.
      'cdi:has_InstanceVariable':
        type: array
        items:
          anyOf:
          - '$ref': ../ddicdiInstanceVariable/schema.yaml
          - '$ref': '../ddicdiDataTypes/schema.yaml#/$defs/id-reference'
      'cdi:has_PhysicalMapping':
        type: array
        items:
          anyOf:
          - '$ref': ../ddicdiPhysicalMapping/schema.yaml
          - '$ref': '../ddicdiDataTypes/schema.yaml#/$defs/id-reference'
      'cdi:has_PhysicalMappingPosition':
        type: array
        items:
          anyOf:
          - '$ref': '#/$defs/PhysicalMappingPosition'
          - '$ref': '../ddicdiDataTypes/schema.yaml#/$defs/id-reference'
      'cdi:isDefinedBy':
        type: array
        items:
          anyOf:
          - '$ref': ../../skosProperties/skosConcept/schema.yaml
          - '$ref': '../ddicdiDataTypes/schema.yaml#/$defs/id-reference'
      'cdi:correspondsTo':
        anyOf:
        - '$ref': '#/$defs/DataSet'
        - '$ref': '../ddicdiDataTypes/schema.yaml#/$defs/id-reference'
      'cdi:uses':
        anyOf:
        - '$ref': ../ddicdiLogicalRecord/schema.yaml
        - '$ref': '../ddicdiDataTypes/schema.yaml#/$defs/id-reference'
