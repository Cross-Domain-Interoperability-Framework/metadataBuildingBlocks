'$schema': 'https://json-schema.org/draft/2020-12/schema'
title: DDI-CDI Physical Data Set
description: Organized collection of wide data. It is structured by a wide data structure.
anyOf:
- '$ref': '#/$defs/WideDataSet'
- '$ref': '#/$defs/LongDataSet'
- '$ref': '#/$defs/DimensionalDataSet'
- '$ref': '#/$defs/TabularTextDataSet'
- '$ref': '#/$defs/StructuredDataSet'
'$defs':
  WideDataSet:
    type: object
    description: Organized collection of wide data. It is structured by a wide data structure.
    properties:
      '@type':
        type: array
        items:
          type: string
        contains:
          const: 'cdi:WideDataSet'
        minItems: 1
      '@id':
        type: string
        description: Identifier for this WideDataSet node
      'cdi:identifier':
        '$ref': '../ddicdiDataTypes/schema.yaml#/$defs/Identifier'
        description: >-
          Identifier for objects requiring short- or long-lasting referencing and management.
      'cdi:recordCount':
        type: integer
        description: Number of records in the data set.
      'cdi:fingerprint':
        '$ref': '#/$defs/DataFingerprint'
        description: >-
          Universal Numerical Fingerprint or similar format-independent canonical hash value
          of the physical representation of data in the physical data set.
      'cdi:name':
        type: array
        items:
          '$ref': '../ddicdiDataTypes/schema.yaml#/$defs/ObjectName'
        description: >-
          Human understandable name (linguistic signifier, word, phrase, or mnemonic). May
          follow ISO/IEC 11179-5 naming principles, and have context provided to specify usage.
      'cdi:has_InstanceVariable':
        type: array
        items:
          anyOf:
          - '$ref': ../ddicdiInstanceVariable/schema.yaml
          - '$ref': '../ddicdiDataTypes/schema.yaml#/$defs/id-reference'
      'cdi:has_DataPoint':
        type: array
        items:
          anyOf:
          - '$ref': '#/$defs/DataPoint'
          - '$ref': '../ddicdiDataTypes/schema.yaml#/$defs/id-reference'
      'cdi:has_Key':
        type: array
        items:
          anyOf:
          - '$ref': ../../cdifProperties/cdifKey/schema.yaml
          - '$ref': '../ddicdiDataTypes/schema.yaml#/$defs/id-reference'
      'cdi:isStructuredBy':
        type: array
        items:
          anyOf:
          - '$ref': ../ddicdiDataStructure/schema.yaml
          - '$ref': '../ddicdiDataTypes/schema.yaml#/$defs/id-reference'
    required:
    - '@type'
  LongDataSet:
    type: object
    description: Organized collection of long data. It is structured by a long data structure.
    properties:
      '@type':
        type: array
        items:
          type: string
        contains:
          const: 'cdi:LongDataSet'
        minItems: 1
      '@id':
        type: string
        description: Identifier for this LongDataSet node
      'cdi:identifier':
        '$ref': '../ddicdiDataTypes/schema.yaml#/$defs/Identifier'
        description: >-
          Identifier for objects requiring short- or long-lasting referencing and management.
      'cdi:recordCount':
        type: integer
        description: Number of records in the data set.
      'cdi:fingerprint':
        '$ref': '#/$defs/DataFingerprint'
        description: >-
          Universal Numerical Fingerprint or similar format-independent canonical hash value
          of the physical representation of data in the physical data set.
      'cdi:name':
        type: array
        items:
          '$ref': '../ddicdiDataTypes/schema.yaml#/$defs/ObjectName'
        description: >-
          Human understandable name (linguistic signifier, word, phrase, or mnemonic). May
          follow ISO/IEC 11179-5 naming principles, and have context provided to specify usage.
      'cdi:has_InstanceVariable':
        type: array
        items:
          anyOf:
          - '$ref': ../ddicdiInstanceVariable/schema.yaml
          - '$ref': '../ddicdiDataTypes/schema.yaml#/$defs/id-reference'
      'cdi:has_DataPoint':
        type: array
        items:
          anyOf:
          - '$ref': '#/$defs/DataPoint'
          - '$ref': '../ddicdiDataTypes/schema.yaml#/$defs/id-reference'
      'cdi:has_Key':
        type: array
        items:
          anyOf:
          - '$ref': ../../cdifProperties/cdifKey/schema.yaml
          - '$ref': '../ddicdiDataTypes/schema.yaml#/$defs/id-reference'
      'cdi:isStructuredBy':
        type: array
        items:
          anyOf:
          - '$ref': ../ddicdiDataStructure/schema.yaml
          - '$ref': '../ddicdiDataTypes/schema.yaml#/$defs/id-reference'
    required:
    - '@type'
  DimensionalDataSet:
    type: object
    description: >-
      Organized collection of multidimensional data. It is structured by a dimensional data
      structure.
    properties:
      '@type':
        type: array
        items:
          type: string
        contains:
          const: 'cdi:DimensionalDataSet'
        minItems: 1
      '@id':
        type: string
        description: Identifier for this DimensionalDataSet node
      'cdi:represents':
        type: array
        items:
          anyOf:
          - '$ref': '#/$defs/ScopedMeasure'
          - '$ref': '../ddicdiDataTypes/schema.yaml#/$defs/id-reference'
      'cdi:identifier':
        '$ref': '../ddicdiDataTypes/schema.yaml#/$defs/Identifier'
        description: >-
          Identifier for objects requiring short- or long-lasting referencing and management.
      'cdi:recordCount':
        type: integer
        description: Number of records in the data set.
      'cdi:fingerprint':
        '$ref': '#/$defs/DataFingerprint'
        description: >-
          Universal Numerical Fingerprint or similar format-independent canonical hash value
          of the physical representation of data in the physical data set.
      'cdi:name':
        type: array
        items:
          '$ref': '../ddicdiDataTypes/schema.yaml#/$defs/ObjectName'
        description: >-
          Human understandable name (linguistic signifier, word, phrase, or mnemonic). May
          follow ISO/IEC 11179-5 naming principles, and have context provided to specify usage.
      'cdi:has_InstanceVariable':
        type: array
        items:
          anyOf:
          - '$ref': ../ddicdiInstanceVariable/schema.yaml
          - '$ref': '../ddicdiDataTypes/schema.yaml#/$defs/id-reference'
      'cdi:has_DataPoint':
        type: array
        items:
          anyOf:
          - '$ref': '#/$defs/DataPoint'
          - '$ref': '../ddicdiDataTypes/schema.yaml#/$defs/id-reference'
      'cdi:has_Key':
        type: array
        items:
          anyOf:
          - '$ref': ../../cdifProperties/cdifKey/schema.yaml
          - '$ref': '../ddicdiDataTypes/schema.yaml#/$defs/id-reference'
      'cdi:isStructuredBy':
        type: array
        items:
          anyOf:
          - '$ref': ../ddicdiDataStructure/schema.yaml
          - '$ref': '../ddicdiDataTypes/schema.yaml#/$defs/id-reference'
    required:
    - '@type'
  TabularTextDataSet:
    type: object
    description: >-
      Information describing the physical aspects of a data set which is encoded using a text-based
      method and which has an essentially tabular structure.
    properties:
      '@type':
        type: array
        items:
          type: string
        contains:
          const: 'cdi:TabularTextDataSet'
        minItems: 1
      '@id':
        type: string
        description: Identifier for this TabularTextDataSet node
      'cdi:arrayBase':
        type: integer
        description: >-
          The starting value for the numbering of cells, rows, columns, etc. when they constitute
          an ordered sequence (an array). Note that in DDI, this is typically either 0 or
          1. In related W3C work (Model for Tabular Data and Metadata on the Web), they appear
          to standardize on 1 (see https://www.w3.org/TR/tabular-data-model/ 4.3 [Columns]
          and 4.4 [Rows]: "number - the position of the column amongst the columns for the
          associated table, starting from 1.")
      'cdi:commentPrefix':
        type: string
        description: >-
          A string used to indicate that an input line is a comment, a string which precedes
          a comment in the data file. From https://www.w3.org/TR/tabular-metadata/ 5.9 Dialect
          commentPrefix: 'An atomic property that sets the comment prefix flag to the single
          provided value, which MUST be a string. The default is "#".'
      'cdi:delimiter':
        type: string
        description: >-
          The Delimiting character in the data. Must be used if isDelimited is True. "The
          separator between cells, set by the delimiter property of a dialect description.
          The default is ,. See the W3C Recommendation "Metadata Vocabulary for Tabular Data"
          (https://www.w3.org/TR/tabular-data-model/#encoding). From the "CSV Dialect" specification
          (https://specs.frictionlessdata.io/csv-dialect/#specification): "delimiter: specifies
          a one-character string to use as the field separator. Default = ,."
      'cdi:escapeCharacter':
        type: string
        description: >-
          "The string that is used to escape the quote character within escaped cells, or
          null" see https://www.w3.org/TR/tabular-data-model/#encoding. From https://www.w3.org/TR/tabular-metadata/
          5.9 Dialect "doubleQuote: A boolean atomic property that, if true, sets the escape
          character flag to ". If false, to \. The default is true." From http://specs.frictionlessdata.io/csv-dialect/
          "doubleQuote: controls the handling of quotes inside fields. If true, two consecutive
          quotes should be interpreted as one. Default = true".
      'cdi:hasHeader':
        type: boolean
        description: >-
          True if the file contains a header containing column names. From https://www.w3.org/TR/tabular-metadata/
          5.9 Dialect "header: A boolean atomic property that, if true, sets the header row
          count flag to 1, and if false to 0, unless headerRowCount is provided, in which
          case the value provided for the header property is ignored. The default is true."
          From http://specs.frictionlessdata.io/csv-dialect/ "header: indicates whether the
          file includes a header row. If true the first row in the file is a header row, not
          data. Default = true".
      'cdi:headerIsCaseSensitive':
        type: boolean
        description: >-
          If True, the case of the labels in the header is significant. From the "CSV Dialect"
          specification (http://specs.frictionlessdata.io/csv-dialect/): "caseSensitiveHeader:
          indicates that case in the header is meaningful. For example, columns CAT and Cat
          should not be equated. Default = false."
      'cdi:headerRowCount':
        type: integer
        description: >-
          The number of lines in the header From https://www.w3.org/TR/tabular-metadata/ 5.9
          Dialect "headerRowCount: A numeric atomic property that sets the header row count
          flag to the single provided value, which MUST be a non-negative integer. The default
          is 1."
      'cdi:isDelimited':
        type: boolean
        description: >-
          Indicates whether the data are in a delimited format. If "true," the format is delimited,
          and the isFixedWidth property must be set to "false." If not set to "true," the
          property isFixedWitdh must be set to "true."
      'cdi:isFixedWidth':
        type: boolean
        description: >-
          Set to true if the file is fixed-width. If true, isDelimited must be set to false.
      'cdi:lineTerminator':
        type: array
        items:
          type: string
        description: >-
          The strings that can be used at the end of a row, set by the lineTerminators property
          of a dialect description. The default is [CRLF, LF]. See the W3C Recommendation
          "Metadata Vocabulary for Tabular Data" (https://www.w3.org/TR/tabular-data-model/#encoding)
          5.9 Dialect "lineTerminators: An atomic property that sets the line terminators
          flag to either an array containing the single provided string value, or the provided
          array. The default is ['rn', 'n']." Also, from the "CSV Dialect" specification (http://specs.frictionlessdata.io/csv-dialect/):
          "lineTerminator: specifies the character sequence which should terminate rows. Default
          = rn."
      'cdi:nullSequence':
        type: string
        description: >-
          A string indicating a null value. From the W3C Recommendation "Metadata Vocabulary
          for Tabular Data" (https://www.w3.org/TR/tabular-metadata/) 4.3: "null: the string
          or strings which cause the value of cells having string value matching any of these
          values to be null." From the same source, Inherited 5.7: "null: An atomic property
          giving the string or strings used for null values within the data. If the string
          value of the cell is equal to any one of these values, the cell value is null. See
          Parsing Cells in [tabular-data-model] for more details. If not specified, the default
          for the null property is the empty string ''. The value of this property becomes
          the null annotation for the described column."
      'cdi:quoteCharacter':
        type: string
        description: >-
          "The string that is used around escaped cells, or null, set by the quoteChar property
          of a dialect description. The default is ".". See W3C Recommendation "Model for
          Tabular Data and Metadata on the Web", https://www.w3.org/TR/tabular-data-model/#parsing.
          From the W3C Recommendation "Metadata Vocabulary for Tabular Data" (https://www.w3.org/TR/tabular-metadata/)
          5.9 Dialect: "quoteChar: An atomic property that sets the quote character flag to
          the single provided value, which MUST be a string or null. If the value is null,
          the escape character flag is also set to null. The default is '"'." From the CSV
          Dialect specification (http://specs.frictionlessdata.io/csv-dialect/): "quoteChar:
          specifies a one-character string to use as the quoting character. Default = "."
      'cdi:skipBlankRows':
        type: boolean
        description: >-
          If the value is True, blank rows are ignored. From the W3C Recommendation "Metadata
          Vocabulary for Tabular Data" (https://www.w3.org/TR/tabular-metadata/) 5.9 Dialect:
          "skipBlankRows: A boolean atomic property that sets the skip blank rows flag to
          the single provided boolean value. The default is false."
      'cdi:skipDataColumns':
        type: integer
        description: >-
          The number of columns to skip at the beginning of the row. From the W3C Recommendation
          "Metadata Vocabulary for Tabular Data" (https://www.w3.org/TR/tabular-metadata/)
          5.9 Dialect: "skipColumns: A numeric atomic property that sets the skip columns
          flag to the single provided numeric value, which MUST be a non-negative integer.
          The default is 0." A value other than 0 will mean that the source numbers of columns
          will be different from their numbers.
      'cdi:skipInitialSpace':
        type: boolean
        description: >-
          If the value is True, skip whitespace at the beginning of a line or following a
          delimiter. From the W3C Recommendation "Metadata Vocabulary for Tabular Data" (https://www.w3.org/TR/tabular-metadata/)
          5.9 Dialect: "skipInitialSpace: A boolean atomic property that, if true, sets the
          trim flag to 'start' and if false, to false. If the trim property is provided, the
          skipInitialSpace property is ignored. The default is false." From the CSV Dialect
          specification (http://specs.frictionlessdata.io/csv-dialect/): "skipInitialSpace:
          specifies how to interpret whitespace which immediately follows a delimiter; if
          false, it means that whitespace immediately after a delimiter should be treated
          as part of the following field. Default = true."
      'cdi:skipRows':
        type: integer
        description: >-
          Number of input rows to skip preceding the header or data. From the W3C Recommendation
          "Metadata Vocabulary for Tabular Data" (https://www.w3.org/TR/tabular-metadata/)
          5.9 Dialect: "skipRows: A numeric atomic property that sets the skip rows flag to
          the single provided numeric value, which MUST be a non-negative integer. The default
          is 0." A value greater than 0 will mean that the source numbers of rows will be
          different from their numbers.
      'cdi:tableDirection':
        type: string
        enum:
        - Auto
        - Ltr
        - Rtl
        description: >-
          Indicates the direction in which columns are arranged in each row. From the W3C
          Recommendation "Metadata Vocabulary for Tabular Data" (https://www.w3.org/TR/tabular-metadata/)
          5.3.2: "tableDirection: An atomic property that MUST have a single string value
          that is one of 'rtl', 'ltr', or 'auto'. Indicates whether the tables in the group
          should be displayed with the first column on the right, on the left, or based on
          the first character in the table that has a specific direction. The value of this
          property becomes the value of the table direction annotation for all the tables
          in the table group. See Bidirectional Tables in [tabular-data-model] for details.
          The default value for this property is 'auto'."
      'cdi:textDirection':
        type: string
        enum:
        - Auto
        - Inherit
        - Ltr
        - Rtl
        description: >-
          Indicates the reading order of text within cells. From the W3C Recommendation "Metadata
          Vocabulary for Tabular Data" (https://www.w3.org/TR/tabular-metadata/) Inherited
          5.7: "textDirection: An atomic property that MUST have a single string value that
          is one of 'ltr', 'rtl', 'auto' or 'inherit' (the default). Indicates whether the
          text within cells should be displayed as left-to-right text (ltr), as right-to-left
          text (rtl), according to the content of the cell (auto) or in the direction inherited
          from the table direction annotation of the table. The value of this property determines
          the text direction annotation for the column, and the text direction annotation
          for the cells within that column: if the value is inherit then the value of the
          text direction annotation is the value of the table direction annotation on the
          table, otherwise it is the value of this property. See Bidirectional Tables in [tabular-data-model]
          for details."
      'cdi:treatConsecutiveDelimitersAsOne':
        type: boolean
        description: >-
          If the value is True, consecutive (adjacent) delimiters are treated as a single
          delimiter; if the value is False consecutive (adjacent) delimiters indicate a missing
          value.
      'cdi:trim':
        type: string
        enum:
        - Both
        - End
        - Neither
        - Start
        description: >-
          Specifies which spaces to remove from a data value (start, end, both, neither) From
          the W3C Recommendation "Metadata Vocabulary for Tabular Data" (https://www.w3.org/TR/tabular-metadata/)
          5.9 Dialect: "trim: An atomic property that, if the boolean true, sets the trim
          flag to true and if the boolean false to false. If the value provided is a string,
          sets the trim flag to the provided value, which MUST be one of 'true', 'false',
          'start', or 'end'. The default is true."
      'cdi:isDefinedBy':
        type: array
        items:
          anyOf:
          - '$ref': ../../skosProperties/skosConcept/schema.yaml
          - '$ref': '../ddicdiDataTypes/schema.yaml#/$defs/id-reference'
      'cdi:characterSet':
        type: string
        description: Default character set used in the physical data set.
      'cdi:encoding':
        '$ref': '../ddicdiDataTypes/schema.yaml#/$defs/ControlledVocabularyEntry'
        description: >-
          The character encoding of the represented data. From the W3C Recommendation "Metadata
          Vocabulary for Tabular Data" (https://www.w3.org/TR/tabular-metadata/) 5.9 Dialect:
          "encoding - An atomic property that sets the encoding flag to the single provided
          string value, which MUST be a defined in [encoding]. The default is 'utf-8'." From
          the same W3C recommendation 7.2 Encoding: "CSV files should be encoded using UTF-8,
          and should be in Unicode Normal Form C as defined in [UAX15]. If a CSV file is not
          encoded using UTF-8, the encoding should be specified through the charset parameter
          in the Content-Type header."
      'cdi:fileSize':
        type: number
        description: File size expressed as a real number.
      'cdi:fileSizeUofM':
        type: string
        description: Unit of measure of the fileSize as a simple string, e.g. KB, megabyte,
          GB, etc.
      'cdi:fingerprint':
        '$ref': '#/$defs/DataFingerprint'
        description: >-
          Universal Numerical Fingerprint or similar format-independent, canonical hash value
          of the physical representation of data in the physical data set.
      'cdi:identifier':
        '$ref': '../ddicdiDataTypes/schema.yaml#/$defs/Identifier'
        description: >-
          Identifier for objects requiring short- or long-lasting referencing and management.
      'cdi:name':
        '$ref': '../ddicdiDataTypes/schema.yaml#/$defs/ObjectName'
        description: >-
          Human understandable name (linguistic signifier, word, phrase, or mnemonic). May
          follow ISO/IEC 11179-5 naming principles, and have context provided to specify usage.
      'cdi:overview':
        '$ref': '../ddicdiDataTypes/schema.yaml#/$defs/InternationalString'
        description: >-
          Short natural language account of the information obtained from the combination
          of properties and relationships associated with an object.
      'cdi:physicalFileURL':
        type: string
        description: URL for the physical data set.
      'cdi:purpose':
        '$ref': '../ddicdiDataTypes/schema.yaml#/$defs/InternationalString'
        description: Intent or reason for the object/the description of the object.
      'cdi:recordCount':
        type: integer
        description: Number of records in the physical data set.
      'cdi:standard':
        type: array
        items:
          '$ref': '#/$defs/conformsTo'
        description: An established standard to which the described resource conforms.
      'cdi:has_InstanceVariable':
        type: array
        items:
          anyOf:
          - '$ref': ../ddicdiInstanceVariable/schema.yaml
          - '$ref': '../ddicdiDataTypes/schema.yaml#/$defs/id-reference'
      'cdi:has_PhysicalMapping':
        type: array
        items:
          anyOf:
          - '$ref': ../ddicdiPhysicalMapping/schema.yaml
          - '$ref': '../ddicdiDataTypes/schema.yaml#/$defs/id-reference'
      'cdi:has_PhysicalMappingPosition':
        type: array
        items:
          anyOf:
          - '$ref': '#/$defs/PhysicalMappingPosition'
          - '$ref': '../ddicdiDataTypes/schema.yaml#/$defs/id-reference'
      'cdi:correspondsTo':
        anyOf:
        - '$ref': '#/$defs/DataSet'
        - '$ref': '../ddicdiDataTypes/schema.yaml#/$defs/id-reference'
      'cdi:uses':
        anyOf:
        - '$ref': ../ddicdiLogicalRecord/schema.yaml
        - '$ref': '../ddicdiDataTypes/schema.yaml#/$defs/id-reference'
    required:
    - '@type'
  StructuredDataSet:
    type: object
    description: >-
      Information describing the physical aspects of a data set using a binary or highly structured
      text-based encoding.
    properties:
      '@type':
        type: array
        items:
          type: string
        contains:
          const: 'cdi:StructuredDataSet'
        minItems: 1
      '@id':
        type: string
        description: Identifier for this StructuredDataSet node
      'cdi:characterSet':
        type: string
        description: Default character set used in the physical data set.
      'cdi:encoding':
        '$ref': '../ddicdiDataTypes/schema.yaml#/$defs/ControlledVocabularyEntry'
        description: >-
          The character encoding of the represented data. From the W3C Recommendation "Metadata
          Vocabulary for Tabular Data" (https://www.w3.org/TR/tabular-metadata/) 5.9 Dialect:
          "encoding - An atomic property that sets the encoding flag to the single provided
          string value, which MUST be a defined in [encoding]. The default is 'utf-8'." From
          the same W3C recommendation 7.2 Encoding: "CSV files should be encoded using UTF-8,
          and should be in Unicode Normal Form C as defined in [UAX15]. If a CSV file is not
          encoded using UTF-8, the encoding should be specified through the charset parameter
