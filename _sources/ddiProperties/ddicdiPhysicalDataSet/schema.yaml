      'cdi:whiteSpace':
        type: string
        enum:
        - Collapse
        - Preserve
        - Replace
        description: >-
          The usual setting "collapse" states that leading and trailing white space will be
          removed and multiple adjacent white spaces will be treated as a single white space.
          When setting to "replace" all occurrences of #x9 (tab), #xA (line feed) and #xD
          (carriage return) are replaced with #x20 (space) but leading and trailing spaces
          will be retained. If the existence of any of these white spaces is critical to the
          understanding of the content, change the value of this attribute to "preserve".
      'cdi:hasValueFrom':
        anyOf:
        - '$ref': ../ddicdiValueDomain/schema.yaml
        - '$ref': '../ddicdiDataTypes/schema.yaml#/$defs/id-reference'
      'cdi:isStoredIn':
        anyOf:
        - '$ref': '#/$defs/DataPoint'
        - '$ref': '../ddicdiDataTypes/schema.yaml#/$defs/id-reference'
      'cdi:represents':
        anyOf:
        - '$ref': '#/$defs/ConceptualValue'
        - '$ref': '../ddicdiDataTypes/schema.yaml#/$defs/id-reference'
