$schema: https://json-schema.org/draft/2020-12/schema
title: CDIF Archive Distribution
description: >-
  ***NOTE---NEEDS work---A DataDownload distribution that is an archive file (e.g. ZIP) containing
  multiple component files described in schema:hasPart. The archive itself is
  typed as schema:DataDownload; each component file is typed as
  schema:MediaObject (not DataDownload, since they are not independently
  accessible via URL). Components may optionally include CDIF data description
  extensions (cdifTabularData, cdifDataCube) to describe their internal data
  structure.
type: object
allOf:
  - $ref: ../../../schemaorgProperties/dataDownload/schema.yaml
  - type: object
    properties:
      'schema:subjectOf':
        type: object
        properties:
          'dcterms:conformsTo':
            allOf:
            - contains:
                type: object
                properties:
                  '@id':
                    const: 'https://w3id.org/cdif/data_description/1.0'
      'schema:hasPart':
        description: >-
          When this DataDownload is an archive (encodingFormat includes
          application/zip), schema:hasPart MUST be present and list the
          component files inside the archive (see the conditional below).
          For non-archive distributions, schema:hasPart is optional.
        $ref: '#/$defs/archivePartArray'
  # Conditional: encodingFormat application/zip => hasPart is required and
  # must match archivePartArray. For non-archive distributions, no extra
  # constraint is imposed.
  - if:
      properties:
        'schema:encodingFormat':
          type: array
          contains:
            const: 'application/zip'
      required:
        - 'schema:encodingFormat'
    then:
      properties:
        'schema:hasPart':
          $ref: '#/$defs/archivePartArray'
      required:
        - 'schema:hasPart'
$defs:
  archivePartArray:
    type: array
    description: >-
      Array describing the files contained in the archive. Each item
      represents a component file that is part of the archive and is not
      independently accessible.
    items:
      $ref: '#/$defs/archivePartItem'
  archivePartItem:
    allOf:
      - type: object
        properties:
          "@id":
            type: string
            description: >-
              Identifier for this file, typically a hash-based anchor
              (e.g. '#abc123'). Used for cross-references from
              schema:about in metadata sidecar files.
          "@type":
            type: array
            description: >-
              Must include schema:MediaObject. Must NOT include
              schema:DataDownload since this file is not independently
              accessible. May include additional types for
              categorization.
            items:
              type: string
            contains:
              const: "schema:MediaObject"
            not:
              contains:
                const: "schema:DataDownload"
            minItems: 1
          "schema:name":
            type: string
            description: Filename of the component file within the archive.
          "schema:description":
            type: string
            description: >-
              Description of the file content. May include checksum
              information.
          "schema:encodingFormat":
            type: array
            description: MIME type(s) for this file.
            items:
              type: string
          "schema:size":
            type: object
            description: File size as a QuantitativeValue.
            properties:
              "@type":
                type: array
                items:
                  type: string
                contains:
                  const: "schema:QuantitativeValue"
                minItems: 1
              "schema:value":
                type: number
                description: Numeric size value.
              "schema:unitText":
                type: string
                description: "Unit of measure for size (e.g. 'byte')."
          "schema:about":
            type: array
            description: >-
              For metadata sidecar files, references the data file this
              metadata describes.
            items:
              type: object
              properties:
                "@id":
                  type: string
                  description: >-
                    Reference to the @id of the data file described by
                    this sidecar.
          "spdx:checksum":
            type: object
            description: >-
              Checksum for integrity verification of this component file.
            properties:
              "@type":
                type: array
                items:
                  type: string
                contains:
                  const: 'spdx:Checksum'
                minItems: 1
              "spdx:algorithm":
                type: string
              "spdx:checksumValue":
                type: string
            required:
              - '@type'
        required:
          - "@type"
          - "schema:name"
          - "schema:encodingFormat"
      - anyOf:
          - $ref: ../../../cdifDataType/cdifDataCube/schema.yaml
          - $ref: ../../../cdifDataType/cdifTabularData/schema.yaml
          - {}
