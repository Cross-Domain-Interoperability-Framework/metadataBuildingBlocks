- title: Autogenerated CDIF discovery test record.
  content: |-
    Example CDIF discovery metadata, bogus values generated with Oxygen from the JSON schema. Fixed a few things. Includes most of the possible stuff that might show up.

    In **Markdown** format.
  prefixes:
    schema: http://schema.org
    dcterms: http://purl.org/dc/terms/
  snippets:
    - language: json
      ref: exampleCDIFDiscovery.json

- title: CDIF Discovery profile, Minimal required.
  content: |-
    Simplest valid CDIF Discovery metadata with only required properties.
  prefixes:
    schema: http://schema.org/
    dcterms: http://purl.org/dc/terms/
  snippets:
    - language: json
      ref: exampleCDIFDiscoveryMinimal.json

- title: CDIF Discovery profile, All properties.
  content: |-
    CDIF Discovery metadata exercising every property allowed by the profile:
    measurement technique, variables measured (PropertyValue and StatisticalVariable),
    spatial coverage (bounding box with GeoSPARQL, point locations), temporal coverage
    (ISO 8601 string and W3C time:ProperInterval with numeric positions), quality
    measurements, provenance, full distribution with checksums, related links, and
    complete CatalogRecord metadata.
  prefixes:
    schema: http://schema.org/
    dcterms: http://purl.org/dc/terms/
    prov: http://www.w3.org/ns/prov#
    spdx: http://spdx.org/rdf/terms#
    dqv: http://www.w3.org/ns/dqv#
    geosparql: "http://www.opengis.net/ont/geosparql#"
    time: "http://www.w3.org/2006/time#"
    cdi: "http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/"
  snippets:
    - language: json
      ref: exampleCDIFDiscoveryComplete.json

