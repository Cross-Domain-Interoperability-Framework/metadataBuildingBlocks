---
$schema: https://json-schema.org/draft/2020-12/schema
type: object
title: CDIF complete metadata schema
description: >-
  CDIF complete profile combining core metadata with discovery properties,
  data description, archive distribution, and provenance extensions.
allOf:
- $ref: ../../../profiles/cdifProfile/cdifCore/schema.yaml
- $ref: ../../../profiles/cdifProfile/cdifDiscovery/schema.yaml
- $ref: ../../../profiles/cdifProfile/cdifDataDescription/schema.yaml
- $ref: ../../../profiles/cdifProfile/cdifDataStructure/schema.yaml
- $ref: ../../../profiles/cdifProfile/cdifArchiveDistribution/schema.yaml
- $ref: ../../../profiles/cdifProfile/cdifProvenance/schema.yaml
- type: object
  description: cdifComplete-specific additions. Measurement technique, spatial /
    temporal coverage, and quality measurement come through from cdifDiscovery
    via the allOf composition above; this branch only adds the multi-spec
    conformance declarations that mark a record as cdifComplete.
  properties:
    '@context':
      type: object
      description: Additional JSON-LD namespace prefixes for complete profile.
      properties:
        geosparql:
          const: "http://www.opengis.net/ont/geosparql#"
        dqv:
          const: "http://www.w3.org/ns/dqv#"
        cdi:
          const: "http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/"
    'schema:subjectOf':
      properties:
        'dcterms:conformsTo':
          allOf:
          - contains:
              type: object
              properties:
                '@id':
                  const: 'https://w3id.org/cdif/data_description/1.0'
          - contains:
              type: object
              properties:
                '@id':
                  const: 'https://w3id.org/cdif/manifest/1.0'
          - contains:
              type: object
              properties:
                '@id':
                  const: 'https://w3id.org/cdif/provenance/1.0'

