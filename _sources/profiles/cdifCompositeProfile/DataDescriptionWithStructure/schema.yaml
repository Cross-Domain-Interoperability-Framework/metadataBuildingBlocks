---
$schema: https://json-schema.org/draft/2020-12/schema
type: object
title: CDIF Data Structure metadata profile
description: >-
  CDIF Data Structure profile. Extends the Data Description profile with
  full DDI-CDI structural complexity: composing cdifDataStructure (DataStructure
  + Dimensional/Long/Wide variants), cdifDataStructureComponent (component
  subclasses), cdifRepresentedVariable, and cdifValueDomain. Distributions are
  expected to carry cdi:isStructuredBy pointing at a Data Structure node.
allOf:
- $ref: ../../../profiles/cdifProfile/cdifCore/schema.yaml
- $ref: ../../../profiles/cdifProfile/cdifDataDescription/schema.yaml
- type: object
  properties:
    '@context':
      type: object
      description: Additional JSON-LD namespace prefixes for the data structure profile.
      properties:
        geosparql:
          const: "http://www.opengis.net/ont/geosparql#"
        dqv:
          const: "http://www.w3.org/ns/dqv#"
        cdi:
          const: "http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/"
        cdif:
          const: "https://cdif.org/0.1/"
    'schema:variableMeasured':
      items:
        properties:
          'cdif:role': false
        description: >-
          In the Data Structure profile, variable role is encoded by the
          component class type (IdentifierComponent, MeasureComponent,
          AttributeComponent, DimensionComponent, VariableValueComponent,
          VariableDescriptorComponent) on cdi:isStructuredBy. Carrying
          cdif:role on the InstanceVariable would be redundant and is
          therefore disallowed at this profile level.

          The RepresentedVariable-level properties (cdi:hasIntendedDataType,
          cdi:describedUnitOfMeasure, cdif:simpleUnitOfMeasure,
          cdi:takesSentinelValuesFrom, cdi:takesSubstantiveValuesFrom), and
          the attribute-qualifies-measure relationship (cdi:qualifies),
          are NOT allowed on the InstanceVariable if they are already
          specified on the RepresentedVariable referenced by the
          DataStructureComponent that this InstanceVariable cdif:uses
          (for cdi:qualifies: on the AttributeComponent that wraps that
          RepresentedVariable). This is enforced by SHACL rules in
          CDIFDataStructureProfile/rules.shacl, not at the JSON Schema
          level, because the constraint is conditional on what the
          RepresentedVariable carries.
    'schema:distribution':
      items:
        properties:
          'cdi:isStructuredBy':
            description: >-
              Points at the Data Structure node that describes how this
              distribution's bytes are organized. Inline cdifDataStructure or
              @id-reference to a node defined elsewhere in the document. This
              property is specific to the Data Structure profile - the Data
              Description profile does not carry it. Required on DataDownload
              distributions typed as cdi:PhysicalDataSet (or subclass); for
              schema:WebAPI distributions, it lives on schema:potentialAction.items
              .schema:result instead (which describes the API response bytes -
              see the cdifDataDescription extension).
            anyOf:
            - '$ref': '../../../profiles/cdifProfile/cdifDataStructure/schema.yaml#/$defs/DimensionalDataStructure'
            - '$ref': '../../../profiles/cdifProfile/cdifDataStructure/schema.yaml#/$defs/WideDataStructure'
            - '$ref': '../../../profiles/cdifProfile/cdifDataStructure/schema.yaml#/$defs/LongDataStructure'
            - '$ref': '../../../profiles/cdifProfile/cdifDataStructure/schema.yaml#/$defs/DataStructure'
            - type: object
              properties:
                '@id':
                  type: string
              required: ['@id']
          'schema:potentialAction':
            items:
              properties:
                'schema:result':
                  properties:
                    'cdi:isStructuredBy':
                      description: >-
                        Data Structure for the API response bytes. MAY differ
                        from isStructuredBy values on sibling DataDownload
                        distributions (e.g., the API may serve a long-format
                        variant of a tabular dataset). Required on the result
                        when the distribution is a schema:WebAPI.
                      anyOf:
                      - '$ref': '../../../profiles/cdifProfile/cdifDataStructure/schema.yaml#/$defs/DimensionalDataStructure'
                      - '$ref': '../../../profiles/cdifProfile/cdifDataStructure/schema.yaml#/$defs/WideDataStructure'
                      - '$ref': '../../../profiles/cdifProfile/cdifDataStructure/schema.yaml#/$defs/LongDataStructure'
                      - '$ref': '../../../profiles/cdifProfile/cdifDataStructure/schema.yaml#/$defs/DataStructure'
                      - type: object
                        properties:
                          '@id':
                            type: string
                        required: ['@id']
        allOf:
        # Rule 0a: distributions typed as cdi:PhysicalDataSet (or subclass) must
        # carry cdi:isStructuredBy at the distribution level.
        - if:
            properties:
              '@type':
                contains: { const: 'cdi:PhysicalDataSet' }
          then:
            required:
            - 'cdi:isStructuredBy'
        # Rule 0b: schema:WebAPI distributions must carry cdi:isStructuredBy on
        # each potentialAction.result (not at the distribution level, since the
        # distribution describes the service and the result describes the bytes).
        - if:
            properties:
              '@type':
                contains: { const: 'schema:WebAPI' }
          then:
            properties:
              'schema:potentialAction':
                type: array
                items:
                  properties:
                    'schema:result':
                      required:
                      - 'cdi:isStructuredBy'
        # Rule 1: distributions typed as cdi:TabularTextDataSet or cdi:StructuredDataSet
        # (a specific physical realization) must carry cdif:hasPhysicalMapping.
        - if:
            properties:
              '@type':
                anyOf:
                - contains: { const: 'cdi:TabularTextDataSet' }
                - contains: { const: 'cdi:StructuredDataSet' }
          then:
            required:
            - 'cdif:hasPhysicalMapping'
        # Rule 2: distributions typed as bare cdi:PhysicalDataSet (no subclass) describe
        # a dataset that reuses a Data Structure's RepresentedVariables / components
        # without specifying physical file layout. cdif:hasPhysicalMapping is not
        # required; cdi:isStructuredBy must reference the abstract cdi:DataStructure
        # variant (not Long / Dimensional / Wide subclasses, which imply a specific
        # physical realization).
        - if:
            allOf:
            - properties:
                '@type':
                  contains: { const: 'cdi:PhysicalDataSet' }
            - properties:
                '@type':
                  not:
                    contains: { const: 'cdi:TabularTextDataSet' }
            - properties:
                '@type':
                  not:
                    contains: { const: 'cdi:StructuredDataSet' }
          then:
            properties:
              'cdi:isStructuredBy':
                # Either an @id-only reference (no inlined @type), or an inline node
                # whose @type does NOT include any Long/Dimensional/Wide subclass.
                properties:
                  '@type':
                    not:
                      anyOf:
                      - contains: { const: 'cdi:LongDataStructure' }
                      - contains: { const: 'cdi:DimensionalDataStructure' }
                      - contains: { const: 'cdi:WideDataStructure' }
    'schema:subjectOf':
      properties:
        'dcterms:conformsTo':
          contains:
            type: object
            properties:
              '@id':
                const: 'https://w3id.org/cdif/data_structure/1.0'
$defs:
  CdifDimensionalDataStructure:
    $ref: ../../../profiles/cdifProfile/cdifDataStructure/schema.yaml#/$defs/DimensionalDataStructure
  CdifWideDataStructure:
    $ref: ../../../profiles/cdifProfile/cdifDataStructure/schema.yaml#/$defs/WideDataStructure
  CdifLongDataStructure:
    $ref: ../../../profiles/cdifProfile/cdifDataStructure/schema.yaml#/$defs/LongDataStructure
  CdifDataStructureComponent:
    $ref: ../../../cdifDataType/cdifDataStructureComponent/schema.yaml
  CdifRepresentedVariable:
    $ref: ../../../cdifDataType/cdifRepresentedVariable/schema.yaml
  CdifValueDomain:
    $ref: ../../../cdifDataType/cdifValueDomain/schema.yaml
