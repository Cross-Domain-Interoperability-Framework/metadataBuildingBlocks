'$schema': 'https://json-schema.org/draft/2020-12/schema'
title: DDI-CDIF Descriptor
description: >-
  Code value appearing in a Long Data Set's Descriptor Variable column,
  identifying the logical InstanceVariable that the corresponding value
  in the Reference Variable column is a measure of. CDIF profile of
  cdi:Descriptor: simplified to the two properties named in Appendix 4
  of the CDIF Data Description Profile (`cdi:content`, `cdi:identifies`),
  with `cdi:identifies` targeting the conceptual InstanceVariable rather
  than the canonical XMI's ReferenceVariable (the XMI form is satisfied
  too, since ReferenceVariable specialises InstanceVariable).
type: object
properties:
  '@type':
    type: array
    items:
      type: string
    contains:
      const: 'cdi:Descriptor'
    minItems: 1
  '@id':
    type: string
    description: Identifier for this Descriptor node.
  'cdif:content':
    type: string
    description: >-
      The descriptor value appearing in the Long Data Set, expressed as a
      simple string (e.g. "Temp", "Pulse", "Weight").
  'cdif:identifies':
    anyOf:
    - '$ref': '../ddi-cdif-instance-variable/schema.yaml'
    - '$ref': '../ddi-cdif-data-types/schema.yaml#/$defs/id-reference'
    description: >-
      Reference to the cdi:InstanceVariable (the logical variable being
      measured) that the corresponding value in the Reference Variable
      column is associated with. Use an inline InstanceVariable or an
      `@id` reference to one declared elsewhere in the metadata.
required:
- '@type'
- 'cdi:content'
- 'cdi:identifies'
