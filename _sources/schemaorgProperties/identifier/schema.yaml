$schema: https://json-schema.org/draft/2020-12/schema
description: |
  Properties for a schema.org identifier (schema:PropertyValue pattern).
  **Union-type policy:** In CDIF profile UML models an attribute typed as
  schema:Identifier / schema:PropertyValue is represented by a single attribute
  of that class type. The JSON Schema implementation permits the property value
  to be EITHER a plain string (interpreted as the bare identifier value) OR a
  full schema:PropertyValue object (with explicit @type, propertyID, value).
  Consumers should accept either form.
type: object
properties:
  '@type':
    type: array
    items:
      type: string
    contains:
      const: schema:PropertyValue
    minItems: 1
  'schema:propertyID':
    type: string
    description: In this context for the schema:PropertyValue, this field is an identifier for the identifier
      schema, e.g. DOI, ARK.  Get values from https://registry.identifiers.org/registry/ for interoperability
  'schema:value':
    type: string
    description: the identifier string. E.g. 10.5066/F7VX0DMQ
  'schema:url':
    type: string
    format: uri
    description: 'web-resolveable string for the identifier; host name part is location of a resolver
      that will return some representation for the given identifier value. E.g. https://doi.org/10.5066/F7VX0DMQ '
allOf:
- required:
  - '@type'
- anyOf:
  - required:
    - schema:value
  - required:
    - schema:url