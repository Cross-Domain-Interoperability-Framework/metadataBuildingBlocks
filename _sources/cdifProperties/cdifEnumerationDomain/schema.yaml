'$schema': 'https://json-schema.org/draft/2020-12/schema'
title: CDIF Enumeration Domain
description: >-
  A base class acting as an extension point to allow a codification vocabulary to be documented as enumerated value domain.
type: object
properties:
  '@type':
    type: array
    items:
      type: string
    contains:
      const: 'cdif:EnumerationDomain'
    minItems: 1
  '@id':
    type: string
    description: Identifier for this EnumerationDomain node
  'cdif:identifier':
    '$ref': '../../schemaorgProperties/identifier/schema.yaml'
    description: >-
      Identifier for this enumerated (categorical) domain.
  'schema:name':
    type: string
    description: >-
      Human understandable name (liguistic signifier, word, phrase, or mnemonic).
  'cdif:references':
    description: SKOS concept scheme that contains concepts defining the allowed values of this enumeration domain.
    anyOf:
    - '$ref': '../../skosProperties/skosConceptScheme/schema.yaml'
    - type: object
      description: object reference via URI or URI fragment referencing an @id in the same document
      properties: 
        '@id':
          type: string
  'cdif:purpose':
    type: string
    description: Intent or reason for the object/the description of the object.
required:
- '@type'
- 'cdif:references'
