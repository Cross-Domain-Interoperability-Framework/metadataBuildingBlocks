- title: Minimal Data Cube
  content: |-
    Bare cdi:StructuredDataSet — schema only constrains @type to contain
    that const.
  prefixes:
    cdi: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/
  snippets:
    - language: json
      ref: exampleCdifDataCubeMinimal.json
- title: Complete Data Cube
  content: |-
    Multi-dimensional data cube with cdif:hasPhysicalMapping entries that
    use cdif:locator HDF5-style paths for each variable.
  prefixes:
    cdi: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/
    schema: http://schema.org/
  snippets:
    - language: json
      ref: exampleCdifDataCube.json
