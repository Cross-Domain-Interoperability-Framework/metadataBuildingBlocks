              - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/id-reference
            minItems: 1
          cdi:whiteSpace:
            type: string
            enum:
            - Collapse
            - Preserve
            - Replace
            description: 'The usual setting "collapse" states that leading and trailing
              white space will be removed and multiple adjacent white spaces will
              be treated as a single white space. When setting to "replace" all occurrences
              of #x9 (tab), #xA (line feed) and #xD (carriage return) are replaced
              with #x20 (space) but leading and trailing spaces will be retained.
              If the existence of any of these white spaces is critical to the understanding
              of the content, change the value of this attribute to "preserve".'
        required:
        - '@type'
      TypedString:
        type: object
        description: TypedString combines a type with content defined as a simple
          string. May be used wherever a simple string needs to support a type definition
          to clarify its content.
        properties:
          '@type':
            type: array
            items:
              type: string
