          cdi:identifier:
            description: Identifier for objects requiring short- or long-lasting referencing
              and management.
            allOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/Identifier
          cdi:represents:
