    x-jsonld-prefixes:
      cdi: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/
    x-schema-source: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-enumeration-domain/schema.yaml
    x-schema-version: https://json-schema.org/draft/2020-12/schema
  cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-physical-segment-layout:
    title: DDI-CDI Physical Segment Layout
    description: Used as an extension point in the description of the different layout
      styles of data structure descriptions.
    type: object
    properties:
      '@type':
        type: array
        items:
          type: string
        contains:
          enum:
          - cdi:PhysicalSegmentLayout
        minItems: 1
      '@id':
        type: string
        description: Identifier for this PhysicalSegmentLayout node
      cdi:allowsDuplicates:
        type: boolean
        description: "If value is False, the members are unique within the collection
          - if True, there may be duplicates. (Note that a mathematical \u201Cbag\u201D
          permits duplicates and is unordered - a \u201Cset\u201D does not have duplicates
          and may be ordered.)"
      cdi:arrayBase:
        type: integer
        description: 'The starting value for the numbering of cells, rows, columns,
          etc. when they constitute an ordered sequence (an array). Note that in DDI,
          this is typically either 0 or 1. In related W3C work (Model for Tabular
          Data and Metadata on the Web), they appear to standardize on 1 (see https://www.w3.org/TR/tabular-data-model/
          4.3 [Columns] and 4.4 [Rows]: "number - the position of the column amongst
          the columns for the associated table, starting from 1.")'
      cdi:commentPrefix:
        type: string
        description: 'A string used to indicate that an input line is a comment, a
          string which precedes a comment in the data file. From https://www.w3.org/TR/tabular-metadata/
          5.9 Dialect commentPrefix: ''An atomic property that sets the comment prefix
          flag to the single provided value, which MUST be a string. The default is
          "#".'''
      cdi:delimiter:
        type: string
        description: 'The Delimiting character in the data. Must be used if isDelimited
          is True. "The separator between cells, set by the delimiter property of
          a dialect description. The default is ,. See the W3C Recommendation "Metadata
          Vocabulary for Tabular Data" (https://www.w3.org/TR/tabular-data-model/#encoding).
          From the "CSV Dialect" specification (https://specs.frictionlessdata.io/csv-dialect/#specification):
          "delimiter: specifies a one-character string to use as the field separator.
          Default = ,."'
      cdi:encoding:
        description: 'The character encoding of the represented data. From the W3C
          Recommendation "Metadata Vocabulary for Tabular Data" (https://www.w3.org/TR/tabular-metadata/)
          5.9 Dialect: "encoding - An atomic property that sets the encoding flag
          to the single provided string value, which MUST be a defined in [encoding].
          The default is ''utf-8''." From the same W3C recommendation 7.2 Encoding:
          "CSV files should be encoded using UTF-8, and should be in Unicode Normal
          Form C as defined in [UAX15]. If a CSV file is not encoded using UTF-8,
          the encoding should be specified through the charset parameter in the Content-Type
          header."'
        allOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/ControlledVocabularyEntry
      cdi:escapeCharacter:
        type: string
        description: '"The string that is used to escape the quote character within
          escaped cells, or null" see https://www.w3.org/TR/tabular-data-model/#encoding.
          From https://www.w3.org/TR/tabular-metadata/ 5.9 Dialect "doubleQuote: A
          boolean atomic property that, if true, sets the escape character flag to
          ". If false, to \. The default is true." From http://specs.frictionlessdata.io/csv-dialect/
          "doubleQuote: controls the handling of quotes inside fields. If true, two
          consecutive quotes should be interpreted as one. Default = true".'
      cdi:hasHeader:
        type: boolean
        description: 'True if the file contains a header containing column names.
          From https://www.w3.org/TR/tabular-metadata/ 5.9 Dialect "header: A boolean
          atomic property that, if true, sets the header row count flag to 1, and
          if false to 0, unless headerRowCount is provided, in which case the value
          provided for the header property is ignored. The default is true." From
          http://specs.frictionlessdata.io/csv-dialect/ "header: indicates whether
          the file includes a header row. If true the first row in the file is a header
          row, not data. Default = true".'
      cdi:headerIsCaseSensitive:
        type: boolean
        description: 'If True, the case of the labels in the header is significant.
          From the "CSV Dialect" specification (http://specs.frictionlessdata.io/csv-dialect/):
          "caseSensitiveHeader: indicates that case in the header is meaningful. For
          example, columns CAT and Cat should not be equated. Default = false."'
      cdi:headerRowCount:
        type: integer
        description: 'The number of lines in the header From https://www.w3.org/TR/tabular-metadata/
          5.9 Dialect "headerRowCount: A numeric atomic property that sets the header
          row count flag to the single provided value, which MUST be a non-negative
          integer. The default is 1."'
      cdi:identifier:
        description: Identifier for objects requiring short- or long-lasting referencing
          and management.
        allOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/Identifier
      cdi:isDelimited:
        type: boolean
        description: Indicates whether the data are in a delimited format. If "true,"
          the format is delimited, and the isFixedWidth property must be set to "false."
          If not set to "true," the property isFixedWitdh must be set to "true."
      cdi:isFixedWidth:
        type: boolean
        description: Set to true if the file is fixed-width. If true, isDelimited
          must be set to false.
      cdi:lineTerminator:
        type: array
        items:
          type: string
        minItems: 1
        description: 'The strings that can be used at the end of a row, set by the
          lineTerminators property of a dialect description. The default is [CRLF,
          LF]. See the W3C Recommendation "Metadata Vocabulary for Tabular Data" (https://www.w3.org/TR/tabular-data-model/#encoding)
          5.9 Dialect "lineTerminators: An atomic property that sets the line terminators
          flag to either an array containing the single provided string value, or
          the provided array. The default is [''rn'', ''n'']." Also, from the "CSV
          Dialect" specification (http://specs.frictionlessdata.io/csv-dialect/):
          "lineTerminator: specifies the character sequence which should terminate
          rows. Default = rn."'
      cdi:name:
        type: array
        items:
          $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/ObjectName
        minItems: 1
        description: A linguistic signifier. Human understandable name (word, phrase,
          or mnemonic) that reflects the ISO/IEC 11179-5 naming principles. If more
          than one name is provided provide a context to differentiate usage.
      cdi:nullSequence:
        type: string
        description: 'A string indicating a null value. From the W3C Recommendation
          "Metadata Vocabulary for Tabular Data" (https://www.w3.org/TR/tabular-metadata/)
          4.3: "null: the string or strings which cause the value of cells having
          string value matching any of these values to be null." From the same source,
          Inherited 5.7: "null: An atomic property giving the string or strings used
          for null values within the data. If the string value of the cell is equal
          to any one of these values, the cell value is null. See Parsing Cells in
          [tabular-data-model] for more details. If not specified, the default for
          the null property is the empty string ''''. The value of this property becomes
          the null annotation for the described column."'
      cdi:overview:
        description: Short natural language account of the information obtained from
          the combination of properties and relationships associated with an object.
        allOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/InternationalString
      cdi:isDefinedBy:
        type: array
        items:
          anyOf:
          - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.skosProperties.skosConcept
          - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/id-reference
        minItems: 1
      cdi:formats:
        anyOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-logical-record
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/id-reference
      cdi:has_ValueMapping:
        type: array
        items:
          anyOf:
          - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-physical-segment-layout/$defs/ValueMapping
          - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/id-reference
        minItems: 1
      cdi:has_ValueMappingPosition:
        type: array
        items:
          anyOf:
          - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-physical-segment-layout/$defs/ValueMappingPosition
          - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/id-reference
        minItems: 1
      cdi:purpose:
        description: Intent or reason for the object/the description of the object.
        allOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/InternationalString
      cdi:quoteCharacter:
        type: string
        description: '"The string that is used around escaped cells, or null, set
          by the quoteChar property of a dialect description. The default is ".".
          See W3C Recommendation "Model for Tabular Data and Metadata on the Web",
          https://www.w3.org/TR/tabular-data-model/#parsing. From the W3C Recommendation
          "Metadata Vocabulary for Tabular Data" (https://www.w3.org/TR/tabular-metadata/)
          5.9 Dialect: "quoteChar: An atomic property that sets the quote character
          flag to the single provided value, which MUST be a string or null. If the
          value is null, the escape character flag is also set to null. The default
          is ''"''." From the CSV Dialect specification (http://specs.frictionlessdata.io/csv-dialect/):
          "quoteChar: specifies a one-character string to use as the quoting character.
          Default = "."'
      cdi:skipBlankRows:
        type: boolean
        description: 'If the value is True, blank rows are ignored. From the W3C Recommendation
          "Metadata Vocabulary for Tabular Data" (https://www.w3.org/TR/tabular-metadata/)
          5.9 Dialect: "skipBlankRows: A boolean atomic property that sets the skip
          blank rows flag to the single provided boolean value. The default is false."'
      cdi:skipDataColumns:
        type: integer
        description: 'The number of columns to skip at the beginning of the row. From
          the W3C Recommendation "Metadata Vocabulary for Tabular Data" (https://www.w3.org/TR/tabular-metadata/)
          5.9 Dialect: "skipColumns: A numeric atomic property that sets the skip
          columns flag to the single provided numeric value, which MUST be a non-negative
          integer. The default is 0." A value other than 0 will mean that the source
          numbers of columns will be different from their numbers.'
      cdi:skipInitialSpace:
        type: boolean
        description: 'If the value is True, skip whitespace at the beginning of a
          line or following a delimiter. From the W3C Recommendation "Metadata Vocabulary
          for Tabular Data" (https://www.w3.org/TR/tabular-metadata/) 5.9 Dialect:
          "skipInitialSpace: A boolean atomic property that, if true, sets the trim
          flag to ''start'' and if false, to false. If the trim property is provided,
          the skipInitialSpace property is ignored. The default is false." From the
          CSV Dialect specification (http://specs.frictionlessdata.io/csv-dialect/):
          "skipInitialSpace: specifies how to interpret whitespace which immediately
          follows a delimiter; if false, it means that whitespace immediately after
          a delimiter should be treated as part of the following field. Default =
          true."'
      cdi:skipRows:
        type: integer
        description: 'Number of input rows to skip preceding the header or data. From
          the W3C Recommendation "Metadata Vocabulary for Tabular Data" (https://www.w3.org/TR/tabular-metadata/)
          5.9 Dialect: "skipRows: A numeric atomic property that sets the skip rows
          flag to the single provided numeric value, which MUST be a non-negative
          integer. The default is 0." A value greater than 0 will mean that the source
          numbers of rows will be different from their numbers.'
      cdi:tableDirection:
        type: string
        enum:
        - Auto
        - Ltr
        - Rtl
        description: 'Indicates the direction in which columns are arranged in each
          row. From the W3C Recommendation "Metadata Vocabulary for Tabular Data"
          (https://www.w3.org/TR/tabular-metadata/) 5.3.2: "tableDirection: An atomic
          property that MUST have a single string value that is one of ''rtl'', ''ltr'',
          or ''auto''. Indicates whether the tables in the group should be displayed
          with the first column on the right, on the left, or based on the first character
          in the table that has a specific direction. The value of this property becomes
          the value of the table direction annotation for all the tables in the table
          group. See Bidirectional Tables in [tabular-data-model] for details. The
          default value for this property is ''auto''."'
      cdi:textDirection:
        type: string
        enum:
        - Auto
        - Inherit
        - Ltr
        - Rtl
        description: 'Indicates the reading order of text within cells. From the W3C
          Recommendation "Metadata Vocabulary for Tabular Data" (https://www.w3.org/TR/tabular-metadata/)
          Inherited 5.7: "textDirection: An atomic property that MUST have a single
          string value that is one of ''ltr'', ''rtl'', ''auto'' or ''inherit'' (the
          default). Indicates whether the text within cells should be displayed as
          left-to-right text (ltr), as right-to-left text (rtl), according to the
          content of the cell (auto) or in the direction inherited from the table
          direction annotation of the table. The value of this property determines
          the text direction annotation for the column, and the text direction annotation
          for the cells within that column: if the value is inherit then the value
          of the text direction annotation is the value of the table direction annotation
          on the table, otherwise it is the value of this property. See Bidirectional
          Tables in [tabular-data-model] for details."'
      cdi:treatConsecutiveDelimitersAsOne:
        type: boolean
        description: If the value is True, consecutive (adjacent) delimiters are treated
          as a single delimiter; if the value is False consecutive (adjacent) delimiters
          indicate a missing value.
      cdi:trim:
        type: string
        enum:
        - Both
        - End
        - Neither
        - Start
        description: 'Specifies which spaces to remove from a data value (start, end,
          both, neither) From the W3C Recommendation "Metadata Vocabulary for Tabular
          Data" (https://www.w3.org/TR/tabular-metadata/) 5.9 Dialect: "trim: An atomic
          property that, if the boolean true, sets the trim flag to true and if the
          boolean false to false. If the value provided is a string, sets the trim
          flag to the provided value, which MUST be one of ''true'', ''false'', ''start'',
          or ''end''. The default is true."'
    required:
    - '@type'
    $defs:
      DataPoint:
        type: object
        description: Container for an instance value.
        properties:
          '@type':
            type: array
            items:
              type: string
            contains:
              enum:
              - cdi:DataPoint
            minItems: 1
          '@id':
            type: string
            description: Identifier for this DataPoint node
          cdi:identifier:
            description: Identifier for objects requiring short- or long-lasting referencing
              and management.
            allOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/Identifier
          cdi:correspondsTo:
            type: array
            items:
              anyOf:
              - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-structure-component
              - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/id-reference
            minItems: 1
          cdi:isDescribedBy:
            anyOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifInstanceVariable
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/id-reference
        required:
        - '@type'
      PhysicalSegmentLocation:
        type: object
        description: Location of a data point in a physical segment.
        properties:
          '@type':
            type: array
            items:
              type: string
            contains:
              enum:
              - cdi:PhysicalSegmentLocation
            minItems: 1
          '@id':
            type: string
            description: Identifier for this PhysicalSegmentLocation node
          cdi:identifier:
            description: Identifier for objects requiring short- or long-lasting referencing
              and management.
            allOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/Identifier
        required:
        - '@type'
      ValueMapping:
        type: object
        description: Physical characteristics for the value of an instance variable
          stored in a data point as part of a physical segment layout.
        properties:
          '@type':
            type: array
            items:
              type: string
            contains:
              enum:
              - cdi:ValueMapping
            minItems: 1
          '@id':
            type: string
            description: Identifier for this ValueMapping node
          cdi:decimalPositions:
            type: integer
            description: The number of decimal positions expressed as an integer.
              Used when the decimal position is implied (no decimal separator is present)
              See DDI 3.2 ManagedNumericRepresentation_decimalPositions
          cdi:defaultDecimalSeparator:
            type: string
            description: 'Default value is "." (period). The character separating
              the integer part from the fractional part of a decimal or real number.
              From the W3C Recommendation "Metadata Vocabulary for Tabular Data" (https://www.w3.org/TR/tabular-metadata/)
              6.4.2: "decimalChar: A string whose value is used to represent a decimal
              point within the number. If the supplied value is not a string, implementations
              MUST issue a warning and proceed as if the property had not been specified."'
          cdi:defaultDigitGroupSeparator:
            type: string
            description: 'Default value is null. A character separating groups of
              digits (for readability). In W3C part of the datatype format From https://www.w3.org/TR/tabular-metadata/
              tabular 6.4.2 groupChar: "A string whose value is used to group digits
              within the number. If the supplied value is not a string, implementations
              MUST issue a warning and proceed as if the property had not been specified."'
          cdi:defaultValue:
            type: string
            description: A default string indicating the value to substitute for an
              empty string. From https://www.w3.org/TR/tabular-metadata/ Inherited
              5.7 "default - An atomic property holding a single string that is used
              to create a default value for the cell in cases where the original string
              value is an empty string. See Parsing Cells in [tabular-data-model]
              for more details. If not specified, the default for the default property
              is the empty string, "". The value of this property becomes the default
              annotation for the described column."
          cdi:format:
            description: 'This defines the format of the physical representation of
              the value. From https://www.w3.org/TR/tabular-metadata/ 5.11.2 format:
              "An atomic property that contains either a single string or an object
              that defines the format of a value of this type, used when parsing a
              string value as described in Parsing Cells in [tabular-data-model].
              The value of this property becomes the format annotation for the described
              datatype." See https://www.w3.org/TR/tabular-metadata/ Tabular 6.4.2
              "Formats for numeric datatypes" this may include decimalChar, groupChar,
              pattern "By default, numeric values must be in the formats defined in
              [xmlschema11-2]. It is not uncommon for numbers within tabular data
              to be formatted for human consumption, which may involve using commas
              for decimal points, grouping digits in the number using commas, or adding
              percent signs to the number." See https://www.w3.org/TR/tabular-metadata/
              Tabular 6.4. Formats for Booleans " Boolean values may be represented
              in many ways aside from the standard 1 and 0 or true and false." See
              https://www.w3.org/TR/tabular-metadata/ 6.4.4. Formats for dates and
              times "By default, dates and times are assumed to be in the format defined
              in [xmlschema11-2]. However dates and times are commonly represented
              in tabular data in other formats." See https://www.w3.org/TR/tabular-metadata/
              6.4.5 Formats for durations "Durations MUST be formatted and interpreted
              as defined in [xmlschema11-2], using the [ISO8601] format -?PnYnMnDTnHnMnS.
              For example, the duration P1Y1D is used for a year and a day; the duration
              PT2H30M for 2 hours and 30 minutes." See https://www.w3.org/TR/tabular-metadata/
              6.4.6 Formats for other types "If the datatype base is not numeric,
              boolean, a date/time type, or a duration type, the datatype format annotation
              provides a regular expression for the string values, with syntax and
              processing defined by [ECMASCRIPT]. If the supplied value is not a valid
              regular expression, implementations MUST issue a warning and proceed
              as if no format had been provided." From DDI3.2 ManagedNumericRepresentation@format
              "A format for number expressed as a string." From DDI3.2 ManagedDateTimeRepresentation_DateFieldFormat
              "Describes the format of the date field, in formats such as YYYY/MM
              or MM-DD-YY, etc. If this element is omitted, then the format is assumed
              to be the XML Schema format corresponding to the type attribute value."'
            allOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/ControlledVocabularyEntry
          cdi:identifier:
            description: Identifier for objects requiring short- or long-lasting referencing
              and management.
            allOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/Identifier
          cdi:isRequired:
            type: boolean
            description: 'If the value of this property is True indicates that a value
              is required for the referenced instance variable. From the W3C Recommendation
              "Metadata Vocabulary for Tabular Data" (https://www.w3.org/TR/tabular-metadata/)
              5.7 Inherited Properties: "required: A boolean atomic property taking
              a single value which indicates whether the cell value can be null. See
              Parsing Cells in [tabular-data-model] for more details. The default
              is false, which means cells can have null values. The value of this
              property becomes the required annotation for the described column."'
          cdi:length:
            type: integer
            description: 'The length in characters of the physical representation
              of the value. From the W3C Recommendation "Metadata Vocabulary for Tabular
              Data" (https://www.w3.org/TR/tabular-metadata/) 5.11.2 "length: A numeric
              atomic property that contains a single integer that is the exact length
              of the value. The value of this property becomes the length annotation
              for the described datatype. See Length Constraints in [tabular-data-model]
              for details." Corresponds to DDI2.5 var/location/width and DDI 3.2 PhysicalLocation/Width.'
          cdi:maximumLength:
            type: integer
            description: 'The largest possible value of the length of the physical
              representation of the value. From the W3C Recommendation "Metadata Vocabulary
              for Tabular Data" (https://www.w3.org/TR/tabular-metadata/) 5.11.2:
              "maxLength: A numeric atomic property that contains a single integer
              that is the maximum length of the value. The value of this property
              becomes the maximum length annotation for the described datatype. See
              Length Constraints in [tabular-data-model] for details."'
          cdi:minimumLength:
            type: integer
            description: 'The smallest possible value for the length of the physical
              representation of the value. From the W3C Recommendation "Metadata Vocabulary
              for Tabular Data" (https://www.w3.org/TR/tabular-metadata/) 5.11.2:
              "minLength: An atomic property that contains a single integer that is
              the minimum length of the value. The value of this property becomes
              the minimum length annotation for the described datatype. See Length
              Constraints in [tabular-data-model] for details."'
          cdi:nullSequence:
            type: string
            description: 'A string indicating a null value. From the W3C Recommendation
              "Metadata Vocabulary for Tabular Data" (https://www.w3.org/TR/tabular-metadata/)
              4.3: "null: the string or strings which cause the value of cells having
              string value matching any of these values to be null." From the same
              source, Inherited 5.7: "null: An atomic property giving the string or
              strings used for null values within the data. If the string value of
              the cell is equal to any one of these values, the cell value is null.
              See Parsing Cells in [tabular-data-model] for more details. If not specified,
              the default for the null property is the empty string ''''. The value
              of this property becomes the null annotation for the described column."'
          cdi:numberPattern:
            type: string
            description: "A pattern description of the format of a numeric value.
              In W3C part of the datatype format From https://www.w3.org/TR/tabular-metadata/
              tabular 6.4.2 pattern: \"A number format pattern as defined in [UAX35]
              http://www.unicode.org/reports/tr35/tr35-31/tr35-numbers.html#Number_Format_Patterns.
              Implementations MUST recognise number format patterns containing the
              symbols 0, #, the specified decimalChar (or \".\" if unspecified), the
              specified groupChar (or \",\" if unspecified), E, +, % and \u2030. Implementations
              MAY additionally recognise number format patterns containing other special
              pattern characters defined in [UAX35]. If the supplied value is not
              a string, or if it contains an invalid number format pattern or uses
              special pattern characters that the implementation does not recognise,
              implementations MUST issue a warning and proceed as if the property
              had not been specified. If the datatype format annotation is a single
              string, this is interpreted in the same way as if it were an object
              with a pattern property whose value is that string. If the groupChar
              is specified, but no pattern is supplied, when parsing the string value
              of a cell against this format specification, implementations MUST recognise
              and parse numbers that consist of: an optional + or - sign, \u2026 Implementations
              MAY also recognise numeric values that are in any of the standard-decimal,
              standard-percent or standard-scientific formats listed in the Unicode
              Common Locale Data Repository. \u2026\""
          cdi:formats:
            type: array
            items:
              anyOf:
              - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-physical-segment-layout/$defs/DataPoint
              - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/id-reference
            minItems: 1
          cdi:uses:
            anyOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-physical-segment-layout/$defs/PhysicalSegmentLocation
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/id-reference
          cdi:physicalDataType:
            description: 'The base datatype of the physical representation. An integer
              InstanceVariable might, for example, be stored as a floating point number.
              From the W3C Recommendation "Metadata Vocabulary for Tabular Data" (https://www.w3.org/TR/tabular-metadata/)
              Inherited 5.7: "datatype: An atomic property that contains either a
              single string that is the main datatype of the values of the cell or
              a datatype description object. If the value of this property is a string,
              it MUST be the name of one of the built-in datatypes defined in section
              5.11.1 Built-in Datatypes and this value is normalized to an object
              whose base property is the original string value. If it is an object
              then it describes a more specialized datatype. If a cell contains a
              sequence (i.e. the separator property is specified and not null) then
              this property specifies the datatype of each value within that sequence.
              See 5.11 Datatypes and Parsing Cells in [tabular-data-model] for more
              details. The normalized value of this property becomes the datatype
              annotation for the described column."'
            allOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/ControlledVocabularyEntry
          cdi:scale:
            type: integer
            description: The scale of the number expressed as an integer. A multiplier
              to be used in combination with the value to determine the measurement.
              (E.g., a number expressed in 100's with a value of 5 and a scale of
              100 would be 500).
        required:
        - '@type'
      ValueMappingPosition:
        type: object
        description: Denotes the position of a value mapping in a sequence.
        properties:
          '@type':
            type: array
            items:
              type: string
            contains:
              enum:
              - cdi:ValueMappingPosition
            minItems: 1
          '@id':
            type: string
            description: Identifier for this ValueMappingPosition node
          cdi:identifier:
            description: Identifier for objects requiring short- or long-lasting referencing
              and management.
            allOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/Identifier
          cdi:indexes:
            anyOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-physical-segment-layout/$defs/ValueMapping
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/id-reference
          cdi:value:
            type: integer
            description: Index value of the member in an ordered array.
        required:
        - '@type'
    x-jsonld-prefixes:
      cdi: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/
    x-schema-source: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-physical-segment-layout/schema.yaml
    x-schema-version: https://json-schema.org/draft/2020-12/schema
  cdif.bbr.metadata.schemaorgProperties.labeledLink:
    description: schema for a labeled link, a profile of schema.org/CreativeWork
    type: object
    properties:
      '@type':
        default: schema:CreativeWork
        type: array
        items:
          type: string
        contains:
          enum:
          - schema:CreativeWork
        minItems: 1
      schema:name:
        type: string
      schema:description:
        type: string
      schema:url:
        type: string
        format: uri
    required:
    - '@type'
    - schema:url
    x-jsonld-prefixes:
      schema: http://schema.org/
    x-schema-source: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/schemaorgProperties/labeledLink/schema.yaml
    x-schema-version: https://json-schema.org/draft/2020-12/schema
  cdif.bbr.metadata.schemaorgProperties.identifier:
    description: Properties for a schema.org identifier
    type: object
    properties:
      '@type':
        type: array
        items:
          type: string
        contains:
          enum:
          - schema:PropertyValue
        minItems: 1
      schema:propertyID:
        type: string
        description: In this context for the schema:PropertyValue, this field is an
          identifier for the identifier schema, e.g. DOI, ARK.  Get values from https://registry.identifiers.org/registry/
          for interoperability
      schema:value:
        type: string
        description: the identifier string. E.g. 10.5066/F7VX0DMQ
      schema:url:
        type: string
        format: uri
        description: 'web-resolveable string for the identifier; host name part is
          location of a resolver that will return some representation for the given
          identifier value. E.g. https://doi.org/10.5066/F7VX0DMQ '
    allOf:
    - required:
      - '@type'
    - anyOf:
      - required:
        - schema:value
      - required:
        - schema:url
    x-jsonld-prefixes:
      schema: http://schema.org/
    x-schema-source: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/schemaorgProperties/identifier/schema.yaml
    x-schema-version: https://json-schema.org/draft/2020-12/schema
  cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-agent:
    title: DDI-CDI Agent
    description: DDI-CDI Agent class hierarchy. Covers Individual (person), Machine
      (software/hardware), Organization (group/institution), and ProcessingAgent (orchestrates
      production activities) using DDI Cross-Domain Integration vocabulary. Each agent
      subtype is defined in its own building block; this schema composes them.
    anyOf:
    - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-individual
    - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-machine
    - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-organization
    - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-processing-agent
    x-jsonld-prefixes:
      cdi: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/
    x-schema-source: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-agent/schema.yaml
    x-schema-version: https://json-schema.org/draft/2020-12/schema
  cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-logical-record:
    title: DDI-CDI Logical Record
    description: Collection of instance variables.
    type: object
    properties:
      '@type':
        type: array
        items:
          type: string
        contains:
          enum:
          - cdi:LogicalRecord
        minItems: 1
      '@id':
        type: string
        description: Identifier for this LogicalRecord node
      cdi:organizes:
        type: array
        description: object reference(s) to datasets that use this logicalRecord;
        items:
          $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/id-reference
        minItems: 1
      cdi:isDefinedBy:
        type: array
        description: points to a Unit Type, Universe, or Population which provides
          a description of the subject of the Logical Record.
        items:
