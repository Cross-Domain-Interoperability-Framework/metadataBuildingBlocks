  cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-controlled-vocabulary-entry:
    title: DDI-CDI Controlled Vocabulary Entry
    description: Allows for unstructured content which may be an entry from an externally
      maintained controlled vocabulary.If the content is from a controlled vocabulary
      provide the code value of the entry, as well as a reference to the controlled
      vocabulary from which the value is taken. Provide as many of the identifying
      attributes as needed to adequately identify the controlled vocabulary. Note
      that DDI has published a number of controlled vocabularies applicable to several
      locations using the external controlled vocabulary entry structure. If the code
      portion of the controlled vocabulary entry is language specific (i.e. a list
      of keywords or subject headings) use language to specify that language. In most
      cases the code portion of an entry is not language specific although the description
      and usage may be managed in one or more languages. Use of shared controlled
      vocabularies helps support interoperability and machine actionability.
    type: object
    properties:
      '@type':
        type: array
        items:
          type: string
        contains:
          enum:
          - cdi:ControlledVocabularyEntry
        minItems: 1
      '@id':
        type: string
        description: Identifier for this ControlledVocabularyEntry node
      cdi:entryReference:
        type: array
        items:
          $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/Reference
        minItems: 1
        description: A reference to the specific item in the vocabulary referenced
          in the vocabulary attribute, using a URI or other resolvable identifier.
      cdi:entryValue:
        type: array
        items:
          type: string
        minItems: 1
        description: The value of the entry of the controlled vocabulary. If no controlled
          vocabulary is used the term is entered here and none of the properties defining
          the controlled vocabulary location are used.
      cdi:name:
        type: string
        description: The name of the code list (controlled vocabulary).
      cdi:valueForOther:
        type: string
        description: If the value of the string is "Other" or the equivalent from
          the codelist, this attribute can provide a more specific value not found
          in the codelist.
      cdi:vocabulary:
        description: A reference to the external controlled vocabulary, using a URI
          or other resolvable identifier.
        allOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/Reference
    required:
    - '@type'
