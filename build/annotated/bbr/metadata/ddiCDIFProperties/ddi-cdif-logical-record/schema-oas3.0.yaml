          cdi:isDefinedBy:
            anyOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.skosProperties.skosConcept
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/id-reference
          cdi:groups:
            type: array
            items:
              anyOf:
              - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-enumeration-domain/$defs/ClassificationItem
              - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/id-reference
            minItems: 1
        required:
        - '@type'
      LevelStructure:
        type: object
        description: Nesting structure of a hierarchical collection.
        properties:
          '@type':
            type: array
            items:
              type: string
            contains:
              enum:
              - cdi:LevelStructure
            minItems: 1
          '@id':
