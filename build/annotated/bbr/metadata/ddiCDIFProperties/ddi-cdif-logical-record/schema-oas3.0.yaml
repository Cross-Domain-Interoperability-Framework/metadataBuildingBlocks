x-defs:
  cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types:
    title: DDI-CDI Data Types
    description: Shared DDI-CDI structured data types from DDICDILibrary/DataTypes.
      Provides reusable $defs for identifiers, names, contact information, references,
      and other common DDI-CDI structured data types.
    $defs:
      id-reference:
        type: object
        description: JSON-LD @id reference to a node defined elsewhere in the graph
        properties:
          '@id':
            type: string
            description: IRI or blank node identifier of the referenced node
        required:
        - '@id'
      ObjectName:
        type: object
        description: DDI-CDI structured name wrapper (dt-ObjectName)
        properties:
          '@type':
            type: array
            items:
              type: string
            contains:
              enum:
              - cdi:ObjectName
            minItems: 1
          cdi:name:
            type: string
            description: The name string
          cdi:context:
            description: Context or usage of this name
            allOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/ControlledVocabularyEntry
        required:
        - cdi:name
      OrganizationName:
        type: object
        description: DDI-CDI organization name (dt-OrganizationName, extends ObjectName)
        properties:
          '@type':
            type: array
            items:
              type: string
            contains:
              enum:
              - cdi:OrganizationName
            minItems: 1
          cdi:name:
            type: string
            description: The name string
          cdi:context:
            description: Context or usage of this name
            allOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/ControlledVocabularyEntry
          cdi:abbreviation:
            description: Abbreviated form of the name
            allOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/InternationalString
          cdi:effectiveDates:
            description: Date range when this name is/was effective
            allOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/DateRange
          cdi:isFormal:
            type: boolean
            default: true
            description: Whether this is the formal/legal name
          cdi:typeOfOrganizationName:
            description: Classification of this name (e.g. legal, trade, acronym)
            allOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/ControlledVocabularyEntry
        required:
        - cdi:name
      IndividualName:
        type: object
        description: DDI-CDI individual name (dt-IndividualName)
        properties:
          '@type':
            type: array
            items:
              type: string
            contains:
              enum:
              - cdi:IndividualName
            minItems: 1
          cdi:firstGiven:
            type: string
            description: First or given name
          cdi:lastFamily:
            type: string
            description: Last or family name
          cdi:middle:
            type: string
            description: Middle name(s)
          cdi:prefix:
            type: string
            description: Name prefix (e.g. Dr., Prof.)
          cdi:suffix:
            type: string
            description: Name suffix (e.g. Jr., III)
          cdi:fullName:
            description: Full name as a single internationalized string
            allOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/InternationalString
          cdi:abbreviation:
            description: Abbreviated form of the name
            allOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/InternationalString
          cdi:isFormal:
            type: boolean
            default: true
            description: Whether this is a formal name
          cdi:isPreferred:
            type: boolean
            default: false
            description: Whether this is the preferred name
          cdi:effectiveDates:
            description: Date range when this name is/was effective
            allOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/DateRange
          cdi:context:
            description: Context or usage of this name
            allOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/ControlledVocabularyEntry
          cdi:typeOfIndividualName:
            description: Classification of this name (e.g. birth, married, pen)
            allOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/ControlledVocabularyEntry
          cdi:sex:
            description: Sex specification associated with this name
            allOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/SexSpecification
      LabelForDisplay:
        type: object
        description: DDI-CDI multilingual display label (dt-LabelForDisplay)
        properties:
          '@type':
            type: array
            items:
              type: string
            contains:
              enum:
              - cdi:LabelForDisplay
            minItems: 1
          cdi:locationVariant:
            description: Geographic or locale variant
            allOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/ControlledVocabularyEntry
          cdi:maxLength:
            type: integer
            description: Maximum display length
          cdi:languageSpecificString:
            description: The label text with language tag
            allOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/LanguageString
      SexSpecification:
        type: object
        description: DDI-CDI sex specification (dt-SexSpecification)
        properties:
          '@type':
            type: array
            items:
              type: string
            contains:
              enum:
              - cdi:SexSpecification
            minItems: 1
          cdi:sexCode:
            type: string
            description: Code identifying sex (e.g. ISO 5218 values)
      ContactInformation:
        type: object
        description: DDI-CDI contact information (dt-ContactInformation)
        properties:
          '@type':
            type: array
            items:
              type: string
            contains:
              enum:
              - cdi:ContactInformation
            minItems: 1
          cdi:address:
            description: Postal address(es)
            anyOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/Address
            - type: array
              items:
                $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/Address
          cdi:email:
            description: Email address(es)
            anyOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/Email
            - type: array
              items:
                $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/Email
          cdi:emessaging:
            description: Electronic messaging contact(s)
            anyOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/ElectronicMessageSystem
            - type: array
              items:
                $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/ElectronicMessageSystem
          cdi:telephone:
            description: Telephone number(s)
            anyOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/Telephone
            - type: array
              items:
                $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/Telephone
          cdi:website:
            description: Website link(s)
            anyOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/WebLink
            - type: array
              items:
                $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/WebLink
      Address:
        type: object
        description: DDI-CDI postal address (dt-Address)
        properties:
          '@type':
            type: array
            items:
              type: string
            contains:
              enum:
              - cdi:Address
            minItems: 1
          cdi:line:
            description: Address line(s)
            type: array
            items:
              type: string
          cdi:cityPlaceLocal:
            type: string
            description: City, town, or locality
          cdi:stateProvince:
            type: string
            description: State, province, or region
          cdi:postalCode:
            type: string
            description: Postal or ZIP code
          cdi:countryCode:
            description: Country code
            allOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/ControlledVocabularyEntry
          cdi:typeOfAddress:
            description: Type of address (e.g. home, work, mailing)
            allOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/ControlledVocabularyEntry
          cdi:isPreferred:
            type: boolean
            default: false
            description: Whether this is the preferred address
      Email:
        type: object
        description: DDI-CDI email address (dt-Email)
        properties:
          '@type':
            type: array
            items:
              type: string
            contains:
              enum:
              - cdi:Email
            minItems: 1
          cdi:internetEmail:
            type: string
            description: Email address string
          cdi:typeOfEmail:
            description: Type of email (e.g. personal, work)
            allOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/ControlledVocabularyEntry
          cdi:isPreferred:
            type: boolean
            default: false
            description: Whether this is the preferred email
      Telephone:
        type: object
        description: DDI-CDI telephone number (dt-Telephone)
        properties:
          '@type':
            type: array
            items:
              type: string
            contains:
              enum:
              - cdi:Telephone
            minItems: 1
          cdi:telephoneNumber:
            type: string
            description: Telephone number string
          cdi:typeOfTelephone:
            description: Type of telephone (e.g. mobile, office, fax)
            allOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/ControlledVocabularyEntry
          cdi:isPreferred:
            type: boolean
            default: false
            description: Whether this is the preferred telephone
      WebLink:
        type: object
        description: DDI-CDI website link (dt-WebLink)
        properties:
          '@type':
            type: array
            items:
              type: string
            contains:
              enum:
              - cdi:WebLink
            minItems: 1
          cdi:uri:
            type: string
            format: uri
            description: URI of the website
          cdi:typeOfWebsite:
            description: Type of website (e.g. homepage, documentation)
            allOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/ControlledVocabularyEntry
          cdi:isPreferred:
            type: boolean
            default: false
            description: Whether this is the preferred website
      ElectronicMessageSystem:
        type: object
        description: DDI-CDI electronic messaging system contact (dt-ElectronicMessageSystem)
        properties:
          '@type':
            type: array
            items:
              type: string
            contains:
              enum:
              - cdi:ElectronicMessageSystem
            minItems: 1
          cdi:contactAddress:
            type: string
            description: Messaging address or handle
          cdi:typeOfService:
            description: Type of messaging service (e.g. Slack, Teams)
            allOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/ControlledVocabularyEntry
          cdi:isPreferred:
            type: boolean
            default: false
            description: Whether this is the preferred messaging service
      AccessLocation:
        type: object
        description: DDI-CDI access location for a machine (dt-AccessLocation)
        properties:
          '@type':
            type: array
            items:
              type: string
            contains:
              enum:
              - cdi:AccessLocation
            minItems: 1
          cdi:uri:
            type: string
            format: uri
            description: URI of the access endpoint
          cdi:mimeType:
            description: MIME type of the resource at this location
            allOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/ControlledVocabularyEntry
          cdi:physicalLocation:
            description: Physical location description
            allOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/InternationalString
      PrivateImage:
        type: object
        description: DDI-CDI private image (dt-PrivateImage)
        properties:
          '@type':
            type: array
            items:
              type: string
            contains:
              enum:
              - cdi:PrivateImage
            minItems: 1
          cdi:effectiveDates:
            description: Date range when this image is effective
            allOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/DateRange
          cdi:privacy:
            description: Privacy classification
            allOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/ControlledVocabularyEntry
      CatalogDetails:
        type: object
        description: DDI-CDI catalog details (dt-CatalogDetails)
        properties:
          '@type':
            type: array
            items:
              type: string
            contains:
              enum:
              - cdi:CatalogDetails
            minItems: 1
          cdi:title:
            description: Title for the catalog entry
            allOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/InternationalString
          cdi:summary:
            description: Summary description
            allOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/InternationalString
          cdi:identifier:
            description: Catalog identifier
            type: object
            properties:
              cdi:identifierContent:
                type: string
              cdi:isUri:
                type: boolean
          cdi:creator:
            description: Creator of the catalog entry
            allOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/AgentInRole
      AgentInRole:
        type: object
        description: DDI-CDI agent in a role (dt-AgentInRole)
        properties:
          '@type':
            type: array
            items:
              type: string
            contains:
              enum:
              - cdi:AgentInRole
            minItems: 1
          cdi:agentName:
            description: Name of the agent
            allOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/InternationalString
          cdi:reference:
            description: Reference to the agent entity
            allOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/Reference
          cdi:role:
            description: Role of the agent
            allOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/ControlledVocabularyEntry
      Identifier:
        type: object
        description: DDI-CDI composite identifier (dt-Identifier)
        properties:
          '@type':
            type: array
            items:
              type: string
            contains:
              enum:
              - cdi:Identifier
            minItems: 1
          cdi:ddiIdentifier:
            description: DDI-specific IRDI identifier
            allOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/InternationalRegistrationDataIdentifier
          cdi:uri:
            type: string
            format: uri
            description: URI form of the identifier
          cdi:nonDdiIdentifier:
            description: Non-DDI identifier
            anyOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/NonDdiIdentifier
            - type: array
              items:
                $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/NonDdiIdentifier
      InternationalRegistrationDataIdentifier:
        type: object
        description: DDI-CDI IRDI (dt-InternationalRegistrationDataIdentifier)
        properties:
          '@type':
            type: array
            items:
              type: string
            contains:
              enum:
              - cdi:InternationalRegistrationDataIdentifier
            minItems: 1
          cdi:dataIdentifier:
            type: string
          cdi:registrationAuthorityIdentifier:
            type: string
          cdi:versionIdentifier:
            type: string
        required:
        - cdi:dataIdentifier
        - cdi:registrationAuthorityIdentifier
        - cdi:versionIdentifier
      NonDdiIdentifier:
        type: object
        description: Non-DDI identifier (dt-NonDdiIdentifier)
        properties:
          '@type':
            type: array
            items:
              type: string
            contains:
              enum:
              - cdi:NonDdiIdentifier
            minItems: 1
          cdi:identifierContent:
            type: string
            description: The identifier value
          cdi:managingAgency:
            type: string
            description: Agency managing this identifier scheme
        required:
        - cdi:identifierContent
      Reference:
        type: object
        description: DDI-CDI reference to an entity (dt-Reference)
        properties:
          '@type':
            type: array
            items:
              type: string
            contains:
              enum:
              - cdi:Reference
            minItems: 1
          cdi:uri:
            type: string
            format: uri
            description: URI of the referenced entity
          cdi:description:
            type: string
            description: Human-readable description of the reference
          cdi:ddiReference:
