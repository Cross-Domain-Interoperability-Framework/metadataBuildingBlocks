      '@type':
        type: array
        items:
          type: string
        contains:
          enum:
          - schema:PropertyValue
        minItems: 1
      '@id':
        type: string
      schema:name:
        type: string
        description: string label associated with the variable in the dataset serialization
      schema:description:
        type: string
        default: missing
      schema:alternateName:
        type: array
        items:
          type: string
          description: human intelligible name for variable that conveys semantics
      schema:measurementTechnique:
        anyOf:
        - type: string
        - type: object
          properties:
            '@id':
              type: string
              description: reference to a skos concept
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.variableMeasured/$defs/DefinedTerm
        description: Text description or URI specifying how values for the variable
          were obtained.
      schema:propertyID:
        type: array
        items:
          anyOf:
          - type: string
          - type: object
            properties:
              '@id':
                type: string
          - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.variableMeasured/$defs/DefinedTerm
        description: identifier or name for the property concept
      schema:unitText:
        type: string
        description: unit of measurement as text
      schema:unitCode:
        anyOf:
        - type: string
        - type: object
          properties:
            '@id':
              type: string
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.variableMeasured/$defs/DefinedTerm
        description: URI or code identifying the unit of measure
      schema:minValue:
        type: number
        description: minimum numeric value in the dataset
      schema:maxValue:
        type: number
        description: maximum numeric value in the dataset
      schema:url:
        anyOf:
        - type: string
          format: uri
          description: link to a web page useful for interpreting the variable
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-logical-record/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.variableMeasured/$defs/LabeledLink
    required:
