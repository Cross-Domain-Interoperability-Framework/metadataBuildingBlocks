              indicate missing values. The external controlled vocabulary should list
              platform types and a description of the allowed missing value types.
              A sample list would be:


              - BlankString - A Blank string indicates missing. Comparison is based
              on lexical order. - EmptyString - An empty string indicates missing.
              Use in comparisons returns missing. - Rstyle - Codes drawn from NA and
              the IEEE 754 values of NaN -Inf +Inf. Comparisons return NA. - SASNumeric
