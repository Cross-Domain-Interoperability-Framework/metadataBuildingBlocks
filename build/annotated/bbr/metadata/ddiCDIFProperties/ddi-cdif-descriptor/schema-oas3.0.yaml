      LabelForDisplay:
        type: object
        description: DDI-CDI multilingual display label (dt-LabelForDisplay)
        properties:
          '@type':
            type: array
            items:
              type: string
            contains:
              enum:
              - cdi:LabelForDisplay
            minItems: 1
          cdi:locationVariant:
            description: Geographic or locale variant
            allOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-descriptor/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/ControlledVocabularyEntry
          cdi:maxLength:
            type: integer
            description: Maximum display length
          cdi:languageSpecificString:
            description: The label text with language tag
            allOf:
