            anyOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-descriptor/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/ElectronicMessageSystem
