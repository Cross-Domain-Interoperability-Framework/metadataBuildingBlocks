      SexSpecification:
        type: object
        description: DDI-CDI sex specification (dt-SexSpecification)
        properties:
          '@type':
            type: array
            items:
              type: string
            contains:
              enum:
              - cdi:SexSpecification
            minItems: 1
          cdi:sexCode:
            type: string
            description: Code identifying sex (e.g. ISO 5218 values)
      ContactInformation:
        type: object
        description: DDI-CDI contact information (dt-ContactInformation)
        properties:
          '@type':
            type: array
            items:
              type: string
            contains:
              enum:
              - cdi:ContactInformation
            minItems: 1
          cdi:address:
            description: Postal address(es)
            anyOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-descriptor/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/Address
            - type: array
              items:
                $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-descriptor/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/Address
          cdi:email:
            description: Email address(es)
            anyOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-descriptor/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/Email
            - type: array
              items:
                $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiCDIFProperties/ddi-cdif-descriptor/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/Email
          cdi:emessaging:
