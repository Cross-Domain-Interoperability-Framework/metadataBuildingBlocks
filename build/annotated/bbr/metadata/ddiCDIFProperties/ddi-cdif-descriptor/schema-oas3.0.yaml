            description: The value of the entry of the controlled vocabulary. If no
              controlled vocabulary is used the term is entered here and none of the
              properties defining the controlled vocabulary location are used.
            type: array
            items:
              type: string
            minItems: 1
          cdi:name:
            type: string
            description: The name of the code list (controlled vocabulary).
          cdi:valueForOther:
            type: string
            description: If the value of the string is "Other" or the equivalent from
              the codelist, this attribute can provide a more specific value not found
