      DimensionComponent:
        type: object
        description: 'Role given to a represented variable in the context of a dimensional
          data structure to identify the universes associated with data points. The
          variable acts as a field in the compound identifier (the key structure)
          to disambiguate the cells in the multi-dimensional "cube".  AG: references
          to the variables which are the components of a compound identifier, in which
          each variable is a single field - an axis - in a coordinate system addressing
          a location in a matrix. These variables are often categorical, but also
          commonly include time. Unlike other Components, they may be ordered using
          instances of cdi:ComponentPosition.'
        properties:
          '@type':
            type: array
            items:
              type: string
            contains:
              enum:
              - cdi:DimensionComponent
            minItems: 1
          '@id':
            type: string
            description: Identifier for this DimensionComponent node
          cdif:isDefinedBy_RepresentedVariable:
            anyOf:
