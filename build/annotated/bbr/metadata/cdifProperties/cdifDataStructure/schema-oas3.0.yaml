  cdif.bbr.metadata.cdifProperties.cdifDescriptorVariable:
    title: DDI-CDI Descriptor Variable
    type: object
    description: Variable that provides codes for variable identification in the context
      of a data structure. Descriptor Variables hold values which reference the logical
      variables in the data set, indicating which one the associated value in the
      corresponding Reference Variable is a measure/value for. Descriptor Variables
      are presentational variables found only in Long Data Sets.
    properties:
      '@type':
        type: array
        items:
          type: string
        contains:
          enum:
          - cdi:DescriptorVariable
        minItems: 1
      '@id':
        type: string
        description: Identifier for this DescriptorVariable node
      cdif:hasValuesFrom:
        description: A cdi:DescriptorValueDomain enumerating the codes that can appear
          in the descriptor column, each paired (via cdif:isDefinedBy) with the RepresentedVariable
          that the code names.
        x-jsonld-id: https://cdif.org/0.1/hasValuesFrom
        allOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifDataStructure/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifDescriptorVariable/$defs/DescriptorValueDomain
      cdif:name:
        type: array
        items:
          type: string
        minItems: 1
        description: Human understandable name (linguistic signifier, word, phrase,
          or mnemonic). May follow ISO/IEC 11179-5 naming principles, and have context
          provided to specify usage.
        x-jsonld-id: https://cdif.org/0.1/name
    required:
    - '@type'
    - cdif:hasValuesFrom
    $defs:
      DescriptorValueDomain:
        type: object
        description: Set of permissible values for a variable playing the role of
          a variable descriptor component. Each entry pairs a code (cdif:value) with
          the RepresentedVariable that the code identifies (cdif:isDefinedBy).
        properties:
          '@type':
            type: array
            items:
              type: string
            contains:
              enum:
              - cdi:DescriptorValueDomain
            minItems: 1
          '@id':
            type: string
            description: Identifier for this DescriptorValueDomain node
          cdif:takesValuesFrom:
            type: array
            description: Ordered list of descriptor entries. Each entry has a cdif:value
              (the code as it appears in the descriptor column) and a cdif:isDefinedBy
              pointer to the RepresentedVariable that the code names.
            items:
              type: object
              properties:
                cdif:value:
                  type: string
                  description: The code value as it appears in the descriptor column.
                  x-jsonld-id: https://cdif.org/0.1/value
                cdif:isDefinedBy:
                  anyOf:
                  - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifDataStructure/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifRepresentedVariable
                  - type: object
                    description: object reference via URI or URI fragment to a RepresentedVariable
                      defined elsewhere in the document
                    properties:
                      '@id':
                        type: string
                    required:
                    - '@id'
                  x-jsonld-id: https://cdif.org/0.1/isDefinedBy
              required:
              - cdif:value
              - cdif:isDefinedBy
            minItems: 1
            x-jsonld-id: https://cdif.org/0.1/takesValuesFrom
        required:
        - '@type'
        - cdif:takesValuesFrom
    x-jsonld-prefixes:
      schema: http://schema.org/
      cdi: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/
