    x-schema-version: https://json-schema.org/draft/2020-12/schema
  cdif.bbr.metadata.schemaorgProperties.identifier:
    description: 'Properties for a schema.org identifier (schema:PropertyValue pattern).


      **Union-type policy:** In CDIF profile UML models an attribute typed as

      schema:Identifier / schema:PropertyValue is represented by a single attribute

      of that class type. The JSON Schema implementation permits the property value

      to be EITHER a plain string (interpreted as the bare identifier value) OR a

      full schema:PropertyValue object (with explicit @type, propertyID, value).

      Consumers should accept either form.

      '
    type: object
    properties:
      '@type':
        type: array
        items:
          type: string
        contains:
          enum:
          - schema:PropertyValue
        minItems: 1
      schema:propertyID:
        type: string
        description: In this context for the schema:PropertyValue, this field is an
          identifier for the identifier schema, e.g. DOI, ARK.  Get values from https://registry.identifiers.org/registry/
          for interoperability
        x-jsonld-id: http://schema.org/propertyID
      schema:value:
        type: string
        description: the identifier string. E.g. 10.5066/F7VX0DMQ
        x-jsonld-id: http://schema.org/value
      schema:url:
        type: string
        format: uri
        description: 'web-resolveable string for the identifier; host name part is
          location of a resolver that will return some representation for the given
          identifier value. E.g. https://doi.org/10.5066/F7VX0DMQ '
        x-jsonld-id: http://schema.org/url
    allOf:
    - required:
      - '@type'
    - anyOf:
      - required:
        - schema:value
      - required:
        - schema:url
    x-jsonld-prefixes:
      schema: http://schema.org/
    x-schema-source: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/schemaorgProperties/identifier/schema.yaml
    x-schema-version: https://json-schema.org/draft/2020-12/schema
  cdif.bbr.metadata.cdifProperties.cdifInstanceVariable:
    title: CDIF Instance Variable
    type: object
    properties:
      '@type':
        type: array
        description: Must include both schema:PropertyValue and cdi:InstanceVariable.
          Additional types may be included.
        items:
          type: string
        contains:
          enum:
          - cdi:InstanceVariable
      cdif:physicalDataType:
        type: array
        items:
          anyOf:
          - type: string
          - type: object
            properties:
              '@id':
                type: string
                description: reference to a skos concept for the data type
          - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifDataStructure/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifInstanceVariable/$defs/DefinedTerm
        description: identifier or name for the data type concept.
      cdif:role:
        type: string
        enum:
        - UnitIdentifier
        - Measure
        - Attribute
        - Dimension
        - Descriptor
        - ReferenceVariable
        description: Specifies the role this variable plays in a data structure. UnitIdentifier
          names the unit a row describes; Measure holds observed/derived values; Attribute
          qualifies an observation; Dimension addresses a cell in a multi-dimensional
          cube; Descriptor names the variable that a Reference column records values
          for (long format); ReferenceVariable holds those recorded values.
      cdif:simpleUnitOfMeasure:
        anyOf:
        - type: string
        - type: object
          properties:
            '@id':
              type: string
              description: reference to a skos concept for the data type
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifDataStructure/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifInstanceVariable/$defs/DefinedTerm
      cdif:uses:
        type: array
        items:
          anyOf:
          - type: string
          - type: object
            properties:
              '@id':
                type: string
                description: reference to a skos concept for the property
          - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifDataStructure/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifInstanceVariable/$defs/DefinedTerm
        description: Essentially the same as schema:propertyID. References to concepts
          that this variable measures or represents. When the dataset's distribution
          carries cdi:isStructuredBy (CDIF Data Structure profile), cdif:uses references
          the RepresentedVariable that supplies the represented-variable-level properties
          below, which are then NOT duplicated on the InstanceVariable.
      cdi:function:
        type: array
        items:
          anyOf:
          - type: string
          - type: object
            properties:
              '@id':
                type: string
          - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifDataStructure/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifInstanceVariable/$defs/DefinedTerm
        description: Immutable characteristic of the variable such as geographic designator,
          weight, temporal designation, etc. (InstanceVariable.function).
        x-jsonld-id: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/function
      cdi:platformType:
        anyOf:
        - type: string
        - type: object
          properties:
            '@id':
              type: string
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifDataStructure/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifInstanceVariable/$defs/DefinedTerm
        description: The application or technical system context in which the variable
          has been realized - typically a statistical processing package or processing
          environment (InstanceVariable.platformType).
        x-jsonld-id: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/platformType
      cdi:source:
        anyOf:
        - type: string
        - type: object
          properties:
            '@id':
              type: string
        description: Reference capturing provenance information for this InstanceVariable
          (InstanceVariable.source).
        x-jsonld-id: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/source
      cdif:isDescribedBy_StatisticsCollection:
        description: 'The StatisticsCollection holding summary / category statistics
          for this InstanceVariable (InstanceVariable.isDescribedBy). cdif: namespaced
          and target-suffixed because the DDI-CDI isDescribedBy association is polymorphic.'
        anyOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifDataStructure/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifStatistics/$defs/StatisticsCollection
        - type: object
          properties:
            '@id':
              type: string
          required:
          - '@id'
      cdi:hasIntendedDataType:
        anyOf:
        - type: string
        - type: object
          properties:
            '@id':
              type: string
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifDataStructure/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifInstanceVariable/$defs/DefinedTerm
        description: The data type intended to be used by this variable, independent
          of its physical representation (RepresentedVariable.hasIntendedDataType).
        x-jsonld-id: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/hasIntendedDataType
      cdi:describedUnitOfMeasure:
        anyOf:
        - type: string
        - type: object
          properties:
            '@id':
              type: string
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifDataStructure/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifInstanceVariable/$defs/DefinedTerm
        description: The unit in which the data values are measured, expressed as
          a controlled-vocabulary entry (RepresentedVariable.describedUnitOfMeasure).
          For a plain-string unit, use cdif:simpleUnitOfMeasure instead.
        x-jsonld-id: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/describedUnitOfMeasure
      cdi:qualifies:
        type: object
        properties:
          '@id':
            type: string
        description: reference to an instance variable defined for this dataset
        x-jsonld-id: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/qualifies
    allOf:
    - required:
      - '@type'
    - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifDataStructure/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.variableMeasured
    $defs:
      DefinedTerm:
        anyOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifDataStructure/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.definedTerm
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifDataStructure/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.skosProperties.skosConcept
    x-jsonld-prefixes:
      schema: http://schema.org/
      spdx: http://spdx.org/rdf/terms#
