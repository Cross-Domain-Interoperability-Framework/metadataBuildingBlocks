            allOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifDataStructure/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.identifier
          cdif:isDefinedBy_RepresentedVariable:
            anyOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifDataStructure/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifRepresentedVariable
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifDataStructure/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifDataStructureComponent/$defs/id-reference
          cdi:semantic:
            type: array
            items:
              $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifDataStructure/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.skosProperties.skosConcept
            minItems: 1
