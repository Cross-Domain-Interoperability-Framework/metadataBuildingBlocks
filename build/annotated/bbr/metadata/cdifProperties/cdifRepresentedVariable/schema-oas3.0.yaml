    items:
      $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifRepresentedVariable/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/LabelForDisplay
    minItems: 1
    description: A human-readable display label for the object. Supports the use of
      multiple languages. Repeat for labels with different content, for example, labels
