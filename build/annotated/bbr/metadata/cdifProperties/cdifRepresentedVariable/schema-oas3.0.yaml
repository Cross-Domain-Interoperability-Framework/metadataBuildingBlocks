x-defs:
  cdif.bbr.metadata.skosProperties.skosConcept:
    title: SKOS Concept
    description: JSON Schema for a SKOS Concept in JSON-LD form. A unit of thought
      within a concept scheme. Supports labels (prefLabel, altLabel, hiddenLabel),
      notations, hierarchical relations (broader/narrower), associative relations
      (related), cross-scheme mapping properties, scheme membership, and documentary
      notes. Based on the W3C SKOS Reference (https://www.w3.org/TR/skos-reference/).
    type: object
    properties:
      '@context':
        description: JSON-LD context declaring the skos namespace prefix. May be a
          single object or an array of strings and objects.
        anyOf:
        - type: object
          properties:
            skos:
              enum:
              - http://www.w3.org/2004/02/skos/core#
          required:
          - skos
        - type: array
          items:
            anyOf:
            - type: string
            - type: object
          contains:
            type: object
            properties:
              skos:
                enum:
                - http://www.w3.org/2004/02/skos/core#
            required:
            - skos
      '@id':
        type: string
        description: URI identifier for this concept.
      '@type':
        type: array
        items:
          type: string
        contains:
          enum:
          - skos:Concept
        minItems: 1
      skos:prefLabel:
        description: Preferred lexical label for this concept. A single string, a
          single language-tagged value, or an array of language-tagged values. Each
          language should appear at most once.
        anyOf:
        - type: string
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifRepresentedVariable/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.skosProperties.skosConcept/$defs/LanguageTaggedValue
        - type: array
          items:
            $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifRepresentedVariable/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.skosProperties.skosConcept/$defs/LanguageTaggedValue
      skos:altLabel:
        description: Alternative lexical labels (acronyms, abbreviations, variants).
        anyOf:
        - type: string
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifRepresentedVariable/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.skosProperties.skosConcept/$defs/LanguageTaggedValue
        - type: array
          items:
            anyOf:
            - type: string
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifRepresentedVariable/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.skosProperties.skosConcept/$defs/LanguageTaggedValue
      skos:hiddenLabel:
        description: Labels accessible to free-text search but not displayed.
        anyOf:
        - type: string
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifRepresentedVariable/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.skosProperties.skosConcept/$defs/LanguageTaggedValue
        - type: array
          items:
            anyOf:
            - type: string
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifRepresentedVariable/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.skosProperties.skosConcept/$defs/LanguageTaggedValue
      skos:notation:
        description: Classification code for this concept within a scheme.
        type: array
        items:
          type: string
      skos:definition:
        description: Formal explanation of the meaning of this concept.
        anyOf:
        - type: string
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifRepresentedVariable/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.skosProperties.skosConcept/$defs/LanguageTaggedValue
        - type: array
          items:
            anyOf:
            - type: string
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifRepresentedVariable/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.skosProperties.skosConcept/$defs/LanguageTaggedValue
      skos:scopeNote:
        description: Note clarifying meaning and/or intended use.
        anyOf:
        - type: string
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifRepresentedVariable/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.skosProperties.skosConcept/$defs/LanguageTaggedValue
        - type: array
          items:
            anyOf:
            - type: string
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifRepresentedVariable/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.skosProperties.skosConcept/$defs/LanguageTaggedValue
      skos:note:
        description: General note about this concept.
        anyOf:
        - type: string
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifRepresentedVariable/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.skosProperties.skosConcept/$defs/LanguageTaggedValue
        - type: array
          items:
            anyOf:
            - type: string
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifRepresentedVariable/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.skosProperties.skosConcept/$defs/LanguageTaggedValue
      skos:historyNote:
        description: Note about past state or use.
        anyOf:
        - type: string
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifRepresentedVariable/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.skosProperties.skosConcept/$defs/LanguageTaggedValue
        - type: array
          items:
            anyOf:
            - type: string
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifRepresentedVariable/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.skosProperties.skosConcept/$defs/LanguageTaggedValue
      skos:changeNote:
        description: Note documenting a change.
        anyOf:
        - type: string
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifRepresentedVariable/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.skosProperties.skosConcept/$defs/LanguageTaggedValue
        - type: array
          items:
            anyOf:
            - type: string
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifRepresentedVariable/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.skosProperties.skosConcept/$defs/LanguageTaggedValue
      skos:editorialNote:
        description: Note for editors and maintainers.
        anyOf:
        - type: string
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifRepresentedVariable/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.skosProperties.skosConcept/$defs/LanguageTaggedValue
        - type: array
          items:
            anyOf:
            - type: string
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifRepresentedVariable/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.skosProperties.skosConcept/$defs/LanguageTaggedValue
      skos:example:
        description: Example of use of this concept.
        anyOf:
        - type: string
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifRepresentedVariable/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.skosProperties.skosConcept/$defs/LanguageTaggedValue
        - type: array
          items:
            anyOf:
            - type: string
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifRepresentedVariable/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.skosProperties.skosConcept/$defs/LanguageTaggedValue
      skos:inScheme:
        description: Concept scheme(s) this concept belongs to.
        anyOf:
        - type: object
          properties:
            '@id':
              type: string
          required:
          - '@id'
        - type: array
          items:
            type: object
            properties:
              '@id':
                type: string
            required:
            - '@id'
      skos:topConceptOf:
        description: Concept scheme(s) for which this is a top concept.
        anyOf:
        - type: object
          properties:
            '@id':
              type: string
          required:
          - '@id'
        - type: array
          items:
            type: object
            properties:
              '@id':
                type: string
            required:
            - '@id'
      skos:broader:
        description: Broader (parent) concepts in the hierarchy. Items are inline
          concept objects or @id references.
        type: array
        items:
          anyOf:
          - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifRepresentedVariable/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.skosProperties.skosConcept/$defs/ConceptRef
          - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifRepresentedVariable/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.skosProperties.skosConcept
      skos:narrower:
        description: Narrower (child) concepts in the hierarchy. Items are inline
          concept objects or @id references.
        type: array
        items:
          anyOf:
          - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifRepresentedVariable/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.skosProperties.skosConcept/$defs/ConceptRef
          - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifRepresentedVariable/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.skosProperties.skosConcept
      skos:related:
        description: Associatively related concepts.
        type: array
        items:
          anyOf:
          - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifRepresentedVariable/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.skosProperties.skosConcept/$defs/ConceptRef
          - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifRepresentedVariable/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.skosProperties.skosConcept
      skos:exactMatch:
        description: Concepts in other schemes with equivalent meaning.
        type: array
        items:
          $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifRepresentedVariable/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.skosProperties.skosConcept/$defs/ConceptRef
      skos:closeMatch:
        description: Concepts in other schemes with similar meaning.
        type: array
        items:
          $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifRepresentedVariable/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.skosProperties.skosConcept/$defs/ConceptRef
      skos:broadMatch:
        description: Broader concepts in other schemes.
        type: array
        items:
          $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifRepresentedVariable/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.skosProperties.skosConcept/$defs/ConceptRef
      skos:narrowMatch:
        description: Narrower concepts in other schemes.
        type: array
        items:
          $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifRepresentedVariable/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.skosProperties.skosConcept/$defs/ConceptRef
      skos:relatedMatch:
        description: Related concepts in other schemes.
        type: array
        items:
          $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifRepresentedVariable/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.skosProperties.skosConcept/$defs/ConceptRef
    required:
    - '@type'
    - skos:prefLabel
    $defs:
      ConceptRef:
        type: object
        description: A reference to a SKOS Concept by URI.
        properties:
          '@id':
            type: string
            description: URI of the referenced concept.
        required:
        - '@id'
      LanguageTaggedValue:
        type: object
        description: An RDF literal value with a language tag, serialized as a JSON-LD
          value object.
        properties:
          '@value':
            type: string
            description: The text content.
          '@language':
            type: string
            description: BCP 47 language tag (e.g. en, fr, de).
        required:
        - '@value'
        - '@language'
    x-jsonld-prefixes:
      skos: http://www.w3.org/2004/02/skos/core#
    x-schema-source: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/skosProperties/skosConcept/schema.yaml
    x-schema-version: https://json-schema.org/draft/2020-12/schema
  cdif.bbr.metadata.cdifProperties.cdifValueDomain:
    title: CDIF Value Domain
    description: "Value domain for substantive or sentinel values for a variable.
      Typically a description and/or enumeration of allowed values of interest. CDIF
      profile of the DDI-CDI ValueDomain \u2014 a single node is either a cdif:SubstantiveValueDomain
      (subject-matter values) or a cdif:SentinelValueDomain (processing/missing-value
      codes)."
    oneOf:
    - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifRepresentedVariable/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifValueDomain/$defs/SubstantiveValueDomain
    - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifRepresentedVariable/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifValueDomain/$defs/SentinelValueDomain
    $defs:
      SubstantiveValueDomain:
        type: object
        description: Value domain for a substantive conceptual domain. Typically a
          description and/or enumeration of allowed values of interest.
        properties:
          '@type':
            type: array
            items:
              type: string
            contains:
              enum:
              - cdif:SubstantiveValueDomain
            minItems: 1
          '@id':
            type: string
            description: Identifier for this SubstantiveValueDomain node
          cdif:takesValuesFrom:
            anyOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifRepresentedVariable/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifEnumerationDomain
            - type: object
              description: JSON-LD @id reference to a node defined elsewhere in the
                graph
              properties:
                '@id':
                  type: string
                  description: IRI or blank node identifier of the referenced node
              required:
              - '@id'
          cdif:displayLabel:
            type: string
            description: A human-readable display label for the object. Supports the
              use of multiple languages. Repeat for labels with different content,
              for example, labels with differing length limitations.
          cdif:recommendedDataType:
            type: array
            description: The data types that are recommended for use with this domain.
            items:
              $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifRepresentedVariable/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifValueDomain/$defs/xsdDataType
            minItems: 1
        required:
        - '@type'
        anyOf:
        - required:
          - cdif:takesValuesFrom
        - required:
          - cdif:recommendedDataType
      SentinelValueDomain:
        type: object
        description: Value domain for a sentinel conceptual domain.
        properties:
          '@type':
            type: array
            items:
              type: string
            contains:
              enum:
              - cdif:SentinelValueDomain
            minItems: 1
          '@id':
            type: string
            description: Identifier for this SentinelValueDomain node
          cdif:takesValuesFrom:
            anyOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifRepresentedVariable/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifEnumerationDomain
            - type: object
              description: JSON-LD @id reference to a node defined elsewhere in the
                graph
              properties:
                '@id':
                  type: string
                  description: IRI or blank node identifier of the referenced node
              required:
              - '@id'
          cdif:displayLabel:
            type: string
            description: A human-readable display label for the object. Supports the
              use of multiple languages. Repeat for labels with different content,
              for example, labels with differing length limitations.
          cdif:recommendedDataType:
            type: array
            description: The data types that are recommended for use with this domain.
            items:
              $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifRepresentedVariable/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifValueDomain/$defs/xsdDataType
            minItems: 1
        required:
        - '@type'
        anyOf:
        - required:
          - cdif:takesValuesFrom
        - required:
          - cdif:recommendedDataType
      xsdDataType:
        type: string
        enum:
        - xsd:anyURI
        - xsd:base64Binary
        - xsd:boolean
        - xsd:byte
        - xsd:date
        - xsd:dateTime
        - xsd:decimal
        - xsd:double
        - xsd:float
        - xsd:gDay
        - xsd:gMonth
        - xsd:gMonthDay
        - xsd:gYear
        - xsd:gYearMonth
        - xsd:hexBinary
        - xsd:int
        - xsd:integer
        - xsd:language
        - xsd:long
        - xsd:Name
        - xsd:NCName
        - xsd:NMTOKEN
        - xsd:negativeInteger
        - xsd:nonNegativeInteger
        - xsd:nonPositiveInteger
        - xsd:normalizedString
        - xsd:positiveInteger
        - xsd:short
        - xsd:string
        - xsd:time
        - xsd:token
        - xsd:unsignedByte
        - xsd:unsignedInt
        - xsd:unsignedLong
        - xsd:unsignedShort
    x-jsonld-prefixes:
      schema: http://schema.org/
      cdi: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/
      cdif: https://cdif.org/0.1/
      skos: http://www.w3.org/2004/02/skos/core#
      xsd: http://www.w3.org/2001/XMLSchema#
    x-schema-source: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifValueDomain/schema.yaml
    x-schema-version: https://json-schema.org/draft/2020-12/schema
  cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types:
    title: DDI-CDI Data Types
    description: Shared DDI-CDI structured data types from DDICDILibrary/DataTypes.
      Provides reusable $defs for identifiers, names, contact information, references,
      and other common DDI-CDI structured data types.
    $defs:
      id-reference:
        type: object
        description: JSON-LD @id reference to a node defined elsewhere in the graph
        properties:
          '@id':
            type: string
            description: IRI or blank node identifier of the referenced node
        required:
        - '@id'
      ObjectName:
        type: object
        description: DDI-CDI structured name wrapper (dt-ObjectName)
        properties:
          '@type':
            type: array
            items:
              type: string
            contains:
              enum:
              - cdi:ObjectName
            minItems: 1
          cdi:name:
            type: string
            description: The name string
          cdi:context:
            description: Context or usage of this name
            allOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifRepresentedVariable/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/ControlledVocabularyEntry
        required:
        - cdi:name
      OrganizationName:
        type: object
        description: DDI-CDI organization name (dt-OrganizationName, extends ObjectName)
        properties:
          '@type':
            type: array
            items:
              type: string
            contains:
              enum:
              - cdi:OrganizationName
            minItems: 1
          cdi:name:
            type: string
            description: The name string
          cdi:context:
            description: Context or usage of this name
            allOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifRepresentedVariable/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/ControlledVocabularyEntry
          cdi:abbreviation:
            description: Abbreviated form of the name
            allOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifRepresentedVariable/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/InternationalString
          cdi:effectiveDates:
            description: Date range when this name is/was effective
            allOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifRepresentedVariable/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/DateRange
          cdi:isFormal:
            type: boolean
            default: true
            description: Whether this is the formal/legal name
          cdi:typeOfOrganizationName:
            description: Classification of this name (e.g. legal, trade, acronym)
            allOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifRepresentedVariable/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/ControlledVocabularyEntry
        required:
        - cdi:name
      IndividualName:
        type: object
        description: DDI-CDI individual name (dt-IndividualName)
        properties:
          '@type':
            type: array
            items:
              type: string
            contains:
              enum:
              - cdi:IndividualName
            minItems: 1
          cdi:firstGiven:
            type: string
            description: First or given name
          cdi:lastFamily:
            type: string
            description: Last or family name
          cdi:middle:
            type: string
            description: Middle name(s)
          cdi:prefix:
            type: string
            description: Name prefix (e.g. Dr., Prof.)
          cdi:suffix:
            type: string
            description: Name suffix (e.g. Jr., III)
          cdi:fullName:
            description: Full name as a single internationalized string
            allOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifRepresentedVariable/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/InternationalString
          cdi:abbreviation:
            description: Abbreviated form of the name
            allOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifRepresentedVariable/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/InternationalString
          cdi:isFormal:
            type: boolean
            default: true
            description: Whether this is a formal name
          cdi:isPreferred:
            type: boolean
            default: false
            description: Whether this is the preferred name
          cdi:effectiveDates:
