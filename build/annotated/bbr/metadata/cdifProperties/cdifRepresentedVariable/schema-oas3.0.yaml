title: DDI-CDI Represented Variable
description: Conceptual variable with a substantive value domain specified.
type: object
properties:
  '@type':
    type: array
    items:
      type: string
    contains:
      enum:
      - cdi:RepresentedVariable
    minItems: 1
  '@id':
    type: string
    description: Identifier for this RepresentedVariable node
  cdi:describedUnitOfMeasure:
    description: The unit in which the data values are measured (kg, pound, euro),
      expressed as a value from a controlled system of entries (i.e., QDT). Supports
      the provision of an identifier for the entry in the authoritative source (a
      URI, etc.), and the specific vocabulary.
    allOf:
    - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifRepresentedVariable/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.skosProperties.skosConcept
  cdi:hasIntendedDataType:
    description: The data type intended to be used by this variable. Supports the
      optional use of an external controlled vocabulary.
    allOf:
    - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifRepresentedVariable/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.skosProperties.skosConcept
  cdi:takesSentinelValuesFrom:
    type: array
    items:
      anyOf:
      - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifRepresentedVariable/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifValueDomain/$defs/SentinelValueDomain
      - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifRepresentedVariable/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/id-reference
    minItems: 1
    description: Sentinel (missing / not-applicable) value domain(s) for this RepresentedVariable
      (RepresentedVariable.takesSentinelValuesFrom).
  cdi:takesSubstantiveValuesFrom:
    anyOf:
    - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifRepresentedVariable/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifValueDomain/$defs/SubstantiveValueDomain
    - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifRepresentedVariable/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/id-reference
    description: The substantive value domain for this RepresentedVariable - the set
      of valid, meaningful values (RepresentedVariable.takesSubstantiveValuesFrom).
  cdi:simpleUnitOfMeasure:
    type: string
    description: The unit in which the data values are measured (kg, pound, euro),
      expressed as a simple string, in cases where no additional information is available
      (in the legacy system) or needed (as in the case of broad agreement within the
      community of use [i.e., ISO country codes, currencies, etc. in SDMX])
  cdi:descriptiveText:
    description: A short natural language account of the characteristics of the object.
    allOf:
    - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifRepresentedVariable/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/InternationalString
  cdi:takesSentinelConceptsFrom:
    anyOf:
    - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifRepresentedVariable/schema-oas3.0.yaml#/$defs/SentinelConceptualDomain
    - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifRepresentedVariable/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/id-reference
  cdi:takesSubstantiveConceptsFrom:
    anyOf:
    - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifRepresentedVariable/schema-oas3.0.yaml#/$defs/SubstantiveConceptualDomain
    - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifRepresentedVariable/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/id-reference
  cdi:measures:
    anyOf:
    - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifRepresentedVariable/schema-oas3.0.yaml#/$defs/UnitType
    - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifRepresentedVariable/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/id-reference
  cdi:unitOfMeasureKind:
    description: Kind of unit of measure, so that it may be prone to translation to
      equivalent UOMs. Example values include "acceleration," "temperature," "salinity",
      etc. This description exists at the conceptual level, indicating a limitation
      on the type of representations which may be used for the variable as it is made
      more concrete.
    allOf:
    - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifRepresentedVariable/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.skosProperties.skosConcept
  cdi:definition:
    description: Natural language statement conveying the meaning of a concept, differentiating
      it from other concepts. Supports the use of multiple languages and structured
      text. 'externalDefinition' can't be used if 'definition' is used.
    allOf:
    - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifRepresentedVariable/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiCDIFProperties.ddi-cdif-data-types/$defs/InternationalString
  cdi:displayLabel:
