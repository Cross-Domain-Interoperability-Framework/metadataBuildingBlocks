  cdif.bbr.metadata.skosProperties.skosConcept:
    title: SKOS Concept
    description: JSON Schema for a SKOS Concept in JSON-LD form. A unit of thought
      within a concept scheme. Supports labels (prefLabel, altLabel, hiddenLabel),
      notations, hierarchical relations (broader/narrower), associative relations
      (related), cross-scheme mapping properties, scheme membership, and documentary
      notes. Based on the W3C SKOS Reference (https://www.w3.org/TR/skos-reference/).
    type: object
    properties:
      '@context':
        description: JSON-LD context declaring the skos namespace prefix. May be a
          single object or an array of strings and objects.
        anyOf:
        - type: object
          properties:
            skos:
              enum:
              - http://www.w3.org/2004/02/skos/core#
          required:
          - skos
        - type: array
          items:
            anyOf:
            - type: string
            - type: object
          contains:
            type: object
            properties:
              skos:
                enum:
                - http://www.w3.org/2004/02/skos/core#
            required:
            - skos
      '@id':
        type: string
        description: URI identifier for this concept.
      '@type':
        type: array
        items:
          type: string
        contains:
          enum:
          - skos:Concept
        minItems: 1
      skos:prefLabel:
        description: Preferred lexical label for this concept. A single string, a
          single language-tagged value, or an array of language-tagged values. Each
          language should appear at most once.
        anyOf:
        - type: string
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifInstanceVariable/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.skosProperties.skosConcept/$defs/LanguageTaggedValue
