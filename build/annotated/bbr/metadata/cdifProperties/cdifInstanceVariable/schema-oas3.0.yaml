title: CDIF Instance Variable
type: object
properties:
  '@type':
    type: array
    description: Must include both schema:PropertyValue and cdi:InstanceVariable.
      Additional types may be included.
    items:
      type: string
    contains:
      enum:
      - cdi:InstanceVariable
  cdif:physicalDataType:
    type: array
    items:
      anyOf:
      - type: string
      - type: object
        properties:
          '@id':
            type: string
            description: reference to a skos concept for the data type
      - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifInstanceVariable/schema-oas3.0.yaml#/$defs/DefinedTerm
    description: identifier or name for the data type concept.
  cdi:role:
    type: string
    enum:
    - UnitIdentifier
    - Measure
    - Attribute
    - Dimension
    - Descriptor
    - ReferenceVariable
    description: Specifies the role this variable plays in a data structure. UnitIdentifier
      names the unit a row describes; Measure holds observed/derived values; Attribute
      qualifies an observation; Dimension addresses a cell in a multi-dimensional
      cube; Descriptor names the variable that a Reference column records values for
      (long format); ReferenceVariable holds those recorded values.
  cdif:simpleUnitOfMeasure:
    anyOf:
    - type: string
    - type: object
      properties:
        '@id':
          type: string
          description: reference to a skos concept for the data type
    - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifInstanceVariable/schema-oas3.0.yaml#/$defs/DefinedTerm
  cdif:uses:
    type: array
    items:
      anyOf:
      - type: string
      - type: object
        properties:
          '@id':
            type: string
            description: reference to a skos concept for the property
      - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifInstanceVariable/schema-oas3.0.yaml#/$defs/DefinedTerm
    description: Essentially the same as schema:propertyID. References to concepts
      that this variable measures or represents.
  cdi:qualifies:
    type: object
    properties:
      '@id':
        type: string
    description: reference to an instance variable defined for this dataset
allOf:
- required:
  - '@type'
- $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifInstanceVariable/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.variableMeasured
$defs:
  DefinedTerm:
    anyOf:
    - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifInstanceVariable/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.definedTerm
    - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifInstanceVariable/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.skosProperties.skosConcept
