                      defined elsewhere in the document
                    properties:
                      '@id':
                        type: string
                    required:
                    - '@id'
              required:
              - cdif:value
              - cdif:isDefinedBy
            minItems: 1
        required:
        - '@type'
        - cdif:takesValuesFrom
