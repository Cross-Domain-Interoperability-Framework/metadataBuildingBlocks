x-defs:
  cdif.bbr.metadata.cdifProperties.cdifKey:
    title: CDIF Key
    description: 'Profile of ddi-cdi Key/PrimaryKey: a CDIF Key is the role of an
      ordered set of cdi:InstanceVariables (referenced via cdifInstanceVariable) that
      uniquely identify a data instance. Each variable''s position in the key is recorded
      with an explicit cdi:ComponentPosition wrapper carrying cdi:indexes (the variable)
      and cdi:value (the integer position), matching the canonical DDI-CDI PrimaryKey
      structure in ddi-cdif-data-structure.'
    type: object
    properties:
      '@type':
        type: array
        items:
          type: string
        contains:
          enum:
          - cdif:Key
        minItems: 1
      '@id':
        type: string
        description: Identifier for this Key node.
      cdif:isComposedOf:
        type: array
        description: Ordered list of cdi:ComponentPosition wrappers. Each wrapper
          carries cdi:indexes (an inline cdifInstanceVariable or @id-reference to
          one declared elsewhere in the dataset) and cdi:value (the integer position
          in the key, 0- or 1-based).
        items:
          type: object
          description: ComponentPosition wrapper indexing one variable's position
            in the key.
          properties:
            '@type':
              type: array
              items:
                type: string
              contains:
                enum:
                - cdi:ComponentPosition
              minItems: 1
            '@id':
              type: string
              description: Identifier for this ComponentPosition node.
            cdi:indexes:
              anyOf:
              - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifDataDescription/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifInstanceVariable
              - type: object
                description: object reference via @id to a cdifInstanceVariable declared
                  elsewhere
                properties:
                  '@id':
                    type: string
                required:
                - '@id'
              x-jsonld-id: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/indexes
            cdi:value:
              type: integer
              description: Index value (position) of the variable in the ordered key.
              x-jsonld-id: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/value
          required:
          - '@type'
          - cdi:indexes
          - cdi:value
        minItems: 1
        x-jsonld-id: https://cdif.org/0.1/isComposedOf
    required:
    - '@type'
    - cdif:isComposedOf
    x-jsonld-prefixes:
      schema: http://schema.org/
      cdi: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/
      cdif: https://cdif.org/0.1/
    x-schema-source: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifKey/schema.yaml
    x-schema-version: https://json-schema.org/draft/2020-12/schema
  cdif.bbr.metadata.cdifProperties.cdifStatistics:
    title: CDIF Statistics
    description: 'CDIF profile of the DDI-CDI Statistics / CategoryStatistics / StatisticsCollection
      classes (2026-03 model). A Statistics node carries one or more Statistic value
      objects; CategoryStatistics carries per-category results; a StatisticsCollection
      groups Statistics nodes. The root validates any of the three. CDIF divergences
      from canonical DDI-CDI: properties valued by InternationalString / LabelForDisplay
      / ObjectName are simplified to plain strings and carried under the cdif: namespace
      (cdif:name, cdif:descriptiveText, cdif:definition, cdif:displayLabel); the polymorphic
      cdi:has association is split into target-specific cdif:has_* keys; cdif:appliesTo
      and cdif:indexedBy are CDIF additions (not present in the canonical model) that
      link statistics to the InstanceVariable(s) they describe.'
    type: object
    anyOf:
    - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifDataDescription/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifStatistics/$defs/Statistics
    - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifDataDescription/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifStatistics/$defs/CategoryStatistics
    - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifDataDescription/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifStatistics/$defs/StatisticsCollection
    $defs:
      Statistic:
        title: Statistic
        description: "DDI-CDI Statistic dataType \u2014 a single computed value (mean,
          count, median, etc.). A value object with no identity; appears inline inside
          a cdi:statistic array."
        type: object
        properties:
          cdi:computationBase:
            type: string
            enum:
            - MissingOnly
            - Total
            - ValidOnly
            description: "The cases included in determining the statistic \u2014 Total
              (all cases, valid and missing), ValidOnly (valid values only), MissingOnly
              (invalid cases only)."
            x-jsonld-id: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/computationBase
          cdi:content:
            type: number
            description: The value of the statistic expressed as a real number.
            x-jsonld-id: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/content
          cdi:isWeighted:
            type: boolean
            default: false
            description: True if the statistic was computed using a weighting variable.
            x-jsonld-id: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/isWeighted
          cdi:typeOfNumericValue:
            type: string
            description: "The type of numeric value carried in cdi:content \u2014
              decimal, float, or double."
            x-jsonld-id: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/typeOfNumericValue
      Statistics:
        title: Statistics
        description: A named bundle of one or more Statistic value objects for an
          instance variable, optionally weighted, optionally broken down by Category.
        type: object
        properties:
          '@id':
            type: string
            description: Identifier for this Statistics node.
          '@type':
            type: array
            items:
              type: string
            contains:
              enum:
              - cdi:Statistics
            minItems: 1
          cdi:typeOfStatistic:
            description: "Controlled-vocabulary entry naming the kind of statistic
              \u2014 e.g. mean, median, count, sum, stdDev."
            x-jsonld-id: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/typeOfStatistic
            allOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifDataDescription/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifStatistics/$defs/SkosConcept
          cdi:statistic:
            type: array
            description: "Ordered list of Statistic value objects carried by this
              bundle. Order is significant \u2014 consumers MAY rely on array position."
            items:
              $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifDataDescription/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifStatistics/$defs/Statistic
            minItems: 1
            x-jsonld-id: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/statistic
          cdi:hasWeight:
            description: The InstanceVariable whose values were used as weights when
              computing the Statistic entries (inline cdifInstanceVariable node or
              an @id-reference).
            anyOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifDataDescription/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifInstanceVariable
            - type: object
              properties:
                '@id':
                  type: string
              required:
              - '@id'
            x-jsonld-id: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/hasWeight
          cdif:appliesTo:
            type: array
            description: "CDIF addition (not in canonical DDI-CDI): the InstanceVariable(s)
              this Statistics bundle summarizes \u2014 the per-bundle \"what these
              numbers describe\" link. When a Statistics node sits inside a StatisticsCollection
              that indexes more than one variable, cdif:appliesTo disambiguates which
              variable each bundle describes."
            items:
              anyOf:
              - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifDataDescription/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifInstanceVariable
              - type: object
                properties:
                  '@id':
                    type: string
                required:
                - '@id'
            minItems: 1
            x-jsonld-id: https://cdif.org/0.1/appliesTo
          cdif:has_CategoryStatistics:
            type: array
            description: 'CategoryStatistics entries breaking this Statistics bundle
              down by Category. cdif: namespaced and target-suffixed because the DDI-CDI
              cdi:has association is polymorphic.'
            items:
              $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifDataDescription/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifStatistics/$defs/CategoryStatistics
            x-jsonld-id: https://cdif.org/0.1/has_CategoryStatistics
        required:
        - '@type'
        - cdi:statistic
      CategoryStatistics:
        title: CategoryStatistics
        description: Statistics for a specific Category of an instance variable within
          a data set.
        type: object
        properties:
          '@id':
            type: string
            description: Identifier for this CategoryStatistics node.
          '@type':
            type: array
            items:
              type: string
            contains:
              enum:
              - cdi:CategoryStatistics
            minItems: 1
          cdi:for:
            description: The Category this CategoryStatistics is for (inline Category
              node or an @id-reference).
            anyOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifDataDescription/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifStatistics/$defs/Category
            - type: object
              properties:
                '@id':
                  type: string
              required:
              - '@id'
            x-jsonld-id: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/for
          cdi:typeOfStatistic:
            description: Controlled-vocabulary entry naming the kind of statistic.
            x-jsonld-id: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/typeOfStatistic
            allOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifDataDescription/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifStatistics/$defs/SkosConcept
          cdi:statistic:
            type: array
            description: Per-category Statistic value objects.
            items:
              $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifDataDescription/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifStatistics/$defs/Statistic
            minItems: 1
            x-jsonld-id: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/statistic
          cdi:hasWeight:
            description: The InstanceVariable whose values were used as weights (inline
              cdifInstanceVariable node or an @id-reference).
            anyOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifDataDescription/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifInstanceVariable
            - type: object
              properties:
                '@id':
                  type: string
              required:
              - '@id'
            x-jsonld-id: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/hasWeight
        required:
        - '@type'
        - cdi:for
        - cdi:statistic
      StatisticsCollection:
        title: StatisticsCollection
        description: Groups one or more Statistics nodes for an instance variable.
          A typical use is a dataset-level collection holding row-count / mean / stddev
          Statistics for each measured variable.
        type: object
        properties:
          '@id':
            type: string
            description: Identifier for this StatisticsCollection node.
          '@type':
            type: array
            items:
              type: string
            contains:
              enum:
              - cdi:StatisticsCollection
            minItems: 1
          cdi:hasWeight:
            description: The InstanceVariable whose values were used as weights (inline
              cdifInstanceVariable node or an @id-reference).
            anyOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifDataDescription/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifInstanceVariable
            - type: object
              properties:
                '@id':
                  type: string
              required:
              - '@id'
            x-jsonld-id: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/hasWeight
          cdif:has_Statistics:
            type: array
            description: 'Statistics nodes carried by this collection (inline or @id-ref).
              cdif: namespaced and target-suffixed because the DDI-CDI cdi:has association
              is polymorphic.'
            items:
              anyOf:
              - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifDataDescription/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifStatistics/$defs/Statistics
              - type: object
                properties:
                  '@id':
                    type: string
                required:
                - '@id'
            minItems: 1
            x-jsonld-id: https://cdif.org/0.1/has_Statistics
          cdif:indexedBy:
            type: array
            description: "CDIF addition (not in canonical DDI-CDI): the InstanceVariable(s)
              the contained Statistics index \u2014 the collection-level coordinate
              space."
            items:
              anyOf:
              - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifDataDescription/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifInstanceVariable
              - type: object
                properties:
                  '@id':
                    type: string
                required:
                - '@id'
            minItems: 1
            x-jsonld-id: https://cdif.org/0.1/indexedBy
        required:
        - '@type'
        - cdif:has_Statistics
      Category:
        title: Category
        description: 'Minimal Category shape used as a CategoryStatistics target.
          CDIF simplifies the DDI-CDI InternationalString / LabelForDisplay / ObjectName
          valued properties to plain strings carried under the cdif: namespace. A
          full CDIF treatment of categories lives in cdifEnumerationDomain / SKOS
          Concept.'
        type: object
        properties:
          '@id':
            type: string
          '@type':
            type: array
            items:
              type: string
            contains:
              enum:
              - cdi:Category
            minItems: 1
          cdif:name:
            type: array
            items:
              type: string
            description: Human-understandable name(s). CDIF-simplified from DDI-CDI
              Category.name (ObjectName) to plain strings.
            x-jsonld-id: https://cdif.org/0.1/name
          cdif:descriptiveText:
            type: string
            description: Short natural-language account of the category. CDIF-simplified
              from DDI-CDI Category.descriptiveText (InternationalString).
            x-jsonld-id: https://cdif.org/0.1/descriptiveText
          cdif:definition:
            type: string
            description: Natural-language definition of the category. CDIF-simplified
              from DDI-CDI Category.definition (InternationalString).
            x-jsonld-id: https://cdif.org/0.1/definition
          cdif:displayLabel:
            type: array
            items:
              type: string
            description: Human-readable display label(s). CDIF-simplified from DDI-CDI
              Category.displayLabel (LabelForDisplay).
            x-jsonld-id: https://cdif.org/0.1/displayLabel
      SkosConcept:
        title: SKOS Concept (CDIF vocabulary-bound term reference)
        description: "Vocabulary-bound term reference. CDIF policy implements the
          DDI-CDI ControlledVocabularyEntry / PairedControlledVocabularyEntry concept
          as a skos:Concept from the skosProperties building block. Under the union-type-policy
          a Concept value MUST be a controlled-vocabulary term \u2014 either an @id-only
          reference into a known scheme, a structured schema:DefinedTerm, or a full
          inline skos:Concept node. Plain strings are NOT permitted because vocabulary
          identity cannot be recovered from an unscoped string label."
        anyOf:
        - type: object
          properties:
            '@id':
              type: string
          required:
          - '@id'
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifDataDescription/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.definedTerm
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifDataDescription/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.skosProperties.skosConcept
    x-jsonld-prefixes:
      schema: http://schema.org/
      cdi: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/
      cdif: https://cdif.org/0.1/
    x-schema-source: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifStatistics/schema.yaml
    x-schema-version: https://json-schema.org/draft/2020-12/schema
  cdif.bbr.metadata.cdifProperties.cdifInstanceVariable:
    title: CDIF Instance Variable
    type: object
    properties:
      '@type':
        type: array
        description: Must include both schema:PropertyValue and cdi:InstanceVariable.
          Additional types may be included.
        items:
          type: string
        contains:
          enum:
          - cdi:InstanceVariable
      cdif:physicalDataType:
        type: array
        items:
          anyOf:
          - type: string
          - type: object
            properties:
              '@id':
                type: string
                description: reference to a skos concept for the data type
          - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifDataDescription/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifInstanceVariable/$defs/DefinedTerm
        description: identifier or name for the data type concept.
      cdif:role:
        type: string
        enum:
        - UnitIdentifier
        - Measure
        - Attribute
        - Dimension
        - Descriptor
        - ReferenceVariable
        description: Specifies the role this variable plays in a data structure. UnitIdentifier
          names the unit a row describes; Measure holds observed/derived values; Attribute
          qualifies an observation; Dimension addresses a cell in a multi-dimensional
          cube; Descriptor names the variable that a Reference column records values
          for (long format); ReferenceVariable holds those recorded values.
      cdif:simpleUnitOfMeasure:
        anyOf:
        - type: string
        - type: object
          properties:
            '@id':
              type: string
              description: reference to a skos concept for the data type
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifDataDescription/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifInstanceVariable/$defs/DefinedTerm
      cdif:uses:
        type: array
        items:
          anyOf:
          - type: string
          - type: object
            properties:
              '@id':
                type: string
                description: reference to a skos concept for the property
          - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifDataDescription/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifInstanceVariable/$defs/DefinedTerm
        description: Essentially the same as schema:propertyID. References to concepts
          that this variable measures or represents. When the dataset's distribution
          carries cdi:isStructuredBy (CDIF Data Structure profile), cdif:uses references
          the RepresentedVariable that supplies the represented-variable-level properties
          below, which are then NOT duplicated on the InstanceVariable.
      cdi:function:
        type: array
        items:
          anyOf:
          - type: string
          - type: object
            properties:
              '@id':
                type: string
          - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifDataDescription/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifInstanceVariable/$defs/DefinedTerm
        description: Immutable characteristic of the variable such as geographic designator,
          weight, temporal designation, etc. (InstanceVariable.function).
        x-jsonld-id: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/function
      cdi:platformType:
        anyOf:
        - type: string
        - type: object
          properties:
            '@id':
              type: string
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifDataDescription/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifInstanceVariable/$defs/DefinedTerm
        description: The application or technical system context in which the variable
          has been realized - typically a statistical processing package or processing
          environment (InstanceVariable.platformType).
        x-jsonld-id: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/platformType
      cdi:source:
        anyOf:
        - type: string
        - type: object
          properties:
            '@id':
              type: string
        description: Reference capturing provenance information for this InstanceVariable
          (InstanceVariable.source).
        x-jsonld-id: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/source
      cdif:isDescribedBy_StatisticsCollection:
        description: 'The StatisticsCollection holding summary / category statistics
          for this InstanceVariable (InstanceVariable.isDescribedBy). cdif: namespaced
          and target-suffixed because the DDI-CDI isDescribedBy association is polymorphic.'
        anyOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifDataDescription/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifStatistics/$defs/StatisticsCollection
        - type: object
          properties:
            '@id':
              type: string
          required:
          - '@id'
      cdi:hasIntendedDataType:
        anyOf:
        - type: string
        - type: object
          properties:
            '@id':
              type: string
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifDataDescription/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifInstanceVariable/$defs/DefinedTerm
        description: The data type intended to be used by this variable, independent
          of its physical representation (RepresentedVariable.hasIntendedDataType).
        x-jsonld-id: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/hasIntendedDataType
      cdi:describedUnitOfMeasure:
        anyOf:
        - type: string
        - type: object
          properties:
            '@id':
              type: string
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifDataDescription/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifInstanceVariable/$defs/DefinedTerm
        description: The unit in which the data values are measured, expressed as
          a controlled-vocabulary entry (RepresentedVariable.describedUnitOfMeasure).
          For a plain-string unit, use cdif:simpleUnitOfMeasure instead.
        x-jsonld-id: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/describedUnitOfMeasure
      cdi:qualifies:
        type: object
        properties:
          '@id':
            type: string
        description: reference to an instance variable defined for this dataset
        x-jsonld-id: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/qualifies
    allOf:
    - required:
      - '@type'
    - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifDataDescription/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.variableMeasured
    $defs:
      DefinedTerm:
        anyOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifDataDescription/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.definedTerm
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifDataDescription/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.skosProperties.skosConcept
    x-jsonld-prefixes:
      schema: http://schema.org/
      spdx: http://spdx.org/rdf/terms#
      cdi: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/
      skos: http://www.w3.org/2004/02/skos/core#
      xas: https://xas.org/dictionary/
      nxs: http://purl.org/nexusformat/definitions/
      prov: http://www.w3.org/ns/prov#
