  cdif.bbr.metadata.schemaorgProperties.definedTerm:
    description: "schema.org Defined Term schema.\n\n**Union-type policy:** In CDIF
      profile UML models an attribute typed as\nschema:DefinedTerm is represented
      by a single attribute of that class type.\nThe JSON Schema implementation permits
      the property value to be EITHER a\nplain string (interpreted as schema:name
      or schema:termCode in the default\nvocabulary) OR a full schema:DefinedTerm
      object (with explicit @type, name,\nidentifier, termCode, inDefinedTermSet).
      Consumers should accept either form.\n\nNote that this differs from the cdif
      Concept policy: a Concept (skos:Concept)\nin CDIF profiles MUST be a controlled-vocabulary
      entry (object form or\n@id-reference) \u2014 plain strings are not permitted
      for Concept-typed values\nbecause vocabulary identity cannot be recovered from
      an unscoped label.\n"
    type: object
    properties:
      '@type':
        type: array
        items:
          type: string
        contains:
          enum:
          - schema:DefinedTerm
        minItems: 1
      schema:name:
        type: string
        description: text label for the term that is useful to human user
        x-jsonld-id: http://schema.org/name
      schema:identifier:
        anyOf:
        - type: string
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/provProperties/derivedFrom/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.identifier
        x-jsonld-id: http://schema.org/identifier
      schema:inDefinedTermSet:
        type: string
        description: Name for the controlled vocabulary responsible for this keyword.
        x-jsonld-id: http://schema.org/inDefinedTermSet
      schema:termCode:
        type: string
        description: A representative code for this keyword in the controlled vocabulary.
          Analogous to skos:Notation
        x-jsonld-id: http://schema.org/termCode
    allOf:
    - required:
      - '@type'
    - anyOf:
      - required:
        - schema:name
      - required:
        - schema:identifier
      - required:
        - schema:termCode
    x-jsonld-prefixes:
      schema: http://schema.org/
    x-schema-source: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/schemaorgProperties/definedTerm/schema.yaml
    x-schema-version: https://json-schema.org/draft/2020-12/schema
  cdif.bbr.metadata.profiles.cdifProfile.cdifConceptScheme:
    title: CDIF Concept Scheme
    description: Profile module for SKOS concept schemes used as controlled vocabularies
      in CDIF metadata. Thin wrapper around skosConceptScheme.
    type: object
    properties:
      '@context':
        description: JSON-LD context declaring the skos namespace prefix and any additional
          prefixes used in concept URIs. May be a single object or an array of strings
          and objects.
        type: object
        properties:
          skos:
            enum:
            - http://www.w3.org/2004/02/skos/core#
        required:
        - skos
      '@id':
        type: string
        description: URI identifier for this concept scheme.
      '@type':
        type: array
        items:
          type: string
        contains:
          enum:
          - skos:ConceptScheme
        minItems: 1
      skos:prefLabel:
        description: Preferred lexical label for the concept scheme. A single string,
          a single language-tagged value, or an array of language-tagged values. Each
          language should appear at most once.
        anyOf:
        - type: string
