            anyOf:
            - type: object
              properties:
                '@id':
                  type: string
              required:
              - '@id'
            - type: array
              items:
                type: object
                properties:
                  '@id':
                    type: string
                required:
                - '@id'
          skos:broader:
            description: Broader (parent) concepts in the hierarchy. Items are inline
              concept objects or @id references.
            type: array
            items:
