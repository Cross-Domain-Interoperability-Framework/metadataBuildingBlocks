        anyOf:
        - type: string
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/provProperties/derivedFrom/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.profiles.cdifProfile.cdifConceptScheme/$defs/LanguageTaggedValue
        - type: array
          items:
            anyOf:
            - type: string
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/provProperties/derivedFrom/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.profiles.cdifProfile.cdifConceptScheme/$defs/LanguageTaggedValue
      skos:notation:
        description: Classification code or notation for this concept scheme.
        type: array
        items:
          type: string
      skos:note:
        description: General note about the concept scheme.
        anyOf:
        - type: string
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/provProperties/derivedFrom/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.profiles.cdifProfile.cdifConceptScheme/$defs/LanguageTaggedValue
        - type: array
          items:
            anyOf:
            - type: string
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/provProperties/derivedFrom/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.profiles.cdifProfile.cdifConceptScheme/$defs/LanguageTaggedValue
      skos:hasTopConcept:
        description: Top-level concepts in this scheme. Each item is a skos:Concept
          (inline or @id reference).
        type: array
        minItems: 1
        items:
          anyOf:
          - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/provProperties/derivedFrom/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.profiles.cdifProfile.cdifConceptScheme/$defs/cdifConcept
          - type: object
            properties:
              '@id':
                type: string
                description: URI reference to a concept defined elsewhere
            required:
            - '@id'
      schema:version:
        description: Version identifier for the concept scheme.
        anyOf:
        - type: string
        - type: number
      schema:subjectOf:
        type: array
        items:
          type: object
          properties:
            '@id':
              type: object
              properties:
                '@id':
                  enum:
                  - https://w3id.org/cdif/conceptscheme/1.0
    required:
    - '@type'
    - skos:prefLabel
    - skos:definition
    - skos:hasTopConcept
    $defs:
      cdifConcept:
        type: object
        properties:
          '@context':
            description: JSON-LD context declaring the skos namespace prefix. May
