  cdif.bbr.metadata.schemaorgProperties.identifier:
    description: 'Properties for a schema.org identifier (schema:PropertyValue pattern).

      **Union-type policy:** In CDIF profile UML models an attribute typed as

      schema:Identifier / schema:PropertyValue is represented by a single attribute

      of that class type. The JSON Schema implementation permits the property value

      to be EITHER a plain string (interpreted as the bare identifier value) OR a

      full schema:PropertyValue object (with explicit @type, propertyID, value).

      Consumers should accept either form.

      '
    type: object
    properties:
      '@type':
        type: array
        items:
          type: string
        contains:
          enum:
          - schema:PropertyValue
        minItems: 1
      schema:propertyID:
        type: string
        description: In this context for the schema:PropertyValue, this field is an
          identifier for the identifier schema, e.g. DOI, ARK.  Get values from https://registry.identifiers.org/registry/
          for interoperability
        x-jsonld-id: http://schema.org/propertyID
      schema:value:
        type: string
        description: the identifier string. E.g. 10.5066/F7VX0DMQ
        x-jsonld-id: http://schema.org/value
      schema:url:
        type: string
        format: uri
        description: 'web-resolveable string for the identifier; host name part is
          location of a resolver that will return some representation for the given
          identifier value. E.g. https://doi.org/10.5066/F7VX0DMQ '
        x-jsonld-id: http://schema.org/url
    allOf:
    - required:
      - '@type'
    - anyOf:
      - required:
        - schema:value
      - required:
        - schema:url
    x-jsonld-prefixes:
      schema: http://schema.org/
    x-schema-source: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/schemaorgProperties/identifier/schema.yaml
    x-schema-version: https://json-schema.org/draft/2020-12/schema
title: CDIF OpenAPI-aligned WebAPI distribution
description: Documents a WebAPI distribution of a resource using property structure
  aligned with OpenAPI Specification 3.1. Reuses CDIF schema.org-based WebAPI metadata
  (serviceType, termsOfService, documentation) and adds OpenAPI-aligned Operation,
  Parameter, RequestBody, and Response structure under an oas namespace. Use as an
  alternative to schemaorgProperties/webAPI when the metadata record should inline
  OpenAPI-style operation, parameter, and response detail.
type: object
properties:
  '@type':
    type: array
    items:
      type: string
    contains:
      enum:
      - schema:WebAPI
    minItems: 1
  schema:name:
    type: string
    description: title of the API. Maps OpenAPI info.title.
    x-jsonld-id: http://schema.org/name
  schema:description:
    type: string
    description: description of the API. Maps OpenAPI info.description. May use CommonMark.
    x-jsonld-id: http://schema.org/description
  schema:serviceType:
    description: identifier for the kind of service, expected to identify the service
      type and version. For interoperability, ideally a resolvable identifier; otherwise
      a string from a vocabulary shared between provider and consumer. Subsumes OpenAPI
      info.version when the service-type identifier includes versioning.
    anyOf:
    - type: string
    - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifDataType/cdifOpenApi/schema-oas3.0.yaml#/$defs/cdifConceptOrTerm
    x-jsonld-id: http://schema.org/serviceType
  schema:termsOfService:
    description: Description of access privileges required to use the API (e.g. registration,
      licensing, payments). Maps OpenAPI info.termsOfService. Note that access constraints
      applying to all distributions of the resource should be specified at the resource
      level.
    oneOf:
    - type: string
    - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifDataType/cdifOpenApi/schema-oas3.0.yaml#/$defs/Reference
    x-jsonld-id: http://schema.org/termsOfService
  schema:documentation:
    description: a document that provides a machine-actionable description of this
      service instance, typically the canonical OpenAPI document. Even when this BB
      inlines OAS detail, schema:documentation may still link to an authoritative
      OAS source.
    oneOf:
    - type: string
    - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifDataType/cdifOpenApi/schema-oas3.0.yaml#/$defs/Reference
    x-jsonld-id: http://schema.org/documentation
  spdx:license:
    description: SPDX license identifier expression for the API itself, per OpenAPI
      License Object. Use schema:license at the resource (parent) level for licensing
      of the data. If only a URL identifier is available rather than an SPDX id, encode
      as a cdif:Reference.
    oneOf:
    - type: string
    - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifDataType/cdifOpenApi/schema-oas3.0.yaml#/$defs/Reference
    x-jsonld-id: http://spdx.org/rdf/terms#license
  schema:potentialAction:
    type: array
    description: operations exposed by the API. Each entry corresponds to an OpenAPI
      Operation Object (one path + HTTP method).
    minItems: 1
    items:
      $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifDataType/cdifOpenApi/schema-oas3.0.yaml#/$defs/Operation
    x-jsonld-id: http://schema.org/potentialAction
required:
- '@type'
- schema:serviceType
- schema:termsOfService
- schema:potentialAction
$defs:
  Operation:
    type: object
    description: an OpenAPI-aligned operation. Corresponds to one OpenAPI Operation
      Object; the path component of OAS Path Item is folded into schema:target/schema:urlTemplate
      together with the server URL.
    properties:
      '@id':
        type: string
      '@type':
        type: array
        items:
          type: string
        contains:
          enum:
          - schema:Action
          - schema:AssessAction
          - schema:ConsumeAction
          - schema:ControlAction
          - schema:CreateAction
          - schema:DeleteAction
          - schema:FindAction
          - schema:InteractAction
          - schema:MoveAction
