          cdif: namespaced and target-suffixed because the DDI-CDI cdi:has association
          is polymorphic.'
        items:
          anyOf:
          - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifDataType/cdifStatistics/schema-oas3.0.yaml#/$defs/Statistics
          - type: object
