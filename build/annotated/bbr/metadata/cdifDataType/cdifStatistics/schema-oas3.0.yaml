          $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifDataType/cdifStatistics/schema-oas3.0.yaml#/$defs/CategoryStatistics
        x-jsonld-id: https://cdif.org/0.1/has_CategoryStatistics
    required:
    - '@type'
    - cdi:statistic
  CategoryStatistics:
    title: CategoryStatistics
    description: Statistics for a specific Category of an instance variable within
      a data set.
    type: object
    properties:
      '@id':
        type: string
        description: Identifier for this CategoryStatistics node.
