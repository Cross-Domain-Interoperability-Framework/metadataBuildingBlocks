          this Statistics bundle summarizes \u2014 the per-bundle \"what these numbers
          describe\" link. When a Statistics node sits inside a StatisticsCollection
          that indexes more than one variable, cdif:appliesTo disambiguates which
          variable each bundle describes."
        items:
          anyOf:
          - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifDataType/cdifStatistics/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifDataType.cdifInstanceVariable
          - type: object
            properties:
              '@id':
                type: string
            required:
