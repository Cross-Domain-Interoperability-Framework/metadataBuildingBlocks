x-defs:
  cdif.bbr.metadata.cdifDataType.cdifEnumerationDomain:
    title: CDIF Enumeration Domain
    description: A base class acting as an extension point to allow a codification
      vocabulary to be documented as enumerated value domain.
    type: object
    properties:
      '@type':
        type: array
        items:
          type: string
        contains:
          enum:
          - cdif:EnumerationDomain
        minItems: 1
      '@id':
        type: string
        description: Identifier for this EnumerationDomain node
      cdif:identifier:
        description: Identifier for this enumerated (categorical) domain.
        x-jsonld-id: https://cdif.org/0.1/identifier
        allOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifDataType/cdifValueDomain/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.identifier
      schema:name:
        type: string
        description: Human understandable name (liguistic signifier, word, phrase,
          or mnemonic).
        x-jsonld-id: http://schema.org/name
      cdif:references:
        description: CDIF codelist (skos:ConceptScheme) whose concepts define the
          allowed values of this enumeration domain.
        anyOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifDataType/cdifValueDomain/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.profiles.cdifProfile.cdifCodelist
        - type: object
          description: object reference via URI or URI fragment referencing an @id
            in the same document
          properties:
            '@id':
              type: string
        x-jsonld-id: https://cdif.org/0.1/references
      cdif:purpose:
        type: string
        description: Intent or reason for the object/the description of the object.
        x-jsonld-id: https://cdif.org/0.1/purpose
    required:
    - '@type'
    - cdif:references
    x-jsonld-prefixes:
      schema: http://schema.org/
      cdi: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/
      cdif: https://cdif.org/0.1/
      skos: http://www.w3.org/2004/02/skos/core#
    x-schema-source: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifDataType/cdifEnumerationDomain/schema.yaml
    x-schema-version: https://json-schema.org/draft/2020-12/schema
  cdif.bbr.metadata.schemaorgProperties.identifier:
    description: 'Properties for a schema.org identifier (schema:PropertyValue pattern).


      **Union-type policy:** In CDIF profile UML models an attribute typed as

      schema:Identifier / schema:PropertyValue is represented by a single attribute

      of that class type. The JSON Schema implementation permits the property value

      to be EITHER a plain string (interpreted as the bare identifier value) OR a

      full schema:PropertyValue object (with explicit @type, propertyID, value).

      Consumers should accept either form.

      '
    type: object
    properties:
      '@type':
        type: array
        items:
          type: string
        contains:
          enum:
          - schema:PropertyValue
        minItems: 1
      schema:propertyID:
        type: string
        description: In this context for the schema:PropertyValue, this field is an
          identifier for the identifier schema, e.g. DOI, ARK.  Get values from https://registry.identifiers.org/registry/
          for interoperability
        x-jsonld-id: http://schema.org/propertyID
      schema:value:
        type: string
        description: the identifier string. E.g. 10.5066/F7VX0DMQ
        x-jsonld-id: http://schema.org/value
      schema:url:
        type: string
        format: uri
        description: 'web-resolveable string for the identifier; host name part is
          location of a resolver that will return some representation for the given
          identifier value. E.g. https://doi.org/10.5066/F7VX0DMQ '
        x-jsonld-id: http://schema.org/url
    allOf:
    - required:
      - '@type'
    - anyOf:
      - required:
        - schema:value
      - required:
        - schema:url
    x-jsonld-prefixes:
      schema: http://schema.org/
    x-schema-source: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/schemaorgProperties/identifier/schema.yaml
    x-schema-version: https://json-schema.org/draft/2020-12/schema
  cdif.bbr.metadata.profiles.cdifProfile.cdifCodelist:
    type: object
    title: CDIF Codelist
    description: A controlled-vocabulary codelist implemented as a skos:ConceptScheme
      constrained for CDIF use. The scheme must have a resolvable @id and identify
      its top concepts via skos:hasTopConcept; each concept (CdifCodelistConcept)
      must have a resolvable @id, skos:inScheme, skos:prefLabel, and skos:notation.
      Hierarchical concepts must declare both skos:narrower (for JSON tree traversal)
      and skos:broader (for upward navigation) where hierarchy exists. CDIF metadata
      properties (schema:identifier, schema:dateModified, schema:license or schema:conditionsOfAccess)
      take precedence over the equivalent dcterms properties from the base skos:ConceptScheme.
    properties:
      '@context':
        description: JSON-LD context (an object) declaring the skos namespace prefix
          and any additional prefixes used in concept URIs.
        type: object
        properties:
          skos:
            enum:
            - http://www.w3.org/2004/02/skos/core#
        required:
        - skos
      '@id':
        type: string
        description: URI identifier for this concept scheme.
      '@type':
        type: array
        items:
          type: string
        contains:
          enum:
          - skos:ConceptScheme
        minItems: 1
      schema:identifier:
        description: Primary identifier for the codelist. May be a string URI or a
          structured PropertyValue.
        anyOf:
        - type: string
        - type: object
          properties:
            '@type':
              type: array
              items:
                type: string
              contains:
                enum:
                - schema:PropertyValue
            schema:propertyID:
              type: string
              x-jsonld-id: http://schema.org/propertyID
            schema:value:
              type: string
              x-jsonld-id: http://schema.org/value
            schema:url:
              type: string
              x-jsonld-id: http://schema.org/url
        x-jsonld-id: http://schema.org/identifier
      schema:dateModified:
        type: string
        description: ISO 8601 date when the codelist was last modified.
        x-jsonld-id: http://schema.org/dateModified
      schema:url:
        type: string
        format: uri
        description: Web location of a page describing the codelist.
        default: missing
        x-jsonld-id: http://schema.org/url
      schema:license:
        description: License for the codelist.
        type: array
        items:
          anyOf:
          - type: string
          - type: object
            properties:
              '@id':
                type: string
        x-jsonld-id: http://schema.org/license
      schema:conditionsOfAccess:
        description: Text statement of access conditions for the codelist.
        type: array
        items:
          type: string
        x-jsonld-id: http://schema.org/conditionsOfAccess
      skos:prefLabel:
        description: Preferred lexical label for the concept scheme. A single string,
          a single language-tagged value, or an array of language-tagged values. Each
          language should appear at most once.
        type: string
        x-jsonld-id: http://www.w3.org/2004/02/skos/core#prefLabel
      skos:definition:
        description: Formal explanation of the meaning or purpose of this concept
          scheme.
        type: string
        x-jsonld-id: http://www.w3.org/2004/02/skos/core#definition
      skos:note:
        description: General note about the concept scheme.
        type: string
        x-jsonld-id: http://www.w3.org/2004/02/skos/core#note
      skos:hasTopConcept:
        description: Top-level concepts that have no skos:broader in this scheme.
          Required for hierarchical codelists.
        type: array
        minItems: 1
        items:
          $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifDataType/cdifValueDomain/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.profiles.cdifProfile.cdifCodelist/$defs/CdifCodelistConcept
        x-jsonld-id: http://www.w3.org/2004/02/skos/core#hasTopConcept
      schema:subjectOf:
        type: array
        items:
          type: object
          properties:
            '@id':
              type: object
              properties:
                '@id':
                  enum:
                  - https://w3id.org/cdif/codelist/1.0
        x-jsonld-id: http://schema.org/subjectOf
    anyOf:
    - required:
      - schema:license
    - required:
      - schema:conditionsOfAccess
    required:
    - '@id'
    - skos:prefLabel
    - schema:identifier
    - schema:dateModified
    - skos:hasTopConcept
    $defs:
      CdifCodelistConcept:
        description: A SKOS Concept constrained for CDIF codelist use. Must have a
          resolvable @id, skos:inScheme, skos:notation, and skos:prefLabel. Becasue
          JSON-LD is an open-world implementation, any other skos properties may be
          included.
        type: object
        properties:
          '@id':
            type: string
            description: Globally unique, resolvable URI for this concept.
          skos:inScheme:
            description: The concept scheme this concept belongs to. Required for
              CDIF codelist concepts.
            type: array
            items:
              type: object
              properties:
                '@id':
                  type: string
              required:
              - '@id'
            x-jsonld-id: http://www.w3.org/2004/02/skos/core#inScheme
          skos:prefLabel:
            description: Preferred lexical label for this concept. A single string,
              a single language-tagged value, or an array of language-tagged values.
              Each language should appear at most once.
            type: string
            x-jsonld-id: http://www.w3.org/2004/02/skos/core#prefLabel
          skos:notation:
            description: Classification code for this concept within a scheme.
            type: string
            x-jsonld-id: http://www.w3.org/2004/02/skos/core#notation
          skos:definition:
            description: Formal definition of this concept. Optional for CDIF codelist
              concepts. A plain string.
            type: string
            x-jsonld-id: http://www.w3.org/2004/02/skos/core#definition
          skos:narrower:
            description: Narrower (child) concepts. If present, each inline concept
              must also declare skos:broader pointing back to the parent concept.
              Both skos:narrower and skos:broader must be explicit in CDIF codelists.
            type: array
            items:
              anyOf:
              - type: object
                properties:
                  '@id':
                    type: string
                required:
                - '@id'
              - allOf:
                - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifDataType/cdifValueDomain/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.profiles.cdifProfile.cdifCodelist/$defs/CdifCodelistConcept
                - required:
                  - skos:broader
            x-jsonld-id: http://www.w3.org/2004/02/skos/core#narrower
          skos:broader:
            description: Broader (parent) concepts. Required on any concept that appears
              as a skos:narrower value of another concept. CDIF requires both directions
              to be explicit for hierarchy traversal.
            type: array
            items:
              type: object
              properties:
                '@id':
                  type: string
              required:
              - '@id'
            x-jsonld-id: http://www.w3.org/2004/02/skos/core#broader
        required:
        - '@id'
        - skos:inScheme
        - skos:prefLabel
        - skos:notation
    x-jsonld-prefixes:
      skos: http://www.w3.org/2004/02/skos/core#
      dcterms: http://purl.org/dc/terms/
      schema: http://schema.org/
    x-schema-source: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/profiles/cdifProfile/cdifCodelist/schema.yaml
    x-schema-version: https://json-schema.org/draft/2020-12/schema
title: CDIF Value Domain
description: "Value domain for substantive or sentinel values for a variable. Typically
  a description and/or enumeration of allowed values of interest. CDIF profile of
  the DDI-CDI ValueDomain \u2014 a single node is either a cdif:SubstantiveValueDomain
  (subject-matter values) or a cdif:SentinelValueDomain (processing/missing-value
  codes)."
oneOf:
- $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifDataType/cdifValueDomain/schema-oas3.0.yaml#/$defs/SubstantiveValueDomain
- $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifDataType/cdifValueDomain/schema-oas3.0.yaml#/$defs/SentinelValueDomain
$defs:
  SubstantiveValueDomain:
    type: object
    description: Value domain for a substantive conceptual domain. Typically a description
      and/or enumeration of allowed values of interest.
    properties:
      '@type':
        type: array
        items:
          type: string
        contains:
          enum:
          - cdif:SubstantiveValueDomain
        minItems: 1
      '@id':
        type: string
        description: Identifier for this SubstantiveValueDomain node
      cdif:takesValuesFrom:
        anyOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifDataType/cdifValueDomain/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifDataType.cdifEnumerationDomain
        - type: object
          description: JSON-LD @id reference to a node defined elsewhere in the graph
          properties:
            '@id':
              type: string
              description: IRI or blank node identifier of the referenced node
          required:
          - '@id'
        x-jsonld-id: https://cdif.org/0.1/takesValuesFrom
      cdif:displayLabel:
        type: string
        description: A human-readable display label for the object. Supports the use
          of multiple languages. Repeat for labels with different content, for example,
          labels with differing length limitations.
        x-jsonld-id: https://cdif.org/0.1/displayLabel
      cdif:recommendedDataType:
        type: array
        description: The data types that are recommended for use with this domain.
        items:
          $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifDataType/cdifValueDomain/schema-oas3.0.yaml#/$defs/xsdDataType
        minItems: 1
        x-jsonld-id: https://cdif.org/0.1/recommendedDataType
      cdi:isDescribedBy:
        description: A ValueAndConceptDescription giving the formal description (ranges,
          patterns, classification level, expressions) of the values this domain admits.
        anyOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifDataType/cdifValueDomain/schema-oas3.0.yaml#/$defs/ValueAndConceptDescription
        - type: object
          description: JSON-LD @id reference to a node defined elsewhere in the graph
          properties:
            '@id':
              type: string
              description: IRI or blank node identifier of the referenced node
          required:
          - '@id'
        x-jsonld-id: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/isDescribedBy
    required:
    - '@type'
    anyOf:
    - required:
      - cdif:takesValuesFrom
    - required:
      - cdif:recommendedDataType
  SentinelValueDomain:
    type: object
    description: Value domain for a sentinel conceptual domain.
    properties:
      '@type':
        type: array
        items:
          type: string
        contains:
          enum:
          - cdif:SentinelValueDomain
        minItems: 1
      '@id':
        type: string
        description: Identifier for this SentinelValueDomain node
      cdif:takesValuesFrom:
        anyOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifDataType/cdifValueDomain/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifDataType.cdifEnumerationDomain
        - type: object
          description: JSON-LD @id reference to a node defined elsewhere in the graph
          properties:
            '@id':
              type: string
              description: IRI or blank node identifier of the referenced node
          required:
          - '@id'
        x-jsonld-id: https://cdif.org/0.1/takesValuesFrom
      cdif:displayLabel:
        type: string
        description: A human-readable display label for the object. Supports the use
          of multiple languages. Repeat for labels with different content, for example,
          labels with differing length limitations.
        x-jsonld-id: https://cdif.org/0.1/displayLabel
      cdif:recommendedDataType:
        type: array
        description: The data types that are recommended for use with this domain.
        items:
          $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifDataType/cdifValueDomain/schema-oas3.0.yaml#/$defs/xsdDataType
        minItems: 1
        x-jsonld-id: https://cdif.org/0.1/recommendedDataType
      cdi:isDescribedBy:
        description: A ValueAndConceptDescription giving the formal description (ranges,
          patterns, classification level, expressions) of the values this domain admits.
        anyOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifDataType/cdifValueDomain/schema-oas3.0.yaml#/$defs/ValueAndConceptDescription
        - type: object
          description: JSON-LD @id reference to a node defined elsewhere in the graph
          properties:
            '@id':
              type: string
              description: IRI or blank node identifier of the referenced node
          required:
          - '@id'
        x-jsonld-id: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/isDescribedBy
    required:
    - '@type'
    anyOf:
    - required:
      - cdif:takesValuesFrom
    - required:
      - cdif:recommendedDataType
  ValueAndConceptDescription:
    type: object
    description: Formal description of a set of values.
    properties:
      '@type':
        type: array
        items:
          type: string
        contains:
          enum:
          - cdi:ValueAndConceptDescription
        minItems: 1
      '@id':
        type: string
        description: Identifier for this ValueAndConceptDescription node
      cdi:classificationLevel:
        type: string
        enum:
        - Continuous
        - Interval
        - Nominal
        - Ordinal
        - Ratio
        description: Indicates the type of relationship, nominal, ordinal, interval,
          ratio, or continuous. Use where appropriate for the representation type.
        x-jsonld-id: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/classificationLevel
      cdi:description:
        type: string
        description: A formal description of the set of values in human-readable language.
        x-jsonld-id: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/description
      cdi:formatPattern:
        type: string
        description: 'A pattern for a number as described in Unicode Locale Data Markup
          Language (LDML) (http://www.unicode.org/reports/tr35/tr35.html) Part 3:
          Numbers (http://www.unicode.org/reports/tr35/tr35-numbers.html#Number_Format_Patterns)
          and Part 4. Dates (http://www.unicode.org/reports/tr35/tr35-dates.html#Date_Format_Patterns)
          . Examples would be #,##0.### to describe the pattern for a decimal number,
          or yyyy.MM.dd G ''at'' HH:mm:ss zzz for a datetime pattern.'
        x-jsonld-id: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/formatPattern
      cdi:identifier:
        description: Identifier for objects requiring short- or long-lasting referencing
          and management.
        x-jsonld-id: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/identifier
        allOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifDataType/cdifValueDomain/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.identifier
      cdi:logicalExpression:
        type: string
        description: A logical expression where the values of "x" making the expression
          true are the members of the set of valid values. For example, "(all reals
          x such that x > 0)" describes the real numbers greater than 0.
        x-jsonld-id: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/logicalExpression
      cdi:maximumValueExclusive:
        type: string
        description: 'A string denoting the maximum possible value (excluding this
          value). From the W3C Recommendation "Metadata Vocabulary for Tabular Data"
          (https://www.w3.org/TR/tabular-metadata/) 5.11.2: "maxExclusive: An atomic
          property that contains a single number or string that is the maximum valid
          value (exclusive). The value of this property becomes the maximum exclusive
          annotation for the described datatype. See Value Constraints in [tabular-data-model]
          for details."'
        x-jsonld-id: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/maximumValueExclusive
      cdi:maximumValueInclusive:
        type: string
        description: 'A string denoting the maximum possible value. From the W3C Recommendation
          "Metadata Vocabulary for Tabular Data" (https://www.w3.org/TR/tabular-metadata/)
          5.11.2: "maximum: An atomic property that contains a single number or string
          that is the maximum valid value (inclusive); equivalent to maxInclusive.
          The value of this property becomes the maximum annotation for the described
          datatype. See Value Constraints in [tabular-data-model] for details."'
        x-jsonld-id: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/maximumValueInclusive
      cdi:minimumValueExclusive:
        type: string
        description: 'A string denoting the minimum possible value (excluding this
          value). From the W3C Recommendation "Metadata Vocabulary for Tabular Data"
          (https://www.w3.org/TR/tabular-metadata/) 5.11.2: "minExclusive: An atomic
          property that contains a single number or string that is the minimum valid
          value (exclusive). The value of this property becomes the minimum exclusive
          annotation for the described datatype. See Value Constraints in [tabular-data-model]
          for details."'
        x-jsonld-id: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/minimumValueExclusive
      cdi:minimumValueInclusive:
        type: string
        description: 'A string denoting the minimum possible value. From the W3C Recommendation
          "Metadata Vocabulary for Tabular Data" (https://www.w3.org/TR/tabular-metadata/)
          5.11.2: "minimum: An atomic property that contains a single number or string
          that is the minimum valid value (inclusive); equivalent to minInclusive.
          The value of this property becomes the minimum annotation for the described
          datatype. See Value Constraints in [tabular-data-model] for details."'
        x-jsonld-id: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/minimumValueInclusive
      cdi:regularExpression:
        type: string
        description: A regular expression where strings matching the expression belong
          to the set of valid values.
        x-jsonld-id: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/regularExpression
    required:
    - '@type'
  xsdDataType:
    type: string
    enum:
    - xsd:anyURI
    - xsd:base64Binary
    - xsd:boolean
    - xsd:byte
    - xsd:date
    - xsd:dateTime
    - xsd:decimal
    - xsd:double
    - xsd:float
    - xsd:gDay
    - xsd:gMonth
    - xsd:gMonthDay
    - xsd:gYear
    - xsd:gYearMonth
    - xsd:hexBinary
    - xsd:int
    - xsd:integer
    - xsd:language
    - xsd:long
    - xsd:Name
    - xsd:NCName
    - xsd:NMTOKEN
    - xsd:negativeInteger
    - xsd:nonNegativeInteger
    - xsd:nonPositiveInteger
    - xsd:normalizedString
    - xsd:positiveInteger
    - xsd:short
    - xsd:string
    - xsd:time
    - xsd:token
    - xsd:unsignedByte
    - xsd:unsignedInt
    - xsd:unsignedLong
    - xsd:unsignedShort
x-jsonld-prefixes:
  schema: http://schema.org/
  cdi: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/
  cdif: https://cdif.org/0.1/
  skos: http://www.w3.org/2004/02/skos/core#
  xsd: http://www.w3.org/2001/XMLSchema#
x-schema-version: https://json-schema.org/draft/2020-12/schema
