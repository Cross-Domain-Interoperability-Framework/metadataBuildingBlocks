x-defs:
  cdif.bbr.metadata.cdifDataType.cdifPhysicalMapping:
    title: Physical Mapping Type
    description: Defines implementation-specific properties for the representation
      of a variable in a dataset. Aligned with CDIF 2026 schema using DDI-CDI flat
      per-column mapping structure.
    type: object
    properties:
      '@type':
        type: array
        items:
          type: string
        contains:
          enum:
          - cdif:PhysicalMapping
          - cdif:TextMapping
          - cdif:LocatorMapping
        minItems: 1
        description: Must include a physical-mapping family type. A plain physical
          mapping uses cdif:PhysicalMapping; the cdifTextMapping / cdifLocatorMapping
          specializations narrow this to cdif:TextMapping / cdif:LocatorMapping respectively
          (they compose this schema via allOf, so the base accepts any of the family
          rather than requiring the cdif:PhysicalMapping token).
      cdif:index:
        type: integer
        minimum: 0
        description: Non-negative integer that orders the fields in the data structure
          (column number).
        x-jsonld-id: https://cdif.org/0.1/index
      cdif:format:
        type: string
        description: A format for number expressed as a string, or date format like
          YYYY/MM or MM-DD-YY.
        x-jsonld-id: https://cdif.org/0.1/format
      cdif:physicalDataType:
        anyOf:
        - type: string
        - type: object
          properties:
            '@id':
              type: string
              description: reference to a skos concept for the data type
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifDataType/cdifTextMapping/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifDataType.cdifPhysicalMapping/$defs/cdifConceptOrTerm
        description: identifier or name for the data type concept.
        x-jsonld-id: https://cdif.org/0.1/physicalDataType
      cdi:numberPattern:
        type: string
        description: Number format pattern for the field (PhysicalMapping.numberPattern).
          Text-format properties (column width, decimal/digit-group separators, display
          label) live on cdifTextMapping.
        x-jsonld-id: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/numberPattern
      cdi:nullSequence:
        type: string
        description: The value of this property becomes the null annotation for the
          described column.
        x-jsonld-id: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/nullSequence
      cdi:defaultValue:
        type: string
        description: A default string indicating the value to substitute for an empty
          string.
        x-jsonld-id: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/defaultValue
      cdi:scale:
        type: integer
        x-jsonld-id: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/scale
      cdi:decimalPositions:
        type: integer
        x-jsonld-id: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/decimalPositions
      cdi:minimumLength:
        type: integer
        x-jsonld-id: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/minimumLength
      cdi:maximumLength:
        type: integer
        x-jsonld-id: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/maximumLength
      cdi:isRequired:
        type: boolean
        default: false
        x-jsonld-id: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/isRequired
      cdif:formats_InstanceVariable:
        type: object
        description: Reference to a variable defined in schema:variableMeasured.
        properties:
          '@id':
            type: string
            description: This should be a reference to a variable defined in the schema:variableMeasured
              section.
        x-jsonld-id: https://cdif.org/0.1/formats_InstanceVariable
    $defs:
      cdifConceptOrTerm:
        anyOf:
        - type: object
          properties:
            '@id':
              type: string
              description: reference to a skos concept for the data type
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifDataType/cdifTextMapping/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.definedTerm
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifDataType/cdifTextMapping/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.profiles.cdifProfile.cdifConceptScheme/$defs/cdifConcept
    x-jsonld-prefixes:
      cdif: https://cdif.org/0.1/
      schema: http://schema.org/
      ada: https://ada.astromat.org/metadata/
      cdi: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/
    x-schema-source: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifDataType/cdifPhysicalMapping/schema.yaml
    x-schema-version: https://json-schema.org/draft/2020-12/schema
  cdif.bbr.metadata.schemaorgProperties.definedTerm:
    description: "schema.org Defined Term schema.\n\n**Union-type policy:** In CDIF
      profile UML models an attribute typed as\nschema:DefinedTerm is represented
      by a single attribute of that class type.\nThe JSON Schema implementation permits
      the property value to be EITHER a\nplain string (interpreted as schema:name
      or schema:termCode in the default\nvocabulary) OR a full schema:DefinedTerm
      object (with explicit @type, name,\nidentifier, termCode, inDefinedTermSet).
      Consumers should accept either form.\n\nNote that this differs from the cdif
      Concept policy: a Concept (skos:Concept)\nin CDIF profiles MUST be a controlled-vocabulary
      entry (object form or\n@id-reference) \u2014 plain strings are not permitted
      for Concept-typed values\nbecause vocabulary identity cannot be recovered from
      an unscoped label.\n"
    type: object
    properties:
      '@type':
        type: array
        items:
          type: string
        contains:
          enum:
          - schema:DefinedTerm
        minItems: 1
      schema:name:
        type: string
        description: text label for the term that is useful to human user
        x-jsonld-id: http://schema.org/name
      schema:identifier:
        anyOf:
        - type: string
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifDataType/cdifTextMapping/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.identifier
        x-jsonld-id: http://schema.org/identifier
      schema:inDefinedTermSet:
        type: string
        description: Name for the controlled vocabulary responsible for this keyword.
        x-jsonld-id: http://schema.org/inDefinedTermSet
      schema:termCode:
        type: string
        description: A representative code for this keyword in the controlled vocabulary.
          Analogous to skos:Notation
        x-jsonld-id: http://schema.org/termCode
    allOf:
    - required:
      - '@type'
    - anyOf:
      - required:
        - schema:name
      - required:
        - schema:identifier
      - required:
        - schema:termCode
    x-jsonld-prefixes:
      schema: http://schema.org/
    x-schema-source: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/schemaorgProperties/definedTerm/schema.yaml
    x-schema-version: https://json-schema.org/draft/2020-12/schema
  cdif.bbr.metadata.profiles.cdifProfile.cdifConceptScheme:
    title: CDIF Concept Scheme
    description: Profile module for SKOS concept schemes used as controlled vocabularies
      in CDIF metadata. Thin wrapper around skosConceptScheme.
    type: object
    properties:
      '@context':
        description: JSON-LD context declaring the skos namespace prefix and any additional
          prefixes used in concept URIs. May be a single object or an array of strings
          and objects.
        type: object
        properties:
          skos:
            enum:
            - http://www.w3.org/2004/02/skos/core#
        required:
        - skos
      '@id':
        type: string
        description: URI identifier for this concept scheme.
      '@type':
        type: array
        items:
          type: string
        contains:
          enum:
          - skos:ConceptScheme
        minItems: 1
      skos:prefLabel:
        description: Preferred lexical label for the concept scheme. A single string,
          a single language-tagged value, or an array of language-tagged values. Each
          language should appear at most once.
        anyOf:
        - type: string
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifDataType/cdifTextMapping/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.profiles.cdifProfile.cdifConceptScheme/$defs/LanguageTaggedValue
        - type: array
          items:
            $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifDataType/cdifTextMapping/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.profiles.cdifProfile.cdifConceptScheme/$defs/LanguageTaggedValue
      skos:altLabel:
        description: Alternative lexical labels (acronyms, abbreviations, spelling
          variants).
        anyOf:
        - type: string
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifDataType/cdifTextMapping/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.profiles.cdifProfile.cdifConceptScheme/$defs/LanguageTaggedValue
        - type: array
          items:
            anyOf:
            - type: string
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifDataType/cdifTextMapping/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.profiles.cdifProfile.cdifConceptScheme/$defs/LanguageTaggedValue
      skos:definition:
        description: Formal explanation of the meaning or purpose of this concept
          scheme.
        anyOf:
        - type: string
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifDataType/cdifTextMapping/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.profiles.cdifProfile.cdifConceptScheme/$defs/LanguageTaggedValue
        - type: array
          items:
            anyOf:
            - type: string
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifDataType/cdifTextMapping/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.profiles.cdifProfile.cdifConceptScheme/$defs/LanguageTaggedValue
      skos:notation:
        description: Classification code or notation for this concept scheme.
        type: array
        items:
          type: string
      skos:note:
        description: General note about the concept scheme.
        anyOf:
        - type: string
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifDataType/cdifTextMapping/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.profiles.cdifProfile.cdifConceptScheme/$defs/LanguageTaggedValue
        - type: array
          items:
            anyOf:
            - type: string
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifDataType/cdifTextMapping/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.profiles.cdifProfile.cdifConceptScheme/$defs/LanguageTaggedValue
      skos:hasTopConcept:
        description: Top-level concepts in this scheme. Each item is a skos:Concept
          (inline or @id reference).
        type: array
        minItems: 1
        items:
          anyOf:
          - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifDataType/cdifTextMapping/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.profiles.cdifProfile.cdifConceptScheme/$defs/cdifConcept
          - type: object
            properties:
              '@id':
                type: string
                description: URI reference to a concept defined elsewhere
            required:
            - '@id'
      schema:version:
        description: Version identifier for the concept scheme.
        anyOf:
        - type: string
        - type: number
      schema:subjectOf:
        type: array
        items:
          type: object
          properties:
            '@id':
              type: object
              properties:
                '@id':
                  enum:
                  - https://w3id.org/cdif/conceptscheme/1.0
    required:
    - '@type'
    - skos:prefLabel
    - skos:definition
    - skos:hasTopConcept
    $defs:
      cdifConcept:
        type: object
        properties:
          '@context':
            description: JSON-LD context declaring the skos namespace prefix. May
              be a single object or an array of strings and objects.
            type: object
            properties:
              skos:
                enum:
                - http://www.w3.org/2004/02/skos/core#
            required:
            - skos
          '@id':
            type: string
            description: URI identifier for this concept.
          '@type':
            type: array
            items:
              type: string
            contains:
              enum:
              - skos:Concept
            minItems: 1
          skos:prefLabel:
            description: Preferred lexical label for this concept. A single string,
              a single language-tagged value, or an array of language-tagged values.
              Each language should appear at most once.
            anyOf:
            - type: string
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifDataType/cdifTextMapping/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.profiles.cdifProfile.cdifConceptScheme/$defs/LanguageTaggedValue
            - type: array
              items:
                $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifDataType/cdifTextMapping/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.profiles.cdifProfile.cdifConceptScheme/$defs/LanguageTaggedValue
          skos:notation:
            description: Classification code for this concept within a scheme.
            type: array
            items:
              type: string
          skos:definition:
            description: Formal explanation of the meaning of this concept.
            anyOf:
            - type: string
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifDataType/cdifTextMapping/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.profiles.cdifProfile.cdifConceptScheme/$defs/LanguageTaggedValue
            - type: array
              items:
                anyOf:
                - type: string
                - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifDataType/cdifTextMapping/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.profiles.cdifProfile.cdifConceptScheme/$defs/LanguageTaggedValue
          skos:note:
            description: General note about this concept.
            anyOf:
            - type: string
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifDataType/cdifTextMapping/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.profiles.cdifProfile.cdifConceptScheme/$defs/LanguageTaggedValue
            - type: array
              items:
                anyOf:
                - type: string
                - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifDataType/cdifTextMapping/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.profiles.cdifProfile.cdifConceptScheme/$defs/LanguageTaggedValue
          skos:inScheme:
            description: Concept scheme(s) this concept belongs to.
            anyOf:
            - type: object
              properties:
                '@id':
                  type: string
              required:
              - '@id'
            - type: array
              items:
                type: object
                properties:
                  '@id':
                    type: string
                required:
                - '@id'
          skos:broader:
            description: Broader (parent) concepts in the hierarchy. Items are inline
              concept objects or @id references.
            type: array
            items:
              anyOf:
              - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifDataType/cdifTextMapping/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.profiles.cdifProfile.cdifConceptScheme/$defs/ConceptRef
              - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifDataType/cdifTextMapping/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.profiles.cdifProfile.cdifConceptScheme
          skos:narrower:
            description: Narrower (child) concepts in the hierarchy. Items are inline
              concept objects or @id references.
            type: array
            items:
              anyOf:
              - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifDataType/cdifTextMapping/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.profiles.cdifProfile.cdifConceptScheme/$defs/ConceptRef
              - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifDataType/cdifTextMapping/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.profiles.cdifProfile.cdifConceptScheme
        required:
        - '@type'
        - skos:prefLabel
        - skos:notation
      ConceptRef:
        type: object
        description: Reference (by URI) to a skos:Concept defined elsewhere. Used
          inside skos:broader / skos:narrower as the @id-reference alternative to
          an inline Concept.
        properties:
          '@id':
            type: string
            description: URI of the referenced concept.
        required:
        - '@id'
      LanguageTaggedValue:
        type: object
        description: An RDF literal value with a language tag, serialized as a JSON-LD
          value object. Inlined from skosConcept (the resolver does not preserve cross-file
          '#/$defs/...' fragment refs).
        properties:
          '@value':
            type: string
            description: The text content.
          '@language':
            type: string
            description: BCP 47 language tag (e.g. en, fr, de).
        required:
        - '@value'
    x-schema-source: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/profiles/cdifProfile/cdifConceptScheme/schema.yaml
    x-schema-version: https://json-schema.org/draft/2020-12/schema
  cdif.bbr.metadata.schemaorgProperties.identifier:
    description: 'Properties for a schema.org identifier (schema:PropertyValue pattern).


      **Union-type policy:** In CDIF profile UML models an attribute typed as

      schema:Identifier / schema:PropertyValue is represented by a single attribute

      of that class type. The JSON Schema implementation permits the property value

      to be EITHER a plain string (interpreted as the bare identifier value) OR a

      full schema:PropertyValue object (with explicit @type, propertyID, value).

      Consumers should accept either form.

      '
    type: object
    properties:
      '@type':
        type: array
        items:
          type: string
        contains:
          enum:
          - schema:PropertyValue
        minItems: 1
      schema:propertyID:
        type: string
        description: In this context for the schema:PropertyValue, this field is an
          identifier for the identifier schema, e.g. DOI, ARK.  Get values from https://registry.identifiers.org/registry/
          for interoperability
        x-jsonld-id: http://schema.org/propertyID
      schema:value:
        type: string
        description: the identifier string. E.g. 10.5066/F7VX0DMQ
        x-jsonld-id: http://schema.org/value
      schema:url:
        type: string
        format: uri
        description: 'web-resolveable string for the identifier; host name part is
          location of a resolver that will return some representation for the given
          identifier value. E.g. https://doi.org/10.5066/F7VX0DMQ '
        x-jsonld-id: http://schema.org/url
    allOf:
    - required:
      - '@type'
    - anyOf:
      - required:
        - schema:value
      - required:
        - schema:url
    x-jsonld-prefixes:
      schema: http://schema.org/
    x-schema-source: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/schemaorgProperties/identifier/schema.yaml
    x-schema-version: https://json-schema.org/draft/2020-12/schema
title: Text Mapping Type
description: Physical mapping for a variable in a delimited or fixed-width text dataset.
  Extends cdifPhysicalMapping with text-format properties (column width and number
  formatting). DDI-CDI TextMapping.
allOf:
- $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifDataType/cdifTextMapping/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifDataType.cdifPhysicalMapping
- type: object
  properties:
    '@type':
      type: array
      items:
        type: string
      contains:
        enum:
        - cdif:TextMapping
      minItems: 1
      description: A cdifTextMapping instance must be typed cdif:TextMapping (not
        the base cdif:PhysicalMapping). It composes cdifPhysicalMapping via allOf
        for its properties; the base @type accepts the physical-mapping family.
    cdi:length:
      type: integer
      description: The column width if the tabular text is fixed width (TextMapping.length).
      x-jsonld-id: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/length
    cdi:defaultDecimalSeparator:
      type: string
      description: Decimal separator used when not otherwise specified (TextMapping.defaultDecimalSeparator).
      x-jsonld-id: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/defaultDecimalSeparator
    cdi:defaultDigitGroupSeparator:
      type: string
      description: Digit-group (thousands) separator (TextMapping.defaultDigitGroupSeparator).
      x-jsonld-id: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/defaultDigitGroupSeparator
    cdif:displayLabel:
      type: array
      items:
        type: string
      description: Human-readable label(s) for display. CDIF simplification (plain
        string) of DDI-CDI TextMapping.displayLabel, whose model type is LabelForDisplay.
        Per the cdi/cdif namespace policy a structured-string type simplified to a
        plain string is in the cdif namespace.
      x-jsonld-id: https://cdif.org/0.1/displayLabel
x-jsonld-prefixes:
  schema: http://schema.org/
  cdi: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/
  cdif: https://cdif.org/0.1/
x-schema-version: https://json-schema.org/draft/2020-12/schema
