        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/profiles/cdifProfile/cdifDataStructure/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifDataType.cdifRepresentedVariable/$defs/cdifConceptOrTerm
        description: Kind of unit of measure, so that it may be prone to translation
          to equivalent UOMs. Example values include "acceleration," "temperature,"
          "salinity", etc. This description exists at the conceptual level, indicating
