          x-jsonld-id: http://www.w3.org/2006/time#hasBeginning
        time:hasEnd:
          type: object
          properties:
            '@type':
              type: array
              items:
                type: string
              contains:
                enum:
                - time:Instant
              minItems: 1
            time:inTimePosition:
              x-jsonld-id: http://www.w3.org/2006/time#inTimePosition
              allOf:
              - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/profiles/cdifCompositeProfile/cdifComplete/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.temporalExtent/$defs/timePosition_type
          x-jsonld-id: http://www.w3.org/2006/time#hasEnd
      anyOf:
