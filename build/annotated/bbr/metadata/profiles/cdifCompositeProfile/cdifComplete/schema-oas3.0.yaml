  cdif.bbr.metadata.profiles.cdifProfile.cdifArchiveDistribution:
    title: CDIF Archive Distribution
    description: "Profile module for archive distributions. Marks the catalog record
      as conformant to the CDIF manifest spec (https://w3id.org/cdif/manifest/1.0)
      and lets schema:distribution items carry schema:hasPart describing the component
      files inside an archive (ZIP, etc.). The base schema:distribution anyOf [DataDownload,
      WebAPI] contributed by cdifCore is preserved \u2014 this BB only adds property
      constraints, no new anyOf branch. (Merged from the previous cdifProfile/cdifArchive
      BB, which held only the $defs for ArchivePart; everything now lives here.)"
    type: object
    properties:
      schema:subjectOf:
        properties:
          dcterms:conformsTo:
            type: array
            items:
              type: object
              properties:
                '@id':
                  type: string
                  description: uri for specifications that this metadata record conforms
                    to
            minItems: 1
            contains:
              type: object
              properties:
                '@id':
                  enum:
                  - https://w3id.org/cdif/manifest/1.0
      schema:distribution:
        items:
          allOf:
          - properties:
              schema:hasPart:
                description: For archive-style distributions (e.g. ZIP files containing
                  multiple component files), describes the component files. Each component
                  is typed as schema:MediaObject and may include CDIF data description
                  extensions (cdifTabularData, cdifDataCube) to describe its internal
                  structure.
                allOf:
                - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/profiles/cdifCompositeProfile/cdifComplete/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.profiles.cdifProfile.cdifArchiveDistribution/$defs/archivePartArray
          - if:
              properties:
                schema:encodingFormat:
                  type: array
                  contains:
                    enum:
                    - application/zip
              required:
              - schema:encodingFormat
            then:
              required:
              - schema:hasPart
    $defs:
      archivePartArray:
        type: array
        description: Array describing the files contained in the archive. Each item
          represents a component file that is part of the archive and is not independently
          accessible.
        items:
          $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/profiles/cdifCompositeProfile/cdifComplete/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.profiles.cdifProfile.cdifArchiveDistribution/$defs/archivePartItem
      archivePartItem:
        allOf:
        - type: object
          properties:
            '@id':
              type: string
              description: Identifier for this file, typically a hash-based anchor
                (e.g. '#abc123'). Used for cross-references from schema:about in metadata
                sidecar files.
            '@type':
              type: array
              description: Must include schema:MediaObject. Must NOT include schema:DataDownload
                since this file is not independently accessible. May include additional
                types for categorization.
              items:
                type: string
              contains:
                enum:
                - schema:MediaObject
              not:
                contains:
                  enum:
                  - schema:DataDownload
              minItems: 1
            schema:name:
              type: string
              description: Filename of the component file within the archive.
            schema:description:
              type: string
              description: Description of the file content. May include checksum information.
            schema:encodingFormat:
              type: array
              description: MIME type(s) for this file.
              items:
                type: string
            schema:size:
              type: object
              description: File size as a QuantitativeValue.
              properties:
                '@type':
                  type: array
                  items:
                    type: string
                  contains:
                    enum:
                    - schema:QuantitativeValue
                  minItems: 1
                schema:value:
                  type: number
                  description: Numeric size value.
                schema:unitText:
                  type: string
                  description: Unit of measure for size (e.g. 'byte').
            schema:about:
              type: array
              description: For metadata sidecar files, references the data file this
                metadata describes.
              items:
                type: object
                properties:
                  '@id':
                    type: string
                    description: Reference to the @id of the data file described by
                      this sidecar.
            spdx:checksum:
              type: object
              description: Checksum for integrity verification of this component file.
              properties:
                '@type':
                  type: array
                  items:
                    type: string
                  contains:
                    enum:
                    - spdx:Checksum
                  minItems: 1
                spdx:algorithm:
                  type: string
                spdx:checksumValue:
                  type: string
              required:
              - '@type'
          required:
          - '@type'
          - schema:name
          - schema:encodingFormat
        - anyOf:
          - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/profiles/cdifCompositeProfile/cdifComplete/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifDataType.cdifDataCube
          - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/profiles/cdifCompositeProfile/cdifComplete/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifDataType.cdifTabularData
          - {}
    x-schema-source: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/profiles/cdifProfile/cdifArchiveDistribution/schema.yaml
    x-schema-version: https://json-schema.org/draft/2020-12/schema
