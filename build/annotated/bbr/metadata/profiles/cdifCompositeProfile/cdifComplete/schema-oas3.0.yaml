            minItems: 1
          cdi:typeOfStatistic:
            description: "Controlled-vocabulary entry naming the kind of statistic
              \u2014 e.g. mean, median, count, sum, stdDev."
            x-jsonld-id: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/typeOfStatistic
            allOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/profiles/cdifCompositeProfile/cdifComplete/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifDataType.cdifStatistics/$defs/SkosConcept
          cdi:statistic:
            type: array
            description: "Ordered list of Statistic value objects carried by this
              bundle. Order is significant \u2014 consumers MAY rely on array position."
            items:
              $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/profiles/cdifCompositeProfile/cdifComplete/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifDataType.cdifStatistics/$defs/Statistic
            minItems: 1
            x-jsonld-id: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/statistic
          cdi:hasWeight:
            description: The InstanceVariable whose values were used as weights when
              computing the Statistic entries (inline cdifInstanceVariable node or
              an @id-reference).
            anyOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/profiles/cdifCompositeProfile/cdifComplete/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifDataType.cdifInstanceVariable
            - type: object
              properties:
                '@id':
                  type: string
              required:
