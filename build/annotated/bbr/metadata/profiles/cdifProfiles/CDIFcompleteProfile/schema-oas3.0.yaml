          properties:
            skos:
              enum:
              - http://www.w3.org/2004/02/skos/core#
          required:
          - skos
        - type: array
          items:
            anyOf:
            - type: string
            - type: object
          contains:
            type: object
            properties:
              skos:
                enum:
                - http://www.w3.org/2004/02/skos/core#
            required:
            - skos
      '@id':
        type: string
