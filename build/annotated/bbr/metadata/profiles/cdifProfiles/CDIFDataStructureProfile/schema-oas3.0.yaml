x-defs:
  cdif.bbr.metadata.cdifProperties.cdifCore:
    type: object
    title: 'Core properties for CDIF metadata schema, with schema: prefixes'
    description: Building block specifies core properties for CDIF schema.org metadata
      record, applicable to any resource type.
    properties:
      '@context':
        type: object
        description: JSON-LD context declaring namespace prefixes used in the metadata
          record.
        properties:
          schema:
            enum:
            - http://schema.org/
          dcterms:
            enum:
            - http://purl.org/dc/terms/
          spdx:
            enum:
            - http://spdx.org/rdf/terms#
          dcat:
            enum:
            - http://www.w3.org/ns/dcat#
          prov:
            enum:
            - http://www.w3.org/ns/prov#
        required:
        - schema
        - dcterms
        - dcat
        - prov
      '@id':
        type: string
        description: 'The URI for the resource should be the @id value for the root
          of the JSON instance document tree. Must be an IRI (e.g. https://doi.org/...,
          urn:..., or a relative URI like #localid). Note that this identifier can
          be interpreted to identify the resource that is the subject of this metadata
          record, or the JSON-LD object that is the digital object containing the
          metadata information.'
      '@type':
        description: a schema.org Class that specifies the expected information content
          for the metadata record. The array must include at least one schema.org
          type value. Default is schema:Dataset.
        type: array
        items:
          type: string
          enum:
          - schema:CreativeWork
          - schema:SoftwareApplication
          - schema:SoftwareSourceCode
          - schema:Product
          - schema:WebAPI
          - schema:Dataset
          - schema:DigitalDocument
          - schema:Collection
          - schema:ImageObject
          - schema:DataCatalog
          - schema:DefinedTermSet
          - schema:MediaObject
        default: schema:Dataset
        minItems: 1
        contains:
          enum:
          - schema:Dataset
      schema:name:
        type: string
        description: A descriptive name of a dataset (e.g., 'Snow depth in Northern
          Hemisphere'). The name should uniquely identify the described resource for
          human use, in the scope of the metadata catalog containing this metadata
          record.
        x-jsonld-id: http://schema.org/name
      schema:description:
        type: string
        description: A short summary describing a dataset. This text will be indexed
          by search applications, so the more information here, the better.
        x-jsonld-id: http://schema.org/description
      schema:identifier:
        description: The primary identifier for the dataset; other identifiers should
          be listed in the sameAs field. Schema.org has three ways of encoding identifiers--
          a text description, a URL, or by using the schema:PropertyValue field. The
          Science on Schema.org guidance strongly recommends using the PropertyValue
          approach. see https://github.com/ESIPFed/science-on-schema.org   .... Dataset.md#identifier.  Ideally,
          for any given data provided they would provide identifiers either all as
          strings or all as identifier_type.
        anyOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/profiles/cdifProfiles/CDIFDataStructureProfile/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifCore/$defs/Identifier
        - type: string
        x-jsonld-id: http://schema.org/identifier
      schema:additionalType:
        description: identifiers for datatypes from other vocabularies (not schema.org)
          that apply to this metadata.
        type: array
        minItems: 0
        items:
          anyOf:
          - type: string
          - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/profiles/cdifProfiles/CDIFDataStructureProfile/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifCore/$defs/DefinedTerm
        x-jsonld-id: http://schema.org/additionalType
      schema:sameAs:
        description: Other identifiers for the dataset, as IRI references, literal
          strings, or structured identifiers using schema:PropertyValue.
        type: array
        minItems: 1
        items:
          anyOf:
          - type: string
          - type: object
            properties:
              '@id':
                type: string
                description: IRI for an equivalent resource or alternate identifier
          - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/profiles/cdifProfiles/CDIFDataStructureProfile/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifCore/$defs/Identifier
        x-jsonld-id: http://schema.org/sameAs
      schema:version:
        description: The version number or identifier for this dataset (text or numeric).
          The values should sort from oldest to newest using an alphanumeric sort
          on version strings
        x-jsonld-id: http://schema.org/version
        anyOf:
        - type: string
        - type: number
      schema:inLanguage:
        type: string
        description: the language of the dataset content
        x-jsonld-id: http://schema.org/inLanguage
      schema:dateModified:
        type: string
        description: ISO8601 formatted date (and optional time if relevant) when Dataset
          was last updated
        x-jsonld-id: http://schema.org/dateModified
      schema:datePublished:
        type: string
        description: ISO8601 formatted date (and optional time if relevant) when Dataset
          was made public.
        x-jsonld-id: http://schema.org/datePublished
      schema:conditionsOfAccess:
        description: 'text statement of conditions for use and access; if an online
          resource documents the restrictions or a URI is used to identify the conditions,
          recommend using schema:CreativeWork to provide a label (name) and an identifier
          (URI or URL). '
        type: array
        minItems: 0
        items:
          anyOf:
          - type: string
          - type: object
            properties:
              '@id':
                type: string
                description: a reference to a resource defining conditions of Access
          - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/profiles/cdifProfiles/CDIFDataStructureProfile/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifCore/$defs/Reference
        x-jsonld-id: http://schema.org/conditionsOfAccess
      schema:license:
        description: 'legal statement of conditions for use and access; recommend
          using schema:CreativeWork to provide a label (name) for the license, and
          an identifier. Sources of license identifiers: https://opensource.org/licenses/,
          https://creativecommons.org/about/cclicenses/, https://spdx.org/licenses/,
          http://cor.esipfed.org/ont/earthcube/swl. If only a string is provided,
          it should be an identifier for the license, ideally a resolvable URI'
        type: array
        minItems: 0
        items:
          anyOf:
          - type: string
          - type: object
            properties:
              '@id':
                type: string
                description: a reference to a license defintion
          - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/profiles/cdifProfiles/CDIFDataStructureProfile/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifCore/$defs/Reference
        x-jsonld-id: http://schema.org/license
      schema:url:
        type: string
        format: uri
        description: Web Location of a page describing the dataset (landing page),
          typically providing links or instructions to get the actual resource content;
          analogous to dcat:accessURL. If a direct link is available to get the data,
          put in distribution/contentUrl
        x-jsonld-id: http://schema.org/url
      schema:distribution:
        description: specifies how to download the data in a specific format or access
          via a web API. This property describes where to get the data and in what
          format by using the schema:DataDownload type. If user must access data through
          a landing page, provide link to landing page in the 'url' property for the
          dataset
        type: array
        items:
          anyOf:
          - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/profiles/cdifProfiles/CDIFDataStructureProfile/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifCore/$defs/DataDownload
          - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/profiles/cdifProfiles/CDIFDataStructureProfile/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifCore/$defs/WebAPI
        x-jsonld-id: http://schema.org/distribution
      schema:relatedLink:
        type: array
        description: links to related resources; linkRelationship specifies how the
          resource is related.
        items:
          type: object
          properties:
            '@type':
              type: array
              items:
                type: string
              contains:
                enum:
                - schema:LinkRole
              minItems: 1
            schema:linkRelationship:
              anyOf:
              - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/profiles/cdifProfiles/CDIFDataStructureProfile/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifCore/$defs/DefinedTerm
              - type: string
              x-jsonld-id: http://schema.org/linkRelationship
            schema:target:
              type: object
              properties:
                '@type':
                  type: array
                  items:
                    type: string
                  contains:
                    enum:
                    - schema:EntryPoint
                  minItems: 1
                schema:encodingFormat:
                  type: string
                  description: registered MIME types are expected
                  x-jsonld-id: http://schema.org/encodingFormat
                schema:name:
                  type: string
                  x-jsonld-id: http://schema.org/name
                schema:url:
                  type: string
                  format: uri
                  x-jsonld-id: http://schema.org/url
              x-jsonld-id: http://schema.org/target
        x-jsonld-id: http://schema.org/relatedLink
      schema:publishingPrinciples:
        description: FDOF digitalObjectMutability, RDA digitalObjectPolicy, FDOF PersistencyPolicy.
          Policies related to maintenance, update, expected time to live. If an online
          resource documents the policies or a URI is used to identify the conditions,
          recommend using schema:CreativeWork to provide a label (name) and an identifier
          (URI or URL).
        type: array
        minItems: 0
        items:
          anyOf:
          - type: string
          - type: object
            properties:
              '@id':
                type: string
                description: a reference to a publishing principles statement
          - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/profiles/cdifProfiles/CDIFDataStructureProfile/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifCore/$defs/Reference
        x-jsonld-id: http://schema.org/publishingPrinciples
      schema:keywords:
        description: Keywords are an array of strings, an array of schema:DefinedTerms,
          or some combination of these. If you have information about a controlled
          vocabulary from which keywords come from, use schema:DefinedTerm to descibe
          that keyword. This allowed variability makes parsing metadata hard; recommend
          using DefinedTerm for all keywords if any of them are from a known vocabulary,
          otherwise an array of strings.
        type: array
        items:
          anyOf:
          - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/profiles/cdifProfiles/CDIFDataStructureProfile/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifCore/$defs/DefinedTerm
          - type: string
        x-jsonld-id: http://schema.org/keywords
      schema:creator:
        description: author or orginator of intellectual content of dataset. Uset
          the JSON-LD @list construct to preserve author order. Use contributor with
          the Role property to specify other roles related to creation or stewardship
          of the resource.
        type: object
        properties:
          '@list':
            type: array
            items:
              anyOf:
              - type: object
                properties:
                  '@id':
                    type: string
                    description: a identifier for an agent defined in this metadata,
                      or externally; must be dereferenceable
                required:
                - '@id'
              - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/profiles/cdifProfiles/CDIFDataStructureProfile/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifCore/$defs/Person
              - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/profiles/cdifProfiles/CDIFDataStructureProfile/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifCore/$defs/Organization
        x-jsonld-id: http://schema.org/creator
      schema:contributor:
        description: other parties who played a role in production of dataset
        type: array
        items:
          anyOf:
          - type: object
            properties:
              '@id':
                type: string
                description: a identifier for an agent defined in this metadata, or
                  externally; must be dereferenceable
            required:
            - '@id'
          - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/profiles/cdifProfiles/CDIFDataStructureProfile/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifCore/$defs/Person
          - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/profiles/cdifProfiles/CDIFDataStructureProfile/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifCore/$defs/Organization
          - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/profiles/cdifProfiles/CDIFDataStructureProfile/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifCore/$defs/Contributor
        x-jsonld-id: http://schema.org/contributor
      schema:publisher:
        description: Party who made the dataset publicly available
        anyOf:
        - type: object
          properties:
            '@id':
              type: string
              description: a identifier for an agent defined in this metadata, or
                externally; must be dereferenceable
          required:
          - '@id'
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/profiles/cdifProfiles/CDIFDataStructureProfile/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifCore/$defs/Person
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/profiles/cdifProfiles/CDIFDataStructureProfile/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifCore/$defs/Organization
        x-jsonld-id: http://schema.org/publisher
      schema:provider:
        description: Party who maintains the distribution options for the dataset.
          If there are multiple distributions from different providers, use the provider
          property on distribution/DataDownload
        type: array
        items:
          anyOf:
          - type: object
            properties:
              '@id':
                type: string
                description: a identifier for an agent defined in this metadata, or
                  externally; must be dereferenceable
            required:
            - '@id'
          - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/profiles/cdifProfiles/CDIFDataStructureProfile/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifCore/$defs/Person
          - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/profiles/cdifProfiles/CDIFDataStructureProfile/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifCore/$defs/Organization
        x-jsonld-id: http://schema.org/provider
      schema:funding:
        type: array
        items:
          $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/profiles/cdifProfiles/CDIFDataStructureProfile/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifCore/$defs/MonetaryGrant
        x-jsonld-id: http://schema.org/funding
      prov:wasGeneratedBy:
        description: Brief information about instruments, software or experimental
          protocols used
        type: array
        items:
          $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/profiles/cdifProfiles/CDIFDataStructureProfile/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifCore/$defs/GeneratedBy
      prov:wasDerivedFrom:
        description: Brief information about sources of data used in aggregate datasets
        type: array
        items:
          $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/profiles/cdifProfiles/CDIFDataStructureProfile/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifCore/$defs/DerivedFrom
      schema:subjectOf:
        x-jsonld-id: http://schema.org/subjectOf
        allOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/profiles/cdifProfiles/CDIFDataStructureProfile/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifCore/$defs/CdifCatalogRecord
    allOf:
    - properties:
        schema:subjectOf:
          properties:
            dcterms:conformsTo:
              contains:
                type: object
                properties:
                  '@id':
                    enum:
                    - https://w3id.org/cdif/core/1.0
          x-jsonld-id: http://schema.org/subjectOf
    - required:
      - '@id'
      - '@type'
      - '@context'
      - schema:name
      - schema:identifier
      - schema:dateModified
      - schema:subjectOf
    - anyOf:
      - required:
        - schema:license
      - required:
        - schema:conditionsOfAccess
    - anyOf:
      - required:
        - schema:url
      - required:
        - schema:distribution
    $defs:
      Reference:
        $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/profiles/cdifProfiles/CDIFDataStructureProfile/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifReference
      Identifier:
        $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/profiles/cdifProfiles/CDIFDataStructureProfile/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.identifier
      DefinedTerm:
        $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/profiles/cdifProfiles/CDIFDataStructureProfile/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.definedTerm
      DataDownload:
        $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/profiles/cdifProfiles/CDIFDataStructureProfile/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.dataDownload
      WebAPI:
        $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/profiles/cdifProfiles/CDIFDataStructureProfile/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.webAPI
      Person:
        $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/profiles/cdifProfiles/CDIFDataStructureProfile/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.person
      Organization:
        $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/profiles/cdifProfiles/CDIFDataStructureProfile/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.organization
      Contributor:
        $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/profiles/cdifProfiles/CDIFDataStructureProfile/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.agentInRole
      MonetaryGrant:
        $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/profiles/cdifProfiles/CDIFDataStructureProfile/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.monetaryGrant
      GeneratedBy:
        $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/profiles/cdifProfiles/CDIFDataStructureProfile/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.provProperties.generatedBy
      DerivedFrom:
        $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/profiles/cdifProfiles/CDIFDataStructureProfile/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.provProperties.derivedFrom
      CdifCatalogRecord:
        $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/profiles/cdifProfiles/CDIFDataStructureProfile/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifCatalogRecord
    x-jsonld-prefixes:
      schema: http://schema.org/
    x-schema-source: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifCore/schema.yaml
    x-schema-version: https://json-schema.org/draft/2020-12/schema
  cdif.bbr.metadata.cdifProperties.cdifDataDescription:
    title: CDIF Data Description properties
    description: Additional constraints for CDIF data description level. Adds cdif:physicalDataType
      requirement on variableMeasured items and distribution-level cdi properties
      for file characterization (characterSet, fileSize, fileSizeUofM).
    type: object
    properties:
      cdif:hasPrimaryKey:
        anyOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/profiles/cdifProfiles/CDIFDataStructureProfile/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifKey
        - type: object
          description: object reference via URI or URI fragment to a cdif:Key defined
            elsewhere in the same document
          properties:
            '@id':
              type: string
          required:
          - '@id'
        description: 'Primary key of the dataset: a cdif:Key whose cdif:isComposedOf
          is an ordered list of cdi:InstanceVariables (from schema:variableMeasured)
          that uniquely identify each data instance.'
      cdif:statistics:
        type: array
        description: "Summary statistics describing the dataset's values. Each entry
          is a cdi:Statistics bundle (one or more Statistic value objects, optionally
          weighted by an InstanceVariable, optionally broken down by Category) or
          a cdi:StatisticsCollection (groups multiple Statistics nodes and records
          which InstanceVariables they index). Inline node or @id-reference to one
          declared elsewhere in the document. cdif: namespaced \u2014 DDI-CDI has
          no `statistics` association from a dataset; this is a CDIF attachment property."
        items:
          anyOf:
          - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/profiles/cdifProfiles/CDIFDataStructureProfile/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifStatistics
          - type: object
            properties:
              '@id':
                type: string
            required:
            - '@id'
      schema:subjectOf:
        properties:
          dcterms:conformsTo:
            type: array
            items:
              type: object
              properties:
                '@id':
                  type: string
                  description: uri for specifications that this metadata record conforms
                    to
            minItems: 1
            contains:
              type: object
              properties:
                '@id':
                  enum:
                  - https://w3id.org/cdif/data_description/1.0
      '@context':
        type: object
        description: Additional namespace prefix for data description properties.
        properties:
          csvw:
            enum:
            - http://www.w3.org/ns/csvw#
      schema:variableMeasured:
        type: array
        items:
          allOf:
          - type: object
            description: All variableMeasured items at data description level must
              have an @id and cdif:physicalDataType so physical mappings can reference
              them.
            properties:
              '@id':
                type: string
                description: URI identifier for this variable, used as the target
                  of cdif:formats_InstanceVariable references in physical mappings.
            required:
            - '@id'
          - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/profiles/cdifProfiles/CDIFDataStructureProfile/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifInstanceVariable
          - type: object
            description: At the Data Description profile level, InstanceVariables
              may also carry substantive and sentinel value domains directly (in profiles
              that introduce a RepresentedVariable - e.g., CDIFDataStructureProfile
              - these properties live on the RepresentedVariable instead and are disallowed
              here).
            properties:
              cdi:takesSentinelValuesFrom:
                type: array
                items:
                  anyOf:
                  - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/profiles/cdifProfiles/CDIFDataStructureProfile/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifValueDomain/$defs/SentinelValueDomain
                  - type: object
                    properties:
                      '@id':
                        type: string
                    required:
                    - '@id'
                description: Sentinel (missing / not-applicable) value domain(s) for
                  this variable (RepresentedVariable.takesSentinelValuesFrom).
              cdi:takesSubstantiveValuesFrom:
                anyOf:
                - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/profiles/cdifProfiles/CDIFDataStructureProfile/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifValueDomain/$defs/SubstantiveValueDomain
