type: object
title: CDIF Data Structure metadata profile
description: 'CDIF Data Structure profile. Extends the Data Description profile with
  full DDI-CDI structural complexity: composing cdifDataStructure (DataStructure +
  Dimensional/Long/Wide variants), cdifDataStructureComponent (component subclasses),
  cdifRepresentedVariable, and cdifValueDomain. Distributions are expected to carry
  cdi:isStructuredBy pointing at a Data Structure node.'
allOf:
- $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/profiles/cdifProfiles/CDIFDataStructureProfile/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifCore
- $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/profiles/cdifProfiles/CDIFDataStructureProfile/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifDataDescription
- type: object
  properties:
    '@context':
      type: object
      description: Additional JSON-LD namespace prefixes for the data structure profile.
      properties:
        geosparql:
          enum:
          - http://www.opengis.net/ont/geosparql#
        dqv:
          enum:
          - http://www.w3.org/ns/dqv#
        cdi:
          enum:
          - http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/
        cdif:
          enum:
          - https://cdif.org/0.1/
    schema:variableMeasured:
      items:
        properties:
          cdif:role: false
        description: 'In the Data Structure profile, variable role is encoded by the
          component class type (IdentifierComponent, MeasureComponent, AttributeComponent,
          DimensionComponent, VariableValueComponent, VariableDescriptorComponent)
          on cdi:isStructuredBy. Carrying cdif:role on the InstanceVariable would
          be redundant and is therefore disallowed at this profile level.

          The RepresentedVariable-level properties (cdi:hasIntendedDataType, cdi:describedUnitOfMeasure,
          cdif:simpleUnitOfMeasure, cdi:takesSentinelValuesFrom, cdi:takesSubstantiveValuesFrom),
          and the attribute-qualifies-measure relationship (cdi:qualifies), are NOT
          allowed on the InstanceVariable if they are already specified on the RepresentedVariable
          referenced by the DataStructureComponent that this InstanceVariable cdif:uses
          (for cdi:qualifies: on the AttributeComponent that wraps that RepresentedVariable).
          This is enforced by SHACL rules in CDIFDataStructureProfile/rules.shacl,
          not at the JSON Schema level, because the constraint is conditional on what
          the RepresentedVariable carries.'
    schema:distribution:
      items:
        properties:
          cdi:isStructuredBy:
            description: Points at the Data Structure node that describes how this
              distribution's bytes are organized. Inline cdifDataStructure or @id-reference
              to a node defined elsewhere in the document. This property is specific
              to the Data Structure profile - the Data Description profile does not
              carry it. Required on DataDownload distributions typed as cdi:PhysicalDataSet
              (or subclass); for schema:WebAPI distributions, it lives on schema:potentialAction.items
              .schema:result instead (which describes the API response bytes - see
              the cdifDataDescription extension).
            anyOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/profiles/cdifProfiles/CDIFDataStructureProfile/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifDataStructure
            - type: object
              properties:
                '@id':
                  type: string
              required:
              - '@id'
          schema:potentialAction:
            items:
              properties:
                schema:result:
                  properties:
                    cdi:isStructuredBy:
                      description: Data Structure for the API response bytes. MAY
                        differ from isStructuredBy values on sibling DataDownload
                        distributions (e.g., the API may serve a long-format variant
                        of a tabular dataset). Required on the result when the distribution
                        is a schema:WebAPI.
                      anyOf:
                      - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/profiles/cdifProfiles/CDIFDataStructureProfile/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifDataStructure
                      - type: object
                        properties:
                          '@id':
                            type: string
                        required:
                        - '@id'
        allOf:
        - if:
            properties:
              '@type':
                contains:
                  enum:
                  - cdi:PhysicalDataSet
          then:
            required:
            - cdi:isStructuredBy
        - if:
            properties:
              '@type':
                contains:
                  enum:
                  - schema:WebAPI
          then:
            properties:
              schema:potentialAction:
                type: array
                items:
                  properties:
                    schema:result:
                      required:
                      - cdi:isStructuredBy
        - if:
            properties:
              '@type':
                anyOf:
                - contains:
                    enum:
                    - cdi:TabularTextDataSet
                - contains:
                    enum:
                    - cdi:StructuredDataSet
          then:
            required:
            - cdif:hasPhysicalMapping
        - if:
            allOf:
            - properties:
                '@type':
                  contains:
                    enum:
                    - cdi:PhysicalDataSet
            - properties:
                '@type':
                  not:
                    contains:
                      enum:
                      - cdi:TabularTextDataSet
            - properties:
                '@type':
                  not:
                    contains:
                      enum:
                      - cdi:StructuredDataSet
          then:
            properties:
              cdi:isStructuredBy:
                properties:
                  '@type':
                    not:
                      anyOf:
                      - contains:
                          enum:
                          - cdi:LongDataStructure
                      - contains:
                          enum:
                          - cdi:DimensionalDataStructure
                      - contains:
                          enum:
                          - cdi:WideDataStructure
    schema:subjectOf:
      properties:
        dcterms:conformsTo:
          contains:
            type: object
            properties:
              '@id':
                enum:
                - https://w3id.org/cdif/data_structure/1.0
$defs:
  CdifDataStructure:
    $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/profiles/cdifProfiles/CDIFDataStructureProfile/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifDataStructure
  CdifDataStructureComponent:
    $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/profiles/cdifProfiles/CDIFDataStructureProfile/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifDataStructureComponent
  CdifRepresentedVariable:
    $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/profiles/cdifProfiles/CDIFDataStructureProfile/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifRepresentedVariable
  CdifValueDomain:
    $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/profiles/cdifProfiles/CDIFDataStructureProfile/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifValueDomain
x-schema-version: https://json-schema.org/draft/2020-12/schema
