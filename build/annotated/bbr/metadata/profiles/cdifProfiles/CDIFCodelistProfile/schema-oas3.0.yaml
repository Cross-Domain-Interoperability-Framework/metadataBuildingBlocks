x-defs: {}
type: object
title: CDIF Codelist profile
description: "A profile of skos:ConceptScheme. Must have a resolvable @id, skos:inScheme,
  skos:definition, and skos:prefLabel. CDIF profile for controlled vocabulary codelists
  implemented as SKOS ConceptSchemes. Composes skos:ConceptScheme and skos:Concept
  \ with additional constraints: concepts must have resolvable @id identifiers, skos:inScheme,
  skos:prefLabel, skos:notation; the scheme must identify top concepts via skos:hasTopConcept;
  hierarchical concepts must declare both skos:narrower (for JSON tree traversal)
  and skos:broader (for upward navigation and display trees) \u2014 both directions
  are required if there is hiearchy. CDIF metadata properties (schema:identifier,
  schema:dateModified, schema:license or schema:conditionsOfAccess) take precedence
  over equivalent dcterms properties (dcterms:modified, dcterms:license) from the
  base skos:ConceptScheme. Instances should use the schema: properties; dcterms: equivalents
  are optional and not required."
properties:
  '@context':
    description: JSON-LD context declaring the skos namespace prefix and any additional
      prefixes used in concept URIs. May be a single object or an array of strings
      and objects.
    type: array
    items:
      anyOf:
      - type: string
      - type: object
    contains:
      type: object
      properties:
        skos:
          enum:
          - http://www.w3.org/2004/02/skos/core#
      required:
      - skos
  '@id':
    type: string
    description: URI identifier for this concept scheme.
  '@type':
    type: array
    items:
      type: string
    contains:
      enum:
      - skos:ConceptScheme
    minItems: 1
  schema:identifier:
    description: Primary identifier for the codelist. May be a string URI or a structured
      PropertyValue.
    anyOf:
    - type: string
    - type: object
      properties:
        '@type':
          type: array
          items:
            type: string
          contains:
            enum:
            - schema:PropertyValue
        schema:propertyID:
          type: string
          x-jsonld-id: http://schema.org/propertyID
        schema:value:
          type: string
          x-jsonld-id: http://schema.org/value
        schema:url:
          type: string
          x-jsonld-id: http://schema.org/url
    x-jsonld-id: http://schema.org/identifier
  schema:dateModified:
    type: string
    description: ISO 8601 date when the codelist was last modified.
    x-jsonld-id: http://schema.org/dateModified
  schema:url:
    type: string
    format: uri
    description: Web location of a page describing the codelist.
    default: missing
    x-jsonld-id: http://schema.org/url
  schema:license:
    description: License for the codelist.
    type: array
    items:
      anyOf:
      - type: string
      - type: object
        properties:
          '@id':
            type: string
    x-jsonld-id: http://schema.org/license
  schema:conditionsOfAccess:
    description: Text statement of access conditions for the codelist.
    type: array
    items:
      type: string
    x-jsonld-id: http://schema.org/conditionsOfAccess
  skos:prefLabel:
    description: Preferred lexical label for the concept scheme. A single string,
      a single language-tagged value, or an array of language-tagged values. Each
      language should appear at most once.
    type: string
    x-jsonld-id: http://www.w3.org/2004/02/skos/core#prefLabel
  skos:definition:
    description: Formal explanation of the meaning or purpose of this concept scheme.
    type: string
    x-jsonld-id: http://www.w3.org/2004/02/skos/core#definition
  skos:note:
    description: General note about the concept scheme.
    type: string
    x-jsonld-id: http://www.w3.org/2004/02/skos/core#note
  skos:hasTopConcept:
    description: Top-level concepts that have no skos:broader in this scheme. Required
      for hierarchical codelists.
    type: array
    minItems: 1
    items:
      $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/profiles/cdifProfiles/CDIFCodelistProfile/schema-oas3.0.yaml#/$defs/CdifCodelistConcept
    x-jsonld-id: http://www.w3.org/2004/02/skos/core#hasTopConcept
anyOf:
- required:
  - schema:license
- required:
  - schema:conditionsOfAccess
required:
- '@id'
- schema:identifier
- schema:dateModified
- skos:hasTopConcept
$defs:
  CdifCodelistConcept:
    description: A SKOS Concept constrained for CDIF codelist use. Must have a resolvable
      @id, skos:inScheme, skos:notation, and skos:prefLabel. Becasue JSON-LD is an
      open-world implementation, any other skos properties may be included.
    type: object
    properties:
      '@id':
        type: string
        description: Globally unique, resolvable URI for this concept.
      skos:inScheme:
        description: The concept scheme this concept belongs to. Required for CDIF
          codelist concepts.
        type: array
        items:
          type: object
          properties:
            '@id':
              type: string
          required:
          - '@id'
        x-jsonld-id: http://www.w3.org/2004/02/skos/core#inScheme
      skos:prefLabel:
        description: Preferred lexical label for this concept. A single string, a
          single language-tagged value, or an array of language-tagged values. Each
          language should appear at most once.
        type: string
        x-jsonld-id: http://www.w3.org/2004/02/skos/core#prefLabel
      skos:notation:
        description: Classification code for this concept within a scheme.
        type: string
        x-jsonld-id: http://www.w3.org/2004/02/skos/core#notation
      skos:definition:
        description: Formal definition of this concept. Optional for CDIF codelist
          concepts. A plain string.
        type: string
        x-jsonld-id: http://www.w3.org/2004/02/skos/core#definition
      skos:narrower:
        description: Narrower (child) concepts. If present, each inline concept must
          also declare skos:broader pointing back to the parent concept. Both skos:narrower
          and skos:broader must be explicit in CDIF codelists.
        type: array
        items:
          anyOf:
          - type: object
            properties:
              '@id':
                type: string
            required:
            - '@id'
          - allOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/profiles/cdifProfiles/CDIFCodelistProfile/schema-oas3.0.yaml#/$defs/CdifCodelistConcept
            - required:
              - skos:broader
        x-jsonld-id: http://www.w3.org/2004/02/skos/core#narrower
      skos:broader:
        description: Broader (parent) concepts. Required on any concept that appears
          as a skos:narrower value of another concept. CDIF requires both directions
          to be explicit for hierarchy traversal.
        type: array
        items:
          type: object
          properties:
            '@id':
              type: string
          required:
          - '@id'
        x-jsonld-id: http://www.w3.org/2004/02/skos/core#broader
    required:
    - '@id'
    - skos:inScheme
    - skos:prefLabel
    - skos:notation
x-jsonld-prefixes:
  skos: http://www.w3.org/2004/02/skos/core#
  dcterms: http://purl.org/dc/terms/
  schema: http://schema.org/
x-schema-version: https://json-schema.org/draft/2020-12/schema
