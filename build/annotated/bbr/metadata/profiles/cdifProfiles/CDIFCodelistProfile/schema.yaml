$schema: https://json-schema.org/draft/2020-12/schema
type: object
title: CDIF Codelist profile
description: "CDIF profile for controlled vocabulary codelists implemented as SKOS
  ConceptSchemes. Composes skosConceptScheme and skosConcept building blocks with
  additional constraints: concepts must have resolvable @id identifiers, skos:inScheme,
  and skos:definition; the scheme must identify top concepts via skos:hasTopConcept;
  hierarchical concepts must declare both skos:narrower (for JSON tree traversal)
  and skos:broader (for upward navigation and display trees) \u2014 both directions
  are required. CDIF metadata properties (schema:identifier, schema:dateModified,
  schema:license or schema:conditionsOfAccess) take precedence over equivalent dcterms
  properties (dcterms:modified, dcterms:license) from the base skosConceptScheme building
  block. Instances should use the schema: properties; dcterms: equivalents are optional
  and not required."
allOf:
- $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/skosProperties/skosConceptScheme/schema.yaml
- type: object
  properties:
    '@id':
      type: string
      description: Globally unique, resolvable URI for the concept scheme.
    schema:identifier:
      description: Primary identifier for the codelist. May be a string URI or a structured
        PropertyValue.
      anyOf:
      - type: string
      - type: object
        properties:
          '@type':
            type: array
            items:
              type: string
            contains:
              const: schema:PropertyValue
          schema:propertyID:
            type: string
          schema:value:
            type: string
          schema:url:
            type: string
    schema:dateModified:
      type: string
      description: ISO 8601 date when the codelist was last modified.
    schema:url:
      type: string
      format: uri
      description: Web location of a page describing the codelist.
      default: missing
    schema:license:
      description: License for the codelist.
      type: array
      items:
        anyOf:
        - type: string
        - type: object
          properties:
            '@id':
              type: string
    schema:conditionsOfAccess:
      description: Text statement of access conditions for the codelist.
      type: array
      items:
        type: string
    skos:hasTopConcept:
      description: Top-level concepts that have no skos:broader in this scheme. Required
        for hierarchical codelists.
      type: array
      minItems: 1
      items:
        anyOf:
        - $ref: '#/$defs/CdifCodelistConcept'
        - type: object
          properties:
            '@id':
              type: string
          required:
          - '@id'
  anyOf:
  - required:
    - schema:license
  - required:
    - schema:conditionsOfAccess
  required:
  - '@id'
  - schema:identifier
  - schema:dateModified
  - skos:hasTopConcept
$defs:
  CdifCodelistConcept:
    description: A SKOS Concept constrained for CDIF codelist use. Must have a resolvable
      @id, skos:inScheme, skos:definition, and skos:prefLabel.
    allOf:
    - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/skosProperties/skosConcept/schema.yaml
    - type: object
      properties:
        '@id':
          type: string
          description: Globally unique, resolvable URI for this concept.
        skos:inScheme:
          description: The concept scheme this concept belongs to. Required for CDIF
            codelist concepts.
          anyOf:
          - type: object
            properties:
              '@id':
                type: string
            required:
            - '@id'
          - type: array
            items:
              type: object
              properties:
                '@id':
                  type: string
              required:
              - '@id'
        skos:definition:
          description: Formal definition of this concept. Required for CDIF codelist
            concepts. String or language-tagged values.
          anyOf:
          - type: string
          - type: array
            items:
              anyOf:
              - type: string
              - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/skosProperties/skosConcept/schema.yaml#/$defs/LanguageTaggedValue
        skos:narrower:
          description: Narrower (child) concepts. If present, each inline concept
            must also declare skos:broader pointing back to the parent concept. Both
            skos:narrower and skos:broader must be explicit in CDIF codelists.
          type: array
          items:
            anyOf:
            - type: object
              properties:
                '@id':
                  type: string
              required:
              - '@id'
            - allOf:
              - $ref: '#/$defs/CdifCodelistConcept'
              - required:
                - skos:broader
        skos:broader:
          description: Broader (parent) concepts. Required on any concept that appears
            as a skos:narrower value of another concept. CDIF requires both directions
            to be explicit for hierarchy traversal.
          type: array
          items:
            type: object
            properties:
              '@id':
                type: string
            required:
            - '@id'
      required:
      - '@id'
      - skos:inScheme
      - skos:definition
x-jsonld-prefixes:
  skos: http://www.w3.org/2004/02/skos/core#
  dcterms: http://purl.org/dc/terms/
  schema: http://schema.org/
