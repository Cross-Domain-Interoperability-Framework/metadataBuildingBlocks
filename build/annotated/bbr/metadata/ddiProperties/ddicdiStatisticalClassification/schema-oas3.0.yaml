      ControlledVocabularyEntry:
        type: object
        description: DDI-CDI controlled vocabulary entry (dt-ControlledVocabularyEntry).
          Allows for unstructured content which may be an entry from an externally
          maintained controlled vocabulary. When the content is from a controlled
          vocabulary, provide the code value of the entry along with a reference to
          the vocabulary from which the value is taken.
        properties:
          '@type':
            type: array
            items:
              type: string
            contains:
              enum:
              - cdi:ControlledVocabularyEntry
            minItems: 1
          cdi:entryReference:
            description: A reference to the specific item in the vocabulary referenced
              by cdi:vocabulary, using a URI or other resolvable identifier.
            type: array
            items:
