x-defs:
  cdif.bbr.metadata.ddiProperties.ddicdiDataTypes:
    title: DDI-CDI Data Types
    description: Shared DDI-CDI structured data types from DDICDILibrary/DataTypes.
      Provides reusable $defs for identifiers, names, contact information, references,
      and other common DDI-CDI structured data types.
    $defs:
      id-reference:
        type: object
        description: JSON-LD @id reference to a node defined elsewhere in the graph
        properties:
          '@id':
            type: string
            description: IRI or blank node identifier of the referenced node
        required:
        - '@id'
      ObjectName:
        type: object
        description: DDI-CDI structured name wrapper (dt-ObjectName)
        properties:
          '@type':
            type: array
            items:
              type: string
            contains:
              enum:
              - cdi:ObjectName
            minItems: 1
          cdi:name:
            type: string
            description: The name string
            x-jsonld-id: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/name
          cdi:context:
            description: Context or usage of this name
            x-jsonld-id: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/context
            allOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiPhysicalDataSet/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiProperties.ddicdiDataTypes/$defs/ControlledVocabularyEntry
        required:
        - cdi:name
      OrganizationName:
        type: object
        description: DDI-CDI organization name (dt-OrganizationName, extends ObjectName)
        properties:
          '@type':
            type: array
            items:
              type: string
            contains:
              enum:
              - cdi:OrganizationName
            minItems: 1
          cdi:name:
            type: string
            description: The name string
            x-jsonld-id: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/name
          cdi:context:
            description: Context or usage of this name
            x-jsonld-id: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/context
            allOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiPhysicalDataSet/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiProperties.ddicdiDataTypes/$defs/ControlledVocabularyEntry
          cdi:abbreviation:
            description: Abbreviated form of the name
            x-jsonld-id: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/abbreviation
            allOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiPhysicalDataSet/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiProperties.ddicdiDataTypes/$defs/InternationalString
          cdi:effectiveDates:
            description: Date range when this name is/was effective
            x-jsonld-id: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/effectiveDates
            allOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiPhysicalDataSet/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiProperties.ddicdiDataTypes/$defs/DateRange
          cdi:isFormal:
            type: boolean
            default: true
            description: Whether this is the formal/legal name
            x-jsonld-id: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/isFormal
          cdi:typeOfOrganizationName:
            description: Classification of this name (e.g. legal, trade, acronym)
            x-jsonld-id: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/typeOfOrganizationName
            allOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiPhysicalDataSet/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiProperties.ddicdiDataTypes/$defs/ControlledVocabularyEntry
        required:
        - cdi:name
      IndividualName:
        type: object
        description: DDI-CDI individual name (dt-IndividualName)
        properties:
          '@type':
            type: array
            items:
              type: string
            contains:
              enum:
              - cdi:IndividualName
            minItems: 1
          cdi:firstGiven:
            type: string
            description: First or given name
            x-jsonld-id: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/firstGiven
          cdi:lastFamily:
            type: string
            description: Last or family name
            x-jsonld-id: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/lastFamily
          cdi:middle:
            type: string
            description: Middle name(s)
            x-jsonld-id: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/middle
          cdi:prefix:
            type: string
            description: Name prefix (e.g. Dr., Prof.)
            x-jsonld-id: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/prefix
          cdi:suffix:
            type: string
            description: Name suffix (e.g. Jr., III)
            x-jsonld-id: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/suffix
          cdi:fullName:
            description: Full name as a single internationalized string
            x-jsonld-id: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/fullName
            allOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiPhysicalDataSet/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiProperties.ddicdiDataTypes/$defs/InternationalString
          cdi:abbreviation:
            description: Abbreviated form of the name
            x-jsonld-id: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/abbreviation
            allOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiPhysicalDataSet/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiProperties.ddicdiDataTypes/$defs/InternationalString
          cdi:isFormal:
            type: boolean
            default: true
            description: Whether this is a formal name
            x-jsonld-id: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/isFormal
          cdi:isPreferred:
            type: boolean
            default: false
            description: Whether this is the preferred name
            x-jsonld-id: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/isPreferred
          cdi:effectiveDates:
            description: Date range when this name is/was effective
            x-jsonld-id: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/effectiveDates
            allOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiPhysicalDataSet/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiProperties.ddicdiDataTypes/$defs/DateRange
          cdi:context:
            description: Context or usage of this name
            x-jsonld-id: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/context
            allOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiPhysicalDataSet/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiProperties.ddicdiDataTypes/$defs/ControlledVocabularyEntry
          cdi:typeOfIndividualName:
            description: Classification of this name (e.g. birth, married, pen)
            x-jsonld-id: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/typeOfIndividualName
            allOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiPhysicalDataSet/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiProperties.ddicdiDataTypes/$defs/ControlledVocabularyEntry
          cdi:sex:
            description: Sex specification associated with this name
            x-jsonld-id: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/sex
            allOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiPhysicalDataSet/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiProperties.ddicdiDataTypes/$defs/SexSpecification
      LabelForDisplay:
        type: object
        description: DDI-CDI multilingual display label (dt-LabelForDisplay)
        properties:
          '@type':
            type: array
            items:
              type: string
            contains:
