  cdif.bbr.metadata.cdifDataType.cdifStatistics:
    title: CDIF Statistics
    description: 'CDIF profile of the DDI-CDI Statistics / CategoryStatistics / StatisticsCollection
      classes (2026-03 model). A Statistics node carries one or more Statistic value
      objects; CategoryStatistics carries per-category results; a StatisticsCollection
      groups Statistics nodes. The root validates any of the three. CDIF divergences
      from canonical DDI-CDI: properties valued by InternationalString / LabelForDisplay
      / ObjectName are simplified to plain strings and carried under the cdif: namespace
      (cdif:name, cdif:descriptiveText, cdif:definition, cdif:displayLabel); the polymorphic
      cdi:has association is split into target-specific cdif:has_* keys; cdif:appliesTo
      and cdif:indexedBy are CDIF additions (not present in the canonical model) that
      link statistics to the InstanceVariable(s) they describe.'
    type: object
    anyOf:
    - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiPhysicalDataSet/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifDataType.cdifStatistics/$defs/Statistics
    - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiPhysicalDataSet/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifDataType.cdifStatistics/$defs/CategoryStatistics
    - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiPhysicalDataSet/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifDataType.cdifStatistics/$defs/StatisticsCollection
    $defs:
      cdifConceptOrTerm:
        anyOf:
        - type: object
          properties:
            '@id':
              type: string
              description: reference to a skos concept for the data type
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiPhysicalDataSet/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.definedTerm
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiPhysicalDataSet/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.profiles.cdifProfile.cdifConceptScheme/$defs/cdifConcept
      Statistic:
        title: Statistic
        description: "DDI-CDI Statistic dataType \u2014 a single computed value (mean,
          count, median, etc.). A value object with no identity; appears inline inside
          a cdi:statistic array."
