      tabular-data-model parameters. Successor to the DDI-CDI 1.0 ValueMapping class;
      in the 2026-03 model it was renamed PhysicalMapping and the relationship to
      the variable reversed (PhysicalMapping formats InstanceVariable). PhysicalMapping
      has two subclasses: TextMapping (adds text-dialect detail) and LocatorMapping
      (adds a locator string for non-tabular physical layouts). The root validates
      any of the three.'
