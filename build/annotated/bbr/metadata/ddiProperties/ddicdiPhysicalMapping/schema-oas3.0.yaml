  cdif.bbr.metadata.schemaorgProperties.definedTerm:
    description: "schema.org Defined Term schema.\n\n**Union-type policy:** In CDIF
      profile UML models an attribute typed as\nschema:DefinedTerm is represented
      by a single attribute of that class type.\nThe JSON Schema implementation permits
      the property value to be EITHER a\nplain string (interpreted as schema:name
      or schema:termCode in the default\nvocabulary) OR a full schema:DefinedTerm
      object (with explicit @type, name,\nidentifier, termCode, inDefinedTermSet).
      Consumers should accept either form.\n\nNote that this differs from the cdif
      Concept policy: a Concept (skos:Concept)\nin CDIF profiles MUST be a controlled-vocabulary
      entry (object form or\n@id-reference) \u2014 plain strings are not permitted
      for Concept-typed values\nbecause vocabulary identity cannot be recovered from
      an unscoped label.\n"
    type: object
    properties:
      '@type':
        type: array
        items:
          type: string
        contains:
          enum:
          - schema:DefinedTerm
        minItems: 1
      schema:name:
        type: string
        description: text label for the term that is useful to human user
        x-jsonld-id: http://schema.org/name
      schema:identifier:
        anyOf:
        - type: string
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiPhysicalMapping/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.identifier
        x-jsonld-id: http://schema.org/identifier
      schema:inDefinedTermSet:
        type: string
        description: Name for the controlled vocabulary responsible for this keyword.
        x-jsonld-id: http://schema.org/inDefinedTermSet
      schema:termCode:
