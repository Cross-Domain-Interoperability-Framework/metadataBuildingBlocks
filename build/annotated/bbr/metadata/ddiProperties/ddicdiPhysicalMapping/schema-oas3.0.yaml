            allOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiPhysicalMapping/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.ddiProperties.ddicdiDataTypes/$defs/DateRange
          cdi:context:
            description: Context or usage of this name
            x-jsonld-id: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/context
            allOf:
