x-defs: {}
title: DDI-CDI Value Domain
description: Unified DDI-CDI ValueDomain building block covering both SubstantiveValueDomain
  (subject-matter values) and SentinelValueDomain (processing/missing-value codes).
  Both inherit from ValueDomain. SentinelValueDomain adds an optional cdi:platformType
  property. Supports described domains (ValueAndConceptDescription), enumerated domains
  (EnumerationDomain), and conceptual domain references.
anyOf:
- $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiValueDomain/schema-oas3.0.yaml#/$defs/ValueDomainNode
- type: array
  items:
    $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiValueDomain/schema-oas3.0.yaml#/$defs/ValueDomainNode
$defs:
  ValueDomainNode:
    type: object
    description: A single ValueDomain node (SubstantiveValueDomain or SentinelValueDomain)
    properties:
      '@type':
        description: Must include either cdi:SubstantiveValueDomain or cdi:SentinelValueDomain
        type: array
        items:
          type: string
        anyOf:
        - contains:
            enum:
            - cdi:SubstantiveValueDomain
        - contains:
            enum:
            - cdi:SentinelValueDomain
        minItems: 1
      '@id':
        type: string
        description: Identifier for this value domain node
      cdi:catalogDetails:
        description: Administrative catalog metadata for this value domain
        allOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiValueDomain/schema-oas3.0.yaml#/$defs/CatalogDetails
      cdi:displayLabel:
        description: Multilingual display label
        anyOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiValueDomain/schema-oas3.0.yaml#/$defs/LabelForDisplay
        - type: array
          items:
            $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiValueDomain/schema-oas3.0.yaml#/$defs/LabelForDisplay
      cdi:identifier:
        description: Formal identifier for this value domain
        allOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiValueDomain/schema-oas3.0.yaml#/$defs/Identifier
      cdi:recommendedDataType:
        description: Recommended physical data type for values in this domain
        allOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiValueDomain/schema-oas3.0.yaml#/$defs/ControlledVocabularyEntry
      cdi:isDescribedBy:
        description: Description of the value domain constraints (0..1). Inline ValueAndConceptDescription
          or @id reference.
        anyOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiValueDomain/schema-oas3.0.yaml#/$defs/ValueAndConceptDescription
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiValueDomain/schema-oas3.0.yaml#/$defs/id-reference
      cdi:takesValuesFrom:
        description: Enumeration domain providing the set of permissible coded values
          (0..1). Inline EnumerationDomain or @id reference.
        anyOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiValueDomain/schema-oas3.0.yaml#/$defs/EnumerationDomain
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiValueDomain/schema-oas3.0.yaml#/$defs/id-reference
      cdi:takesConceptsFrom:
        description: Reference to a conceptual domain (SubstantiveConceptualDomain
          or SentinelConceptualDomain) that provides conceptual grounding for this
          value domain (0..1). @id reference only.
        allOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiValueDomain/schema-oas3.0.yaml#/$defs/id-reference
      cdi:platformType:
        description: '(SentinelValueDomain only) The type of software platform under
          which sentinel codes will be used. Statistical software platforms use different
          sets of codes to indicate missing values. Example values: SASNumeric, SPSSstyle,
          Rstyle, StataNumeric, BlankString, EmptyString, Unrestricted.'
        allOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiValueDomain/schema-oas3.0.yaml#/$defs/ControlledVocabularyEntry
    required:
    - '@type'
  id-reference:
    type: object
    description: JSON-LD @id reference to a node defined elsewhere in the graph
    properties:
      '@id':
        type: string
        description: IRI or blank node identifier of the referenced node
    required:
    - '@id'
  ObjectName:
    type: object
    description: DDI-CDI structured name wrapper (dt-ObjectName)
    properties:
      '@type':
        type: array
        items:
          type: string
        contains:
          enum:
          - cdi:ObjectName
        minItems: 1
      cdi:name:
        type: string
        description: The name string
      cdi:context:
        description: Context or usage of this name
        allOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiValueDomain/schema-oas3.0.yaml#/$defs/ControlledVocabularyEntry
    required:
    - cdi:name
  LabelForDisplay:
    type: object
    description: DDI-CDI multilingual display label (dt-LabelForDisplay)
    properties:
      '@type':
        type: array
        items:
          type: string
        contains:
          enum:
          - cdi:LabelForDisplay
        minItems: 1
      cdi:locationVariant:
        description: Geographic or locale variant
        allOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiValueDomain/schema-oas3.0.yaml#/$defs/ControlledVocabularyEntry
      cdi:maxLength:
        type: integer
        description: Maximum display length
      cdi:languageSpecificString:
        description: The label text with language tag
        allOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiValueDomain/schema-oas3.0.yaml#/$defs/LanguageString
  LanguageString:
    type: object
    description: DDI-CDI language-tagged string (dt-LanguageString)
    properties:
      '@type':
        type: array
        items:
          type: string
        contains:
          enum:
          - cdi:LanguageString
        minItems: 1
      cdi:content:
        type: string
        description: The text content
      cdi:language:
        type: string
        description: ISO language code (e.g. en, fr, de)
    required:
    - cdi:content
  InternationalString:
    type: object
    description: DDI-CDI multilingual string wrapper (dt-InternationalString)
    properties:
      '@type':
        type: array
        items:
          type: string
        contains:
          enum:
          - cdi:InternationalString
        minItems: 1
      cdi:languageSpecificString:
        description: Language-tagged string content
        anyOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiValueDomain/schema-oas3.0.yaml#/$defs/LanguageString
        - type: array
          items:
            $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiValueDomain/schema-oas3.0.yaml#/$defs/LanguageString
  Identifier:
    type: object
    description: DDI-CDI composite identifier (dt-Identifier)
    properties:
      '@type':
        type: array
        items:
          type: string
        contains:
          enum:
          - cdi:Identifier
        minItems: 1
      cdi:ddiIdentifier:
        description: DDI-specific IRDI identifier
        allOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiValueDomain/schema-oas3.0.yaml#/$defs/InternationalRegistrationDataIdentifier
      cdi:uri:
        type: string
        format: uri
        description: URI form of the identifier
      cdi:nonDdiIdentifier:
        description: Non-DDI identifier
        anyOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiValueDomain/schema-oas3.0.yaml#/$defs/NonDdiIdentifier
        - type: array
          items:
            $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiValueDomain/schema-oas3.0.yaml#/$defs/NonDdiIdentifier
  InternationalRegistrationDataIdentifier:
    type: object
    description: DDI-CDI IRDI (dt-InternationalRegistrationDataIdentifier)
    properties:
      '@type':
        type: array
        items:
          type: string
        contains:
          enum:
          - cdi:InternationalRegistrationDataIdentifier
        minItems: 1
      cdi:dataIdentifier:
        type: string
      cdi:registrationAuthorityIdentifier:
        type: string
      cdi:versionIdentifier:
        type: string
    required:
    - cdi:dataIdentifier
    - cdi:registrationAuthorityIdentifier
    - cdi:versionIdentifier
  NonDdiIdentifier:
    type: object
    description: Non-DDI identifier (dt-NonDdiIdentifier)
    properties:
      '@type':
        type: array
        items:
          type: string
        contains:
          enum:
          - cdi:NonDdiIdentifier
        minItems: 1
      cdi:identifierContent:
        type: string
        description: The identifier value
      cdi:managingAgency:
        type: string
        description: Agency managing this identifier scheme
    required:
    - cdi:identifierContent
  Reference:
    type: object
    description: DDI-CDI reference to an entity (dt-Reference)
    properties:
      '@type':
        type: array
        items:
          type: string
        contains:
          enum:
          - cdi:Reference
        minItems: 1
      cdi:uri:
        type: string
        format: uri
        description: URI of the referenced entity
      cdi:description:
        type: string
        description: Human-readable description of the reference
      cdi:ddiReference:
        description: DDI IRDI reference
        allOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiValueDomain/schema-oas3.0.yaml#/$defs/InternationalRegistrationDataIdentifier
      cdi:semantic:
        description: Semantic role of this reference
        allOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiValueDomain/schema-oas3.0.yaml#/$defs/ControlledVocabularyEntry
  ControlledVocabularyEntry:
    type: object
    description: DDI-CDI controlled vocabulary entry (dt-ControlledVocabularyEntry)
    properties:
      '@type':
        type: array
        items:
          type: string
        contains:
          enum:
          - cdi:ControlledVocabularyEntry
        minItems: 1
      cdi:entryValue:
        type: string
        description: The vocabulary code or value
      cdi:name:
        type: string
        description: Human-readable name
      cdi:vocabulary:
        description: Reference to the vocabulary scheme
        allOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiValueDomain/schema-oas3.0.yaml#/$defs/Reference
  CatalogDetails:
    type: object
    description: DDI-CDI administrative catalog metadata (dt-CatalogDetails)
    properties:
      '@type':
        type: array
        items:
          type: string
        contains:
          enum:
          - cdi:CatalogDetails
        minItems: 1
      cdi:title:
        description: Title of the cataloged resource
        allOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiValueDomain/schema-oas3.0.yaml#/$defs/InternationalString
      cdi:summary:
        description: Summary description
        allOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiValueDomain/schema-oas3.0.yaml#/$defs/InternationalString
      cdi:identifier:
        description: Identifier for catalog entry
        type: object
        properties:
          '@type':
            type: array
            items:
              type: string
            contains:
              enum:
              - cdi:InternationalIdentifier
            minItems: 1
          cdi:identifierContent:
            type: string
            description: The identifier value
          cdi:isUri:
            type: boolean
            description: Whether the identifier is a URI
      cdi:creator:
        description: Agent responsible for creation
        allOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiValueDomain/schema-oas3.0.yaml#/$defs/AgentInRole
  AgentInRole:
    type: object
    description: DDI-CDI agent with a role (cls-AgentInRole)
    properties:
      '@type':
        type: array
        items:
          type: string
        contains:
          enum:
          - cdi:AgentInRole
        minItems: 1
      cdi:agentName:
        description: Name of the agent
        allOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiValueDomain/schema-oas3.0.yaml#/$defs/InternationalString
      cdi:reference:
        description: Reference to an external agent record
        allOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiValueDomain/schema-oas3.0.yaml#/$defs/Reference
      cdi:role:
        description: Role of this agent
        allOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiValueDomain/schema-oas3.0.yaml#/$defs/ControlledVocabularyEntry
  ValueAndConceptDescription:
    type: object
    description: DDI-CDI description of value constraints and measurement level (cls-ValueAndConceptDescription)
    properties:
      '@type':
        type: array
        items:
          type: string
        contains:
          enum:
          - cdi:ValueAndConceptDescription
        minItems: 1
      '@id':
        type: string
        description: Identifier for this description node
      cdi:classificationLevel:
        type: string
        description: Level of measurement
        enum:
        - Continuous
        - Interval
        - Nominal
        - Ordinal
        - Ratio
      cdi:description:
        description: Textual description of the value domain constraints
        allOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiValueDomain/schema-oas3.0.yaml#/$defs/InternationalString
      cdi:formatPattern:
        description: Expected format pattern for values
        allOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiValueDomain/schema-oas3.0.yaml#/$defs/ControlledVocabularyEntry
      cdi:identifier:
        description: Formal identifier
        allOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiValueDomain/schema-oas3.0.yaml#/$defs/Identifier
      cdi:logicalExpression:
        description: Logical expression constraining valid values
        allOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiValueDomain/schema-oas3.0.yaml#/$defs/ControlledVocabularyEntry
      cdi:maximumValueExclusive:
        type: string
        description: Exclusive upper bound for valid values
      cdi:maximumValueInclusive:
        type: string
        description: Inclusive upper bound for valid values
      cdi:minimumValueExclusive:
        type: string
        description: Exclusive lower bound for valid values
      cdi:minimumValueInclusive:
        type: string
        description: Inclusive lower bound for valid values
      cdi:regularExpression:
        description: Regular expression constraining valid value syntax
        allOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiValueDomain/schema-oas3.0.yaml#/$defs/TypedString
  TypedString:
    type: object
    description: DDI-CDI typed string value (dt-TypedString)
    properties:
      '@type':
        type: array
        items:
          type: string
        contains:
          enum:
          - cdi:TypedString
        minItems: 1
      cdi:content:
        type: string
        description: The string content
      cdi:typeOfContent:
        description: Type or format of the content
        allOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiValueDomain/schema-oas3.0.yaml#/$defs/ControlledVocabularyEntry
  EnumerationDomain:
    type: object
    description: DDI-CDI enumeration domain providing a set of permissible coded values
      (cls-EnumerationDomain)
    properties:
      '@type':
        type: array
        items:
          type: string
        contains:
          enum:
          - cdi:EnumerationDomain
        minItems: 1
      '@id':
        type: string
        description: Identifier for this enumeration domain node
      cdi:identifier:
        description: Formal identifier
        allOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiValueDomain/schema-oas3.0.yaml#/$defs/Identifier
      cdi:name:
        description: Structured name for this enumeration domain
        anyOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiValueDomain/schema-oas3.0.yaml#/$defs/ObjectName
        - type: array
          items:
            $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiValueDomain/schema-oas3.0.yaml#/$defs/ObjectName
      cdi:purpose:
        description: Purpose of this enumeration domain
        allOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiValueDomain/schema-oas3.0.yaml#/$defs/InternationalString
      cdi:uses:
        description: Reference to a LevelStructure that organizes the enumeration.
          @id reference only.
        allOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiValueDomain/schema-oas3.0.yaml#/$defs/id-reference
      cdi:isDefinedBy:
        description: References to Concepts that define the enumerated values. Array
          of @id references.
        type: array
        items:
          $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiValueDomain/schema-oas3.0.yaml#/$defs/id-reference
      cdi:references:
        description: Reference to the CategorySet providing the value categories.
          @id reference only.
        allOf:
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/ddiProperties/ddicdiValueDomain/schema-oas3.0.yaml#/$defs/id-reference
x-jsonld-prefixes:
  cdi: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/
x-schema-version: https://json-schema.org/draft/2020-12/schema
