$schema: https://json-schema.org/draft/2020-12/schema
description: schema for a labeled link, a profile of schema.org/CreativeWork
type: object
properties:
  '@type':
    default: schema:CreativeWork
    type: array
    items:
      type: string
    contains:
      const: schema:CreativeWork
    minItems: 1
  schema:name:
    type: string
    x-jsonld-id: http://schema.org/name
  schema:description:
    type: string
    x-jsonld-id: http://schema.org/description
  schema:url:
    type: string
    format: uri
    x-jsonld-id: http://schema.org/url
required:
- '@type'
- schema:url
x-jsonld-prefixes:
  schema: http://schema.org/
