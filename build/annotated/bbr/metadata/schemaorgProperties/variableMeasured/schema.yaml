$schema: https://json-schema.org/draft/2020-12/schema
description: Schema.org PropertyValue-based variableMeasured. Defines properties for
  a measured variable in a dataset, typed as schema:PropertyValue.
type: object
properties:
  '@type':
    type: array
    items:
      type: string
    contains:
      const: schema:PropertyValue
    minItems: 1
  '@id':
    type: string
  schema:name:
    type: string
    description: string label associated with the variable in the dataset serialization
    x-jsonld-id: http://schema.org/name
  schema:description:
    type: string
    default: missing
    x-jsonld-id: http://schema.org/description
  schema:alternateName:
    type: array
    items:
      type: string
      description: human intelligible name for variable that conveys semantics
    x-jsonld-id: http://schema.org/alternateName
  schema:measurementTechnique:
    anyOf:
    - type: string
    - type: object
      properties:
        '@id':
          type: string
          description: reference to a skos concept
    - $ref: '#/$defs/DefinedTerm'
    description: Text description or URI specifying how values for the variable were
      obtained.
    x-jsonld-id: http://schema.org/measurementTechnique
  schema:propertyID:
    type: array
    items:
      anyOf:
      - type: string
      - type: object
        properties:
          '@id':
            type: string
      - $ref: '#/$defs/DefinedTerm'
    description: identifier or name for the property concept
    x-jsonld-id: http://schema.org/propertyID
  schema:unitText:
    type: string
    description: unit of measurement as text
    x-jsonld-id: http://schema.org/unitText
  schema:unitCode:
    anyOf:
    - type: string
    - type: object
      properties:
        '@id':
          type: string
    - $ref: '#/$defs/DefinedTerm'
    description: URI or code identifying the unit of measure
    x-jsonld-id: http://schema.org/unitCode
  schema:minValue:
    type: number
    description: minimum numeric value in the dataset
    x-jsonld-id: http://schema.org/minValue
  schema:maxValue:
    type: number
    description: maximum numeric value in the dataset
    x-jsonld-id: http://schema.org/maxValue
  schema:url:
    anyOf:
    - type: string
      format: uri
      description: link to a web page useful for interpreting the variable
    - $ref: '#/$defs/Reference'
    x-jsonld-id: http://schema.org/url
required:
- '@type'
- schema:name
$defs:
  DefinedTerm:
    $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/schemaorgProperties/definedTerm/schema.yaml
  Reference:
    $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifReference/schema.yaml
x-jsonld-prefixes:
  schema: http://schema.org/
