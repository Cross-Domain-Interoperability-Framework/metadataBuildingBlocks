x-defs:
  cdif.bbr.metadata.schemaorgProperties.definedTerm:
    description: "schema.org Defined Term schema.\n\n**Union-type policy:** In CDIF
      profile UML models an attribute typed as\nschema:DefinedTerm is represented
      by a single attribute of that class type.\nThe JSON Schema implementation permits
      the property value to be EITHER a\nplain string (interpreted as schema:name
      or schema:termCode in the default\nvocabulary) OR a full schema:DefinedTerm
      object (with explicit @type, name,\nidentifier, termCode, inDefinedTermSet).
      Consumers should accept either form.\n\nNote that this differs from the cdif
      Concept policy: a Concept (skos:Concept)\nin CDIF profiles MUST be a controlled-vocabulary
      entry (object form or\n@id-reference) \u2014 plain strings are not permitted
      for Concept-typed values\nbecause vocabulary identity cannot be recovered from
      an unscoped label.\n"
    type: object
    properties:
      '@type':
        type: array
        items:
          type: string
        contains:
          enum:
          - schema:DefinedTerm
        minItems: 1
      schema:name:
        type: string
        description: text label for the term that is useful to human user
        x-jsonld-id: http://schema.org/name
      schema:identifier:
        anyOf:
        - type: string
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/schemaorgProperties/variableMeasured/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.identifier
        x-jsonld-id: http://schema.org/identifier
      schema:inDefinedTermSet:
        type: string
        description: Name for the controlled vocabulary responsible for this keyword.
        x-jsonld-id: http://schema.org/inDefinedTermSet
      schema:termCode:
        type: string
        description: A representative code for this keyword in the controlled vocabulary.
          Analogous to skos:Notation
        x-jsonld-id: http://schema.org/termCode
    allOf:
    - required:
      - '@type'
    - anyOf:
      - required:
        - schema:name
      - required:
        - schema:identifier
      - required:
        - schema:termCode
    x-jsonld-prefixes:
      schema: http://schema.org/
    x-schema-source: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/schemaorgProperties/definedTerm/schema.yaml
    x-schema-version: https://json-schema.org/draft/2020-12/schema
  cdif.bbr.metadata.cdifProperties.cdifReference:
    type: object
    description: Building block to implement relations to other resources using a
      URL and some semantics.
    allOf:
    - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/schemaorgProperties/variableMeasured/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.labeledLink
    - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/schemaorgProperties/variableMeasured/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifReference/$defs/Relation
    $defs:
      Relation:
        type: object
        description: DCAT Relationship surface added on top of the schema.org labeled
          link construct.
        properties:
          '@type':
            type: array
            items:
              type: string
            contains:
              enum:
              - dcat:Relationship
            minItems: 1
          dcat:hadRole:
            description: Role of the related resource as a SKOS Concept (DCAT canonical
              role slot).
            x-jsonld-id: http://www.w3.org/ns/dcat#hadRole
            allOf:
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/schemaorgProperties/variableMeasured/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.skosProperties.skosConcept
          dcterms:relation:
            type: string
            format: uri
            description: URI of the related resource (DCAT canonical pointer to what
              is being related to; distinct from schema:url which is the presentation
              URL inherited from labeledLink).
            x-jsonld-id: http://purl.org/dc/terms/relation
    x-jsonld-prefixes:
      schema: http://schema.org/
      skos: http://www.w3.org/2004/02/skos/core#
      cdi: http://ddialliance.org/Specification/DDI-CDI/1.0/RDF/
      cdif: https://cdif.org/0.1/
      ex: https://example.org/
      xsd: http://www.w3.org/2001/XMLSchema#
      dcterms: http://purl.org/dc/terms/
      dcat: http://www.w3.org/ns/dcat#
    x-schema-source: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/cdifProperties/cdifReference/schema.yaml
    x-schema-version: https://json-schema.org/draft/2020-12/schema
  cdif.bbr.metadata.schemaorgProperties.identifier:
    description: 'Properties for a schema.org identifier (schema:PropertyValue pattern).


      **Union-type policy:** In CDIF profile UML models an attribute typed as

      schema:Identifier / schema:PropertyValue is represented by a single attribute

      of that class type. The JSON Schema implementation permits the property value

      to be EITHER a plain string (interpreted as the bare identifier value) OR a

      full schema:PropertyValue object (with explicit @type, propertyID, value).

      Consumers should accept either form.

      '
    type: object
    properties:
      '@type':
        type: array
        items:
          type: string
        contains:
          enum:
          - schema:PropertyValue
        minItems: 1
      schema:propertyID:
        type: string
        description: In this context for the schema:PropertyValue, this field is an
          identifier for the identifier schema, e.g. DOI, ARK.  Get values from https://registry.identifiers.org/registry/
          for interoperability
        x-jsonld-id: http://schema.org/propertyID
      schema:value:
        type: string
        description: the identifier string. E.g. 10.5066/F7VX0DMQ
        x-jsonld-id: http://schema.org/value
      schema:url:
        type: string
        format: uri
        description: 'web-resolveable string for the identifier; host name part is
          location of a resolver that will return some representation for the given
          identifier value. E.g. https://doi.org/10.5066/F7VX0DMQ '
        x-jsonld-id: http://schema.org/url
    allOf:
    - required:
      - '@type'
    - anyOf:
      - required:
        - schema:value
      - required:
        - schema:url
    x-jsonld-prefixes:
      schema: http://schema.org/
    x-schema-source: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/schemaorgProperties/identifier/schema.yaml
    x-schema-version: https://json-schema.org/draft/2020-12/schema
  cdif.bbr.metadata.schemaorgProperties.labeledLink:
    description: schema for a labeled link, a profile of schema.org/CreativeWork
    type: object
    properties:
      '@type':
        default: schema:CreativeWork
        type: array
        items:
          type: string
        contains:
          enum:
          - schema:CreativeWork
        minItems: 1
      schema:name:
        type: string
        x-jsonld-id: http://schema.org/name
      schema:description:
        type: string
        x-jsonld-id: http://schema.org/description
      schema:url:
        type: string
        format: uri
        x-jsonld-id: http://schema.org/url
    required:
    - '@type'
    - schema:url
    x-jsonld-prefixes:
      schema: http://schema.org/
    x-schema-source: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/schemaorgProperties/labeledLink/schema.yaml
    x-schema-version: https://json-schema.org/draft/2020-12/schema
  cdif.bbr.metadata.skosProperties.skosConcept:
    title: SKOS Concept
    description: JSON Schema for a SKOS Concept in JSON-LD form. A unit of thought
      within a concept scheme. Supports labels (prefLabel, altLabel, hiddenLabel),
      notations, hierarchical relations (broader/narrower), associative relations
      (related), cross-scheme mapping properties, scheme membership, and documentary
      notes. Based on the W3C SKOS Reference (https://www.w3.org/TR/skos-reference/).
    type: object
    properties:
      '@context':
        description: JSON-LD context declaring the skos namespace prefix. May be a
          single object or an array of strings and objects.
        anyOf:
        - type: object
          properties:
            skos:
              enum:
              - http://www.w3.org/2004/02/skos/core#
          required:
          - skos
        - type: array
          items:
            anyOf:
            - type: string
            - type: object
          contains:
            type: object
            properties:
              skos:
                enum:
                - http://www.w3.org/2004/02/skos/core#
            required:
            - skos
      '@id':
        type: string
        description: URI identifier for this concept.
      '@type':
        type: array
        items:
          type: string
        contains:
          enum:
          - skos:Concept
        minItems: 1
      skos:prefLabel:
        description: Preferred lexical label for this concept. A single string, a
          single language-tagged value, or an array of language-tagged values. Each
          language should appear at most once.
        anyOf:
        - type: string
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/schemaorgProperties/variableMeasured/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.skosProperties.skosConcept/$defs/LanguageTaggedValue
        - type: array
          items:
            $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/schemaorgProperties/variableMeasured/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.skosProperties.skosConcept/$defs/LanguageTaggedValue
        x-jsonld-id: http://www.w3.org/2004/02/skos/core#prefLabel
      skos:notation:
        description: Classification code for this concept within a scheme.
        type: array
        items:
          type: string
        x-jsonld-id: http://www.w3.org/2004/02/skos/core#notation
      skos:definition:
        description: Formal explanation of the meaning of this concept.
        anyOf:
        - type: string
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/schemaorgProperties/variableMeasured/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.skosProperties.skosConcept/$defs/LanguageTaggedValue
        - type: array
          items:
            anyOf:
            - type: string
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/schemaorgProperties/variableMeasured/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.skosProperties.skosConcept/$defs/LanguageTaggedValue
        x-jsonld-id: http://www.w3.org/2004/02/skos/core#definition
      skos:scopeNote:
        description: Note clarifying meaning and/or intended use.
        anyOf:
        - type: string
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/schemaorgProperties/variableMeasured/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.skosProperties.skosConcept/$defs/LanguageTaggedValue
        - type: array
          items:
            anyOf:
            - type: string
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/schemaorgProperties/variableMeasured/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.skosProperties.skosConcept/$defs/LanguageTaggedValue
        x-jsonld-id: http://www.w3.org/2004/02/skos/core#scopeNote
      skos:note:
        description: General note about this concept.
        anyOf:
        - type: string
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/schemaorgProperties/variableMeasured/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.skosProperties.skosConcept/$defs/LanguageTaggedValue
        - type: array
          items:
            anyOf:
            - type: string
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/schemaorgProperties/variableMeasured/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.skosProperties.skosConcept/$defs/LanguageTaggedValue
        x-jsonld-id: http://www.w3.org/2004/02/skos/core#note
      skos:historyNote:
        description: Note about past state or use.
        anyOf:
        - type: string
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/schemaorgProperties/variableMeasured/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.skosProperties.skosConcept/$defs/LanguageTaggedValue
        - type: array
          items:
            anyOf:
            - type: string
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/schemaorgProperties/variableMeasured/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.skosProperties.skosConcept/$defs/LanguageTaggedValue
        x-jsonld-id: http://www.w3.org/2004/02/skos/core#historyNote
      skos:changeNote:
        description: Note documenting a change.
        anyOf:
        - type: string
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/schemaorgProperties/variableMeasured/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.skosProperties.skosConcept/$defs/LanguageTaggedValue
        - type: array
          items:
            anyOf:
            - type: string
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/schemaorgProperties/variableMeasured/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.skosProperties.skosConcept/$defs/LanguageTaggedValue
        x-jsonld-id: http://www.w3.org/2004/02/skos/core#changeNote
      skos:editorialNote:
        description: Note for editors and maintainers.
        anyOf:
        - type: string
        - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/schemaorgProperties/variableMeasured/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.skosProperties.skosConcept/$defs/LanguageTaggedValue
        - type: array
          items:
            anyOf:
            - type: string
            - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/schemaorgProperties/variableMeasured/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.skosProperties.skosConcept/$defs/LanguageTaggedValue
        x-jsonld-id: http://www.w3.org/2004/02/skos/core#editorialNote
      skos:inScheme:
        description: Concept scheme(s) this concept belongs to.
        anyOf:
        - type: object
          properties:
            '@id':
              type: string
          required:
          - '@id'
        - type: array
          items:
            type: object
            properties:
              '@id':
                type: string
            required:
            - '@id'
        x-jsonld-id: http://www.w3.org/2004/02/skos/core#inScheme
      skos:topConceptOf:
        description: Concept scheme(s) for which this is a top concept.
        anyOf:
        - type: object
          properties:
            '@id':
              type: string
          required:
          - '@id'
        - type: array
          items:
            type: object
            properties:
              '@id':
                type: string
            required:
            - '@id'
        x-jsonld-id: http://www.w3.org/2004/02/skos/core#topConceptOf
      skos:broader:
        description: Broader (parent) concepts in the hierarchy. Items are inline
          concept objects or @id references.
        type: array
        items:
          anyOf:
          - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/schemaorgProperties/variableMeasured/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.skosProperties.skosConcept/$defs/ConceptRef
          - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/schemaorgProperties/variableMeasured/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.skosProperties.skosConcept
        x-jsonld-id: http://www.w3.org/2004/02/skos/core#broader
      skos:narrower:
        description: Narrower (child) concepts in the hierarchy. Items are inline
          concept objects or @id references.
        type: array
        items:
          anyOf:
          - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/schemaorgProperties/variableMeasured/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.skosProperties.skosConcept/$defs/ConceptRef
          - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/schemaorgProperties/variableMeasured/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.skosProperties.skosConcept
        x-jsonld-id: http://www.w3.org/2004/02/skos/core#narrower
    required:
    - '@type'
    - skos:prefLabel
    - skos:definition
    - skos:inScheme
    $defs:
      ConceptRef:
        type: object
        description: A reference to a SKOS Concept by URI.
        properties:
          '@id':
            type: string
            description: URI of the referenced concept.
        required:
        - '@id'
      LanguageTaggedValue:
        type: object
        description: An RDF literal value with a language tag, serialized as a JSON-LD
          value object.
        properties:
          '@value':
            type: string
            description: The text content.
          '@language':
            type: string
            description: BCP 47 language tag (e.g. en, fr, de).
        required:
        - '@value'
        - '@language'
    x-jsonld-prefixes:
      skos: http://www.w3.org/2004/02/skos/core#
    x-schema-source: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/skosProperties/skosConcept/schema.yaml
    x-schema-version: https://json-schema.org/draft/2020-12/schema
description: Schema.org PropertyValue-based variableMeasured. Defines properties for
  a measured variable in a dataset, typed as schema:PropertyValue.
type: object
properties:
  '@type':
    type: array
    items:
      type: string
    contains:
      enum:
      - schema:PropertyValue
    minItems: 1
  '@id':
    type: string
  schema:name:
    type: string
    description: string label associated with the variable in the dataset serialization
    x-jsonld-id: http://schema.org/name
  schema:description:
    type: string
    default: missing
    x-jsonld-id: http://schema.org/description
  schema:alternateName:
    type: array
    items:
      type: string
      description: human intelligible name for variable that conveys semantics
    x-jsonld-id: http://schema.org/alternateName
  schema:measurementTechnique:
    anyOf:
    - type: string
    - type: object
      properties:
        '@id':
          type: string
          description: reference to a skos concept
    - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/schemaorgProperties/variableMeasured/schema-oas3.0.yaml#/$defs/DefinedTerm
    description: Text description or URI specifying how values for the variable were
      obtained.
    x-jsonld-id: http://schema.org/measurementTechnique
  schema:propertyID:
    type: array
    items:
      anyOf:
      - type: string
      - type: object
        properties:
          '@id':
            type: string
      - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/schemaorgProperties/variableMeasured/schema-oas3.0.yaml#/$defs/DefinedTerm
    description: identifier or name for the property concept
    x-jsonld-id: http://schema.org/propertyID
  schema:unitText:
    type: string
    description: unit of measurement as text
    x-jsonld-id: http://schema.org/unitText
  schema:unitCode:
    anyOf:
    - type: string
    - type: object
      properties:
        '@id':
          type: string
    - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/schemaorgProperties/variableMeasured/schema-oas3.0.yaml#/$defs/DefinedTerm
    description: URI or code identifying the unit of measure
    x-jsonld-id: http://schema.org/unitCode
  schema:minValue:
    type: number
    description: minimum numeric value in the dataset
    x-jsonld-id: http://schema.org/minValue
  schema:maxValue:
    type: number
    description: maximum numeric value in the dataset
    x-jsonld-id: http://schema.org/maxValue
  schema:url:
    anyOf:
    - type: string
      format: uri
      description: link to a web page useful for interpreting the variable
    - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/schemaorgProperties/variableMeasured/schema-oas3.0.yaml#/$defs/Reference
    x-jsonld-id: http://schema.org/url
required:
- '@type'
- schema:name
$defs:
  DefinedTerm:
    $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/schemaorgProperties/variableMeasured/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.definedTerm
  Reference:
    $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/schemaorgProperties/variableMeasured/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.cdifProperties.cdifReference
x-jsonld-prefixes:
  schema: http://schema.org/
x-schema-version: https://json-schema.org/draft/2020-12/schema
