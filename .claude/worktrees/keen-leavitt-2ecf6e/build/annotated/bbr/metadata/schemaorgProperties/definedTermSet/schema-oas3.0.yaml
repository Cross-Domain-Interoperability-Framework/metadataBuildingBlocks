description: schema.org Defined Term Set schema. A controlled vocabulary or named
  list of schema:DefinedTerm objects.
type: object
properties:
  '@id':
    type: string
    description: Persistent identifier (URI) for this DefinedTermSet.
  '@type':
    type: array
    items:
      type: string
    contains:
      enum:
      - schema:DefinedTermSet
    minItems: 1
  schema:name:
    type: string
    description: Human-readable name (label) for the term set.
  schema:description:
    type: string
    description: Description of the scope and purpose of the term set.
  schema:identifier:
    description: Formal identifier for the term set, as a string or structured PropertyValue.
    anyOf:
    - type: string
    - $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/schemaorgProperties/definedTermSet/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.identifier
  schema:url:
    type: string
    format: uri
    description: URL where the term set is published.
  schema:hasDefinedTerm:
    type: array
    minItems: 1
    description: The terms that make up this set. Each item is a schema:DefinedTerm.
    items:
      $ref: https://cross-domain-interoperability-framework.github.io/metadataBuildingBlocks/build/annotated/bbr/metadata/schemaorgProperties/definedTermSet/schema-oas3.0.yaml#/x-defs/cdif.bbr.metadata.schemaorgProperties.definedTerm
allOf:
- required:
  - '@type'
  - schema:hasDefinedTerm
- anyOf:
  - required:
    - schema:name
  - required:
    - schema:identifier
  - required:
    - '@id'
x-jsonld-prefixes:
  schema: http://schema.org/
x-schema-version: https://json-schema.org/draft/2020-12/schema
