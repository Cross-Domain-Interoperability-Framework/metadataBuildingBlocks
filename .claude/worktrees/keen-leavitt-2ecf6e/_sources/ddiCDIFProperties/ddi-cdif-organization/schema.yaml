$schema: https://json-schema.org/draft/2020-12/schema
title: DDI-CDI Organization
description: >-
  DDI-CDI Organization agent (cls-Organization, extends Agent).
  Represents a group or institution with structured name,
  contact information, and identification.

type: object
properties:
  "@type":
    type: array
    items:
      type: string
    contains:
      const: "cdi:Organization"
    minItems: 1
  "@id":
    type: string
    description: Identifier for this organization node
  "cdi:organizationName":
    description: Name(s) of this organization
    anyOf:
      - $ref: "../ddi-cdif-data-types/schema.yaml#/$defs/OrganizationName"
      - type: array
        items:
          $ref: "../ddi-cdif-data-types/schema.yaml#/$defs/OrganizationName"
  "cdi:contactInformation":
    description: Contact details for this organization
    anyOf:
      - $ref: "../ddi-cdif-data-types/schema.yaml#/$defs/ContactInformation"
      - type: array
        items:
          $ref: "../ddi-cdif-data-types/schema.yaml#/$defs/ContactInformation"
  "cdi:identifier":
    description: Formal identifier for this agent
    $ref: "../ddi-cdif-data-types/schema.yaml#/$defs/Identifier"
  "cdi:image":
    description: Image associated with this agent
    $ref: "../ddi-cdif-data-types/schema.yaml#/$defs/PrivateImage"
  "cdi:purpose":
    description: Purpose or role of this agent
    $ref: "../ddi-cdif-data-types/schema.yaml#/$defs/InternationalString"
required: ["@type"]
