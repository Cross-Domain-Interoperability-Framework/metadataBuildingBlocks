$schema: https://json-schema.org/draft/2020-12/schema
title: DDI-CDI Agent
description: >-
  DDI-CDI Agent class hierarchy. Covers Individual (person),
  Machine (software/hardware), Organization (group/institution),
  and ProcessingAgent (orchestrates production activities) using
  DDI Cross-Domain Integration vocabulary. Each agent subtype is
  defined in its own building block; this schema composes them.

anyOf:
  - $ref: "../ddicdiIndividual/schema.yaml"
  - $ref: "../ddicdiMachine/schema.yaml"
  - $ref: "../ddicdiOrganization/schema.yaml"
  - $ref: "../ddicdiProcessingAgent/schema.yaml"
